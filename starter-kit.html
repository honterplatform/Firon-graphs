<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personalized Starter Kit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0A0A0A;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
  }
  .card {
    background: #0F0F0F;
    width: 100%;
    height: 100%;
    overflow: hidden;
    padding: 16px;
  }
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    font-size: 13px;
    color: #888;
  }
  .breadcrumb .separator { color: #444; }
  .breadcrumb .active { color: #ccc; font-weight: 600; }
  .url-bar {
    font-size: 11px;
    color: #555;
    margin-bottom: 14px;
    padding: 6px 10px;
    background: #141414;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .url-globe {
    width: 14px; height: 14px;
    background: #333;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .content {
    display: flex;
    gap: 16px;
    height: calc(100% - 56px);
    overflow: hidden;
  }
  .fields-panel {
    flex: 1;
    min-width: 0;
    overflow-y: auto;
  }
  .fields-panel::-webkit-scrollbar { display: none; }
  .field-row {
    display: flex;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #1A1A1A;
    opacity: 0;
    transform: translateX(-10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .field-row.visible {
    opacity: 1;
    transform: translateX(0);
  }
  .field-row.indent { padding-left: 20px; }
  .field-key {
    width: 130px;
    flex-shrink: 0;
    font-size: 12px;
    color: #666;
  }
  .field-value {
    font-size: 12px;
    color: #ccc;
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .field-value .accent { color: #FB3B24; font-weight: 600; }
  .field-value .ok { color: #4BC882; }
  .field-value .mono { font-family: 'SF Mono', monospace; }
  .check-mini {
    width: 12px; height: 12px;
    border-radius: 2px;
    background: #4BC882;
    color: #08200F;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .code-panel {
    width: 280px;
    flex-shrink: 0;
    background: #141414;
    border-radius: 4px;
    padding: 12px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .code-panel.visible { opacity: 1; }
  .code-tabs {
    display: flex;
    gap: 16px;
    margin-bottom: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .code-tab { color: #555; cursor: pointer; padding-bottom: 4px; }
  .code-tab.active { color: #FB3B24; border-bottom: 2px solid #FB3B24; }
  .code-line {
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    font-size: 10px;
    line-height: 1.7;
    white-space: pre;
    color: #888;
  }
  .ck { color: #FB3B24; }
  .cv { color: #ccc; }
  .cb { color: #555; }
  .cg { color: #4BC882; }
  @media (max-width: 480px) {
    .breadcrumb { font-size: 11px; margin-bottom: 2px; }
    .url-bar { margin-bottom: 8px; padding: 4px 8px; font-size: 10px; }
    .content { flex-direction: column; gap: 8px; height: auto; }
    .fields-panel { flex: none; }
    .field-row { padding: 5px 0; }
    .field-row.indent { padding-left: 12px; }
    .field-key { width: 95px; font-size: 11px; }
    .field-value { font-size: 11px; }
    .code-panel { width: 100%; max-height: 120px; padding: 8px; }
    .code-tabs { gap: 10px; margin-bottom: 6px; font-size: 10px; }
    .code-line { font-size: 9px; line-height: 1.5; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="breadcrumb">
    <span>Generator</span>
    <span class="separator">›</span>
    <span class="active">Starter kit</span>
  </div>
  <div class="url-bar">
    <div class="url-globe"></div>
    https://petit-atelier.com/api/kits/generate?due=2025-10
  </div>
  <div class="content">
    <div class="fields-panel" id="fields"></div>
    <div class="code-panel" id="codePanel">
      <div class="code-tabs">
        <span class="code-tab active">KIT</span>
        <span class="code-tab">SEASON</span>
        <span class="code-tab">MORE INFO</span>
      </div>
      <div id="codeContent"></div>
    </div>
  </div>
</div>
<script>
const fields = [
  { key: 'user_query', value: '<span class="mono">"I&apos;m due in October"</span>' },
  { key: 'season', value: '<span class="accent">Autumn / Winter</span> · 4mo prep' },
  { key: 'clothing', value: '3 items' },
  { key: 'item', value: '<span class="check-mini">✓</span>Newborn sleeper · ×5 · £45', indent: true },
  { key: 'item', value: '<span class="check-mini">✓</span>Wool swaddle blanket · ×2 · £38', indent: true },
  { key: 'item', value: '<span class="check-mini">✓</span>Knit beanie · ×1 · £18', indent: true },
  { key: 'sleep', value: '2 items' },
  { key: 'item', value: '<span class="check-mini">✓</span>Bassinet bedding · £52', indent: true },
  { key: 'item', value: '<span class="check-mini">✓</span>Weighted sleep sack · £36', indent: true },
  { key: 'feeding', value: '2 items' },
  { key: 'item', value: '<span class="check-mini">✓</span>Bottle starter set · £42', indent: true },
  { key: 'item', value: '<span class="check-mini">✓</span>Bibs · 6-pack · £14', indent: true },
  { key: 'subtotal', value: '£245' },
  { key: 'bundle_save', value: '<span class="ok">−£25 (10%)</span>' },
  { key: 'kit_total', value: '<span class="accent">£220</span> · 7 items' },
];

const fieldsEl = document.getElementById('fields');
fields.forEach(f => {
  const row = document.createElement('div');
  row.className = 'field-row' + (f.indent ? ' indent' : '');
  row.innerHTML = '<div class="field-key">' + f.key + '</div><div class="field-value">' + f.value + '</div>';
  fieldsEl.appendChild(row);
});

const codeLines = [
  '<span class="cb">POST /api/kits/generate</span>',
  '<span class="cb">{</span>',
  '  <span class="ck">"due_date"</span>: <span class="cv">"2025-10"</span>,',
  '  <span class="ck">"season"</span>: <span class="cv">"autumn-winter"</span>,',
  '  <span class="ck">"lead_time_months"</span>: <span class="cv">4</span>,',
  '  <span class="ck">"categories"</span>: <span class="cb">{</span>',
  '    <span class="ck">"clothing"</span>: <span class="cv">3</span>,',
  '    <span class="ck">"sleep"</span>: <span class="cv">2</span>,',
  '    <span class="ck">"feeding"</span>: <span class="cv">2</span>',
  '  <span class="cb">}</span>,',
  '  <span class="ck">"item_count"</span>: <span class="cv">7</span>,',
  '  <span class="ck">"subtotal"</span>: <span class="cv">245</span>,',
  '  <span class="ck">"bundle_save"</span>: <span class="cg">25</span>,',
  '  <span class="ck">"total"</span>: <span class="cv">220</span>',
  '<span class="cb">}</span>',
];

const codeContent = document.getElementById('codeContent');
codeLines.forEach(line => {
  const el = document.createElement('div');
  el.className = 'code-line';
  el.innerHTML = line;
  codeContent.appendChild(el);
});

const rows = document.querySelectorAll('.field-row');
rows.forEach((row, i) => {
  setTimeout(() => row.classList.add('visible'), 200 + i * 65);
});
setTimeout(() => document.getElementById('codePanel').classList.add('visible'), 500);
</script>
</body>
</html>
