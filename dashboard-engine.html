<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Engine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0A0A0A; font-family: system-ui, -apple-system, sans-serif; color: #fff; }
  .card {
    background: #0F0F0F;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    flex-shrink: 0;
  }
  .title { font-size: 14px; font-weight: 700; color: #ccc; }
  .live-tag {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 9px;
    font-weight: 700;
    color: #FB3B24;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .live-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #FB3B24;
    animation: pulse 1.5s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .hero-metrics {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .hero {
    flex: 1;
    background: #141414;
    border: 1px solid #1A1A1A;
    border-radius: 6px;
    padding: 8px 10px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .hero.visible { opacity: 1; transform: translateY(0); }
  .hero-label {
    font-size: 8px;
    font-weight: 600;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 2px;
  }
  .hero-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .hero-val {
    font-size: 22px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: #FB3B24;
    line-height: 1;
  }
  .hero-delta {
    font-size: 9px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .hero-delta.up { color: #FB3B24; }
  .channels {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 0;
  }
  .ch-row {
    flex: 1;
    background: #141414;
    border: 1px solid #1A1A1A;
    border-radius: 5px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 8px;
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.4s ease;
  }
  .ch-row.visible { opacity: 1; transform: translateX(0); }
  .ch-row.top { border-color: rgba(251,59,36,0.2); }
  .ch-rank {
    font-size: 9px;
    font-weight: 800;
    color: #333;
    width: 12px;
    flex-shrink: 0;
    text-align: center;
    font-variant-numeric: tabular-nums;
    transition: color 0.4s ease;
  }
  .ch-row.top .ch-rank { color: #FB3B24; }
  .ch-name {
    font-size: 10px;
    font-weight: 600;
    color: #555;
    width: 46px;
    flex-shrink: 0;
    transition: color 0.4s ease;
  }
  .ch-row.top .ch-name { color: #ccc; }
  .ch-bar-wrap {
    flex: 1;
    height: 2px;
    background: #1A1A1A;
    border-radius: 1px;
    overflow: hidden;
  }
  .ch-bar {
    height: 100%;
    border-radius: 1px;
    width: 0%;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1), background 0.4s ease;
  }
  .ch-metrics {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .ch-m {
    text-align: right;
  }
  .ch-m-val {
    font-size: 11px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    color: #444;
    transition: color 0.4s ease;
  }
  .ch-row.top .ch-m-val { color: #FB3B24; }
  .ch-m-label {
    font-size: 6px;
    font-weight: 600;
    color: #333;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-top: 1px;
  }
  @media (max-width: 480px) {
    .title { font-size: 13px; }
    .hero { padding: 6px 8px; }
    .hero-val { font-size: 18px; }
    .hero-delta { font-size: 8px; }
    .ch-name { font-size: 9px; width: 38px; }
    .ch-m-val { font-size: 10px; }
    .ch-metrics { gap: 6px; }
    .ch-row { padding: 0 8px; gap: 6px; }
    .ch-rank { font-size: 8px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="title">Looker Studio</div>
    <div class="live-tag"><div class="live-dot"></div>Real-Time</div>
  </div>
  <div class="hero-metrics">
    <div class="hero" id="h0">
      <div class="hero-label">CAC</div>
      <div class="hero-row">
        <div class="hero-val" id="hv0">$0</div>
        <div class="hero-delta up" id="hd0"></div>
      </div>
    </div>
    <div class="hero" id="h1">
      <div class="hero-label">LTV</div>
      <div class="hero-row">
        <div class="hero-val" id="hv1">$0</div>
        <div class="hero-delta up" id="hd1"></div>
      </div>
    </div>
    <div class="hero" id="h2">
      <div class="hero-label">Cont. Margin</div>
      <div class="hero-row">
        <div class="hero-val" id="hv2">0%</div>
        <div class="hero-delta up" id="hd2"></div>
      </div>
    </div>
  </div>
  <div class="channels" id="channels"></div>
</div>
<script>
var heroStates = [
  [{ v: '$32', d: '↓12%', dc: 'up' },   { v: '$286', d: '↑18%', dc: 'up' },  { v: '38%', d: '↑4.2%', dc: 'up' }],
  [{ v: '$28', d: '↓16%', dc: 'up' },   { v: '$312', d: '↑22%', dc: 'up' },  { v: '42%', d: '↑6.1%', dc: 'up' }],
  [{ v: '$34', d: '↓8%', dc: 'up' },    { v: '$298', d: '↑14%', dc: 'up' },  { v: '36%', d: '↑2.8%', dc: 'up' }],
];

var channels = [
  { name: 'SEO',    states: [
    { cm: 72, cac: '$14', ltv: '$380', bar: 95 },
    { cm: 74, cac: '$12', ltv: '$392', bar: 97 },
    { cm: 70, cac: '$16', ltv: '$368', bar: 92 },
  ]},
  { name: 'Email',  states: [
    { cm: 68, cac: '$8',  ltv: '$312', bar: 88 },
    { cm: 66, cac: '$10', ltv: '$298', bar: 86 },
    { cm: 70, cac: '$7',  ltv: '$326', bar: 92 },
  ]},
  { name: 'TikTok', states: [
    { cm: 52, cac: '$22', ltv: '$264', bar: 68 },
    { cm: 56, cac: '$18', ltv: '$278', bar: 73 },
    { cm: 48, cac: '$26', ltv: '$248', bar: 63 },
  ]},
  { name: 'Google', states: [
    { cm: 44, cac: '$32', ltv: '$286', bar: 58 },
    { cm: 46, cac: '$28', ltv: '$298', bar: 60 },
    { cm: 42, cac: '$34', ltv: '$272', bar: 55 },
  ]},
  { name: 'Meta',   states: [
    { cm: 38, cac: '$36', ltv: '$242', bar: 50 },
    { cm: 34, cac: '$42', ltv: '$228', bar: 45 },
    { cm: 40, cac: '$34', ltv: '$256', bar: 53 },
  ]},
];

var channelsEl = document.getElementById('channels');
var chEls = [];

channels.forEach(function(ch, i) {
  var el = document.createElement('div');
  el.className = 'ch-row';
  el.innerHTML =
    '<div class="ch-rank">' + (i + 1) + '</div>' +
    '<div class="ch-name">' + ch.name + '</div>' +
    '<div class="ch-bar-wrap"><div class="ch-bar" id="cbar' + i + '"></div></div>' +
    '<div class="ch-metrics">' +
      '<div class="ch-m"><div class="ch-m-val" id="ccm' + i + '">—</div><div class="ch-m-label">CM</div></div>' +
      '<div class="ch-m"><div class="ch-m-val" id="ccac' + i + '">—</div><div class="ch-m-label">CAC</div></div>' +
      '<div class="ch-m"><div class="ch-m-val" id="cltv' + i + '">—</div><div class="ch-m-label">LTV</div></div>' +
    '</div>';
  channelsEl.appendChild(el);
  chEls.push(el);
});

var stateIdx = 0;

function applyState(idx) {
  channels.forEach(function(ch, i) {
    var s = ch.states[idx];
    var isTop = s.cm >= 52;
    var bar = document.getElementById('cbar' + i);
    bar.style.width = s.bar + '%';
    bar.style.background = isTop ? '#FB3B24' : '#333';
    document.getElementById('ccm' + i).textContent = s.cm + '%';
    document.getElementById('ccac' + i).textContent = s.cac;
    document.getElementById('cltv' + i).textContent = s.ltv;
    chEls[i].className = 'ch-row visible' + (isTop ? ' top' : '');
  });

  var h = heroStates[idx];
  h.forEach(function(hero, i) {
    document.getElementById('hv' + i).textContent = hero.v;
    var dEl = document.getElementById('hd' + i);
    dEl.textContent = hero.d;
    dEl.className = 'hero-delta ' + hero.dc;
  });
}

// Staggered reveal
['h0','h1','h2'].forEach(function(id, i) {
  setTimeout(function() { document.getElementById(id).classList.add('visible'); }, 200 + i * 100);
});
chEls.forEach(function(el, i) {
  setTimeout(function() { el.classList.add('visible'); }, 500 + i * 80);
});

setTimeout(function() { applyState(0); }, 600);

setInterval(function() {
  stateIdx = (stateIdx + 1) % heroStates.length;
  applyState(stateIdx);
}, 3000);
</script>
</body>
</html>
