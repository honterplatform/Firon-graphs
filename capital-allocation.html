<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Allocation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0A0A0A;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
  }
  .card {
    background: #0F0F0F;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .title {
    font-size: 15px;
    font-weight: 700;
    color: #ccc;
  }
  .period {
    font-size: 12px;
    color: #FB3B24;
    font-weight: 600;
    transition: opacity 0.3s ease;
  }
  .bars-container {
    position: relative;
  }
  .bar-row {
    position: absolute;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    height: 32px;
    opacity: 0;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
  }
  .bar-row.visible { opacity: 1; }
  .bar-label {
    width: 90px;
    flex-shrink: 0;
    font-size: 12px;
    color: #888;
    font-weight: 500;
  }
  .bar-track {
    flex: 1;
    height: 22px;
    position: relative;
    margin: 0 10px;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    width: 0%;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .bar-value {
    width: 36px;
    flex-shrink: 0;
    font-size: 12px;
    color: #ccc;
    font-weight: 600;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  @media (max-width: 480px) {
    .title { font-size: 13px; }
    .period { font-size: 10px; }
    .bar-label { width: 70px; font-size: 10px; }
    .bar-value { font-size: 10px; width: 30px; }
    .bar-row { height: 28px; }
    .bar-track { height: 18px; margin: 0 6px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="title">Capital Allocation</div>
    <div class="period" id="period">Q1 2025</div>
  </div>
  <div class="bars-container" id="bars"></div>
</div>
<script>
const channels = [
  { name: 'Google Ads', color: '#FB3B24' },
  { name: 'Meta Ads', color: '#FC5844' },
  { name: 'SEO', color: '#FF7A6B' },
  { name: 'TikTok', color: '#FFB0A5' },
  { name: 'Email', color: '#FDD8D3' },
  { name: 'YouTube', color: '#C42E1B' },
  { name: 'LinkedIn', color: '#555555' },
];

const states = [
  [32, 18, 24, 8, 12, 4, 2],
  [22, 14, 28, 20, 8, 5, 3],
  [20, 26, 18, 16, 6, 10, 4],
  [28, 16, 20, 10, 14, 8, 4],
];

const periods = ['Q1 2025', 'Q2 2025', 'Q3 2025', 'Q4 2025'];

const isMobile = window.innerWidth <= 480;
const rowH = isMobile ? 32 : 36;
const container = document.getElementById('bars');
const periodEl = document.getElementById('period');
const barEls = [];

channels.forEach(function(ch) {
  const row = document.createElement('div');
  row.className = 'bar-row';
  row.innerHTML =
    '<div class="bar-label">' + ch.name + '</div>' +
    '<div class="bar-track"><div class="bar-fill" style="background:' + ch.color + '"></div></div>' +
    '<div class="bar-value">0%</div>';
  container.appendChild(row);
  barEls.push(row);
});

let currentState = 0;

function getSorted(stateIdx) {
  return states[stateIdx].map(function(v, i) { return { i: i, v: v }; }).sort(function(a, b) { return b.v - a.v; });
}

function applyState(stateIdx) {
  const values = states[stateIdx];
  const maxVal = Math.max.apply(null, values);
  const sorted = getSorted(stateIdx);
  sorted.forEach(function(item, rank) {
    const el = barEls[item.i];
    el.style.transform = 'translateY(' + (rank * rowH) + 'px)';
    el.querySelector('.bar-fill').style.width = (item.v / maxVal * 100) + '%';
    el.querySelector('.bar-value').textContent = item.v + '%';
  });
  periodEl.textContent = periods[stateIdx];
}

// Initial positions (no width yet)
const sorted0 = getSorted(0);
const maxVal0 = Math.max.apply(null, states[0]);
sorted0.forEach(function(item, rank) {
  barEls[item.i].style.transform = 'translateY(' + (rank * rowH) + 'px)';
});

// Staggered reveal with bar growth
sorted0.forEach(function(item, rank) {
  const el = barEls[item.i];
  setTimeout(function() {
    el.classList.add('visible');
    requestAnimationFrame(function() {
      el.querySelector('.bar-fill').style.width = (item.v / maxVal0 * 100) + '%';
      el.querySelector('.bar-value').textContent = item.v + '%';
    });
  }, 300 + rank * 100);
});

// Start cycling after reveal finishes
setTimeout(function() {
  setInterval(function() {
    currentState = (currentState + 1) % states.length;
    periodEl.style.opacity = '0';
    setTimeout(function() {
      applyState(currentState);
      periodEl.style.opacity = '1';
    }, 200);
  }, 3000);
}, 300 + channels.length * 100 + 1500);
</script>
</body>
</html>
