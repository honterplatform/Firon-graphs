<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>robots.txt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: transparent;
    font-family: 'Geist', -apple-system, system-ui, sans-serif;
    color: #000;
    letter-spacing: -0.01em;
  }

  .card {
    width: 100%;
    height: 100%;
    background: #F2F2F2;
    border: 1px solid rgba(0,0,0,0.05);
    border-radius: clamp(10px, 1.6vh, 14px);
    padding: clamp(10px, 1.8vh, 14px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Editor card */
  .editor {
    flex: 1;
    min-height: 0;
    background: #FFFFFF;
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .editor-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    flex-shrink: 0;
  }
  .file-name {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 12px;
    font-weight: 500;
    color: #000;
  }
  .file-tag {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10px;
    font-weight: 500;
    color: #FB3B24;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .file-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #FB3B24;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.35;} }

  .terminal {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    padding: 12px 16px;
  }
  .line {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 12.5px;
    line-height: 1.75;
    white-space: pre;
    opacity: 0;
    transform: translateX(-10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .line.visible { opacity: 1; transform: translateX(0); }
  .comment { color: rgba(0,0,0,0.4); }
  .keyword { color: #FB3B24; font-weight: 500; }
  .value { color: rgba(0,0,0,0.8); }
  .cursor {
    display: inline-block;
    width: 7px;
    height: 14px;
    background: #FB3B24;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .cursor.visible { opacity: 1; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  @media (max-width: 480px) {
    .editor-bar { padding: 8px 12px; }
    .file-name { font-size: 11px; }
    .terminal { padding: 10px 12px; }
    .line {
      font-size: 10px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-all;
    }
  }
</style>
</head>
<body>
<div class="card">
  <div class="editor">
    <div class="editor-bar">
      <span class="file-name">robots.txt</span>
      <span class="file-tag"><span class="file-dot"></span>crawl policy</span>
    </div>
    <div class="terminal" id="terminal"></div>
  </div>
</div>
<script>
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const lines = [
  { type: 'comment', text: '# Google adsbot ignores robots.txt unless specifically named!' },
  { type: 'kv', key: 'User-agent:', value: ' adsbot-google' },
  { type: 'kv', key: 'Disallow:', value: ' /checkouts/' },
  { type: 'kv', key: 'Disallow:', value: ' /checkout' },
  { type: 'kv', key: 'Disallow:', value: ' /carts' },
  { type: 'kv', key: 'Disallow:', value: ' /orders' },
  { type: 'kv', key: 'Disallow:', value: ' /68864999739/checkouts' },
  { type: 'kv', key: 'Disallow:', value: ' /68864999739/orders' },
  { type: 'kv', key: 'Disallow:', value: ' /*?*oseid=*' },
  { type: 'kv', key: 'Disallow:', value: ' /*preview_theme_id*' },
  { type: 'kv', key: 'Disallow:', value: ' /*preview_script_id*' },
  { type: 'kv', key: 'Disallow:', value: ' /cdn/wpm/*.js' },
  { type: 'kv', key: 'Disallow:', value: ' /products/*-[a-f0-9]...-remote' },
  { type: 'kv', key: 'Disallow:', value: ' /*/products/*-[a-f0-9]...-remote' },
  { type: 'kv', key: 'Disallow:', value: ' /collections/*/products/*-...-remote' },
  { type: 'kv', key: 'Disallow:', value: ' /*/collections/*/products/*-...-remote' },
  { type: 'kv', key: 'Disallow:', value: ' /sf_private_access_tokens' },
];

const terminal = document.getElementById('terminal');

lines.forEach((line, i) => {
  const el = document.createElement('div');
  el.className = 'line';
  if (line.type === 'comment') {
    el.innerHTML = `<span class="comment">${escapeHtml(line.text)}</span>`;
  } else {
    el.innerHTML = `<span class="keyword">${escapeHtml(line.key)}</span><span class="value">${escapeHtml(line.value)}</span>`;
  }
  if (i === lines.length - 1) {
    el.innerHTML += '<span class="cursor" id="cursor"></span>';
  }
  terminal.appendChild(el);
});

const lineEls = document.querySelectorAll('.line');

lineEls.forEach((el, i) => {
  setTimeout(() => {
    el.classList.add('visible');
    if (i === lines.length - 1) {
      setTimeout(() => document.getElementById('cursor').classList.add('visible'), 200);
    }
  }, 200 + i * 90);
});
</script>
</body>
</html>
