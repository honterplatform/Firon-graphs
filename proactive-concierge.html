<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proactive AI Concierge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0F0F0F;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
  }

  .card {
    width: 100%;
    height: 100%;
    background: #0F0F0F;
    padding: clamp(16px, 3vh, 28px) clamp(16px, 3vw, 32px);
    display: flex;
    flex-direction: column;
    gap: clamp(10px, 1.6vh, 16px);
    position: relative;
    overflow: hidden;
  }

  .card-label {
    font-size: clamp(11px, 1.5vh, 14px);
    font-weight: 700;
    color: #FB3B24;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    flex-shrink: 0;
  }

  /* --- Chat window --- */
  .chat-window {
    flex: 1;
    min-height: 0;
    background: #161616;
    border: 1px solid #232323;
    border-radius: clamp(12px, 1.8vh, 18px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow:
      0 24px 60px -20px rgba(0,0,0,0.55),
      0 0 0 1px rgba(255,255,255,0.02) inset;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }

  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: clamp(11px, 1.6vh, 15px) clamp(14px, 2vw, 18px);
    border-bottom: 1px solid #232323;
    flex-shrink: 0;
    background: #171717;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .brand-mark {
    width: clamp(30px, 4vh, 38px);
    height: clamp(30px, 4vh, 38px);
    border-radius: 50%;
    background: linear-gradient(135deg, #FB3B24 0%, #C72D19 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(13px, 1.8vh, 16px);
    font-weight: 800;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 2px 8px rgba(251,59,36,0.3);
  }
  .brand-mark::after {
    content: '';
    position: absolute;
    bottom: 1px; right: 1px;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #4BC882;
    border: 2px solid #171717;
  }
  .brand-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
  }
  .brand-name {
    font-size: clamp(13px, 1.7vh, 15px);
    font-weight: 700;
    color: rgba(255,255,255,0.95);
    letter-spacing: -0.2px;
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .brand-status {
    font-size: clamp(10px, 1.2vh, 11px);
    color: #4BC882;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .brand-status::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #4BC882;
    box-shadow: 0 0 5px rgba(75,200,130,0.7);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .chat-actions {
    color: rgba(255,255,255,0.4);
    font-size: clamp(14px, 2vh, 18px);
    letter-spacing: 2px;
    cursor: default;
    flex-shrink: 0;
  }

  /* --- Chat body --- */
  .chat-body {
    flex: 1;
    min-height: 0;
    padding: clamp(12px, 1.8vh, 18px) clamp(14px, 2vw, 20px);
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 1.2vh, 12px);
    overflow-y: hidden;
    background: #161616;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(251,59,36,0.04), transparent 50%);
  }

  .memory-chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    align-self: flex-start;
    padding: clamp(5px, 0.8vh, 8px) clamp(9px, 1.2vw, 12px);
    border-radius: 16px;
    background: rgba(251,59,36,0.07);
    border: 1px solid rgba(251,59,36,0.22);
    font-size: clamp(10px, 1.2vh, 12px);
    color: rgba(255,255,255,0.7);
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.4s, transform 0.4s;
    flex-shrink: 0;
  }
  .memory-chip.show { opacity: 1; transform: translateY(0); }
  .mem-mark {
    color: #FB3B24;
    font-weight: 800;
    font-size: 1.1em;
  }
  .memory-chip b {
    color: rgba(255,255,255,0.95);
    font-weight: 700;
    font-family: ui-monospace, monospace;
    font-size: 0.92em;
  }

  .msg {
    display: flex;
    gap: 9px;
    align-items: flex-end;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s, transform 0.35s;
    max-width: 88%;
  }
  .msg.show { opacity: 1; transform: translateY(0); }
  .msg.ai { align-self: flex-start; }

  .avatar {
    width: clamp(26px, 3.4vh, 32px);
    height: clamp(26px, 3.4vh, 32px);
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(251,59,36,0.25) 0%, rgba(251,59,36,0.08) 100%);
    color: #FB3B24;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(11px, 1.5vh, 14px);
    font-weight: 800;
    flex-shrink: 0;
    border: 1px solid rgba(251,59,36,0.3);
  }

  .bubble {
    background: #1F1F1F;
    border: 1px solid #2A2A2A;
    border-radius: 4px clamp(14px, 1.6vh, 16px) clamp(14px, 1.6vh, 16px) clamp(14px, 1.6vh, 16px);
    padding: clamp(9px, 1.2vh, 12px) clamp(12px, 1.5vw, 15px);
    font-size: clamp(13px, 1.7vh, 15px);
    color: rgba(255,255,255,0.92);
    line-height: 1.5;
    font-weight: 400;
    letter-spacing: -0.1px;
  }
  .bubble b {
    color: #FB3B24;
    font-weight: 700;
  }

  .typing-bubble {
    background: #1F1F1F;
    border: 1px solid #2A2A2A;
    border-radius: 4px 14px 14px 14px;
    padding: 10px 14px;
    display: inline-flex;
    gap: 4px;
  }
  .typing-bubble span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.45);
    animation: typingBlink 1.2s ease-in-out infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typingBlink {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-2px); }
  }

  /* Product carousel inside chat */
  .products-msg {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-start;
    align-self: flex-start;
    max-width: 92%;
    width: 100%;
    margin-left: clamp(35px, 4.4vh, 41px);
  }
  .products {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(6px, 1vw, 10px);
    width: 100%;
  }
  .product {
    background: #1F1F1F;
    border: 1px solid #2A2A2A;
    border-radius: 10px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s, transform 0.4s, border-color 0.3s;
    cursor: pointer;
    min-width: 0;
  }
  .product.show { opacity: 1; transform: translateY(0); }
  .product:hover { border-color: rgba(251,59,36,0.4); }
  .prod-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    position: relative;
    overflow: hidden;
  }
  .prod-img.botanical {
    background:
      radial-gradient(circle at 30% 30%, #5C8E5C 0%, transparent 30%),
      radial-gradient(circle at 70% 60%, #C0E0A6 0%, transparent 25%),
      radial-gradient(circle at 50% 80%, #4A7849 0%, transparent 35%),
      linear-gradient(135deg, #1E2A1C 0%, #2A3826 100%);
  }
  .prod-img.stripe {
    background:
      repeating-linear-gradient(180deg, #E8C99B 0px, #E8C99B 5px, #D4A876 5px, #D4A876 10px),
      #B8915F;
  }
  .prod-img.constellation {
    background:
      radial-gradient(circle at 25% 35%, #fff 0%, transparent 1.2%),
      radial-gradient(circle at 55% 20%, #fff 0%, transparent 0.8%),
      radial-gradient(circle at 75% 45%, #fff 0%, transparent 1%),
      radial-gradient(circle at 40% 65%, #fff 0%, transparent 0.9%),
      radial-gradient(circle at 65% 80%, #fff 0%, transparent 1.1%),
      radial-gradient(circle at 20% 80%, #fff 0%, transparent 0.7%),
      linear-gradient(180deg, #1B2547 0%, #2C3A6E 100%);
  }
  .prod-info {
    padding: clamp(6px, 1vh, 9px) clamp(7px, 1vw, 10px);
  }
  .prod-name {
    font-size: clamp(10px, 1.3vh, 12px);
    font-weight: 700;
    color: rgba(255,255,255,0.92);
    line-height: 1.25;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .prod-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 4px;
    font-size: clamp(9px, 1.1vh, 10.5px);
  }
  .prod-size {
    color: rgba(255,255,255,0.45);
    font-weight: 600;
    font-family: ui-monospace, monospace;
  }
  .prod-price {
    color: #FB3B24;
    font-weight: 700;
    font-family: ui-monospace, monospace;
  }

  /* Quick replies */
  .quick-replies {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 2px;
    align-self: flex-start;
    margin-left: clamp(35px, 4.4vh, 41px);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s, transform 0.4s;
  }
  .quick-replies.show { opacity: 1; transform: translateY(0); }
  .qr {
    font-size: clamp(11px, 1.4vh, 13px);
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    background: #1F1F1F;
    border: 1px solid #2A2A2A;
    border-radius: 14px;
    padding: 5px 11px;
    transition: background 0.2s, border-color 0.2s;
  }
  .qr:hover { background: #262626; border-color: #353535; }
  .qr.primary {
    background: rgba(251,59,36,0.12);
    border-color: rgba(251,59,36,0.45);
    color: #FB3B24;
  }

  /* Input bar */
  .chat-input {
    border-top: 1px solid #232323;
    padding: clamp(10px, 1.4vh, 13px) clamp(14px, 2vw, 18px);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: #171717;
  }
  .input-pill {
    flex: 1;
    background: #1F1F1F;
    border: 1px solid #2A2A2A;
    border-radius: 20px;
    padding: clamp(8px, 1.2vh, 11px) clamp(13px, 1.5vw, 16px);
    font-size: clamp(12px, 1.5vh, 13px);
    color: rgba(255,255,255,0.4);
    min-width: 0;
  }
  .send-btn {
    width: clamp(34px, 4.5vh, 40px);
    height: clamp(34px, 4.5vh, 40px);
    border-radius: 50%;
    background: #FB3B24;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(14px, 1.8vh, 16px);
    font-weight: 700;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(251,59,36,0.3);
  }

  .card-footer {
    font-size: clamp(11px, 1.5vh, 14px);
    color: rgba(255,255,255,0.55);
    font-weight: 500;
    flex-shrink: 0;
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-label">Custom AI · Proactive Concierge</div>

  <div class="chat-window">
    <div class="chat-header">
      <div class="brand">
        <div class="brand-mark">P</div>
        <div class="brand-info">
          <div class="brand-name">Petit Atelier</div>
          <div class="brand-status">AI Concierge · Online</div>
        </div>
      </div>
      <div class="chat-actions">⋯</div>
    </div>

    <div class="chat-body" id="chatBody">
      <div class="memory-chip" id="memChip">
        <span class="mem-mark">⟁</span>
        <span>Returning · <b>last visit 6 weeks ago</b> · daughter sized 0–3M</span>
      </div>
      <!-- Messages get injected here -->
    </div>

    <div class="chat-input">
      <div class="input-pill">Reply to Petit Atelier…</div>
      <div class="send-btn">↑</div>
    </div>
  </div>

  <div class="card-footer">On-site AI built on your catalog and customer memory.</div>
</div>

<script>
var chatBody = document.getElementById('chatBody');
var memChip = document.getElementById('memChip');

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function addMessage(html) {
  var m = document.createElement('div');
  m.className = 'msg ai';
  m.innerHTML = '<div class="avatar">✦</div><div class="bubble">' + html + '</div>';
  chatBody.appendChild(m);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { m.classList.add('show'); });
  });
  return m;
}

function addTyping() {
  var t = document.createElement('div');
  t.className = 'msg ai';
  t.innerHTML = '<div class="avatar">✦</div><div class="typing-bubble"><span></span><span></span><span></span></div>';
  chatBody.appendChild(t);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { t.classList.add('show'); });
  });
  return t;
}

function addProductsRow() {
  var wrap = document.createElement('div');
  wrap.className = 'products-msg';
  wrap.innerHTML =
    '<div class="products">' +
      '<div class="product"><div class="prod-img botanical"></div>' +
        '<div class="prod-info"><div class="prod-name">Botanical Bloom Romper</div>' +
        '<div class="prod-meta"><span class="prod-size">3-6M</span><span class="prod-price">£42</span></div></div></div>' +
      '<div class="product"><div class="prod-img stripe"></div>' +
        '<div class="prod-info"><div class="prod-name">Sand Stripe Onesie</div>' +
        '<div class="prod-meta"><span class="prod-size">3-6M</span><span class="prod-price">£28</span></div></div></div>' +
      '<div class="product"><div class="prod-img constellation"></div>' +
        '<div class="prod-info"><div class="prod-name">Constellation Sleeper</div>' +
        '<div class="prod-meta"><span class="prod-size">3-6M</span><span class="prod-price">£38</span></div></div></div>' +
    '</div>';
  chatBody.appendChild(wrap);
  return wrap;
}

function addQuickReplies() {
  var qr = document.createElement('div');
  qr.className = 'quick-replies';
  qr.innerHTML =
    '<button class="qr primary">Add favourites to bag</button>' +
    '<button class="qr">Show more prints</button>' +
    '<button class="qr">Save for later</button>';
  chatBody.appendChild(qr);
  return qr;
}

async function runCycle() {
  // Reset
  chatBody.querySelectorAll('.msg, .products-msg, .quick-replies').forEach(function(el) {
    el.remove();
  });
  memChip.classList.remove('show');

  await sleep(500);

  // Memory chip
  memChip.classList.add('show');
  await sleep(700);

  // Typing → first message
  var t1 = addTyping();
  await sleep(1100);
  t1.remove();
  addMessage('Welcome back! Based on your last visit, it might be time to <b>size up to 3–6 Months</b>.');
  await sleep(1200);

  // Typing → second message
  var t2 = addTyping();
  await sleep(900);
  t2.remove();
  addMessage('Here are our newest prints in that size:');
  await sleep(450);

  // Product cards
  var prodWrap = addProductsRow();
  var cards = prodWrap.querySelectorAll('.product');
  for (var i = 0; i < cards.length; i++) {
    (function(idx) {
      setTimeout(function() { cards[idx].classList.add('show'); }, idx * 180);
    })(i);
  }
  await sleep(180 * cards.length + 200);

  // Quick replies
  var qr = addQuickReplies();
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { qr.classList.add('show'); });
  });

  // Hold
  await sleep(5500);

  runCycle();
}

window.addEventListener('load', function() { setTimeout(runCycle, 200); });
</script>
</body>
</html>
