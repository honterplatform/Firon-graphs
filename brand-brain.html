<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Firon AI Engine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0F0F0F;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
  }

  .card {
    width: 100%;
    height: 100%;
    background: #0F0F0F;
    padding: clamp(16px, 3vh, 28px) clamp(16px, 3vw, 32px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* --- Stage: nodes | connectors | engine --- */
  .stage {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr) minmax(0, 1fr);
    gap: 0;
    align-items: stretch;
    position: relative;
  }

  /* === LEFT: 4 input nodes === */
  .nodes-col {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    gap: clamp(8px, 1.5vh, 16px);
    padding: clamp(4px, 1vh, 8px) 0;
    z-index: 2;
  }
  .input-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .input-node.show { opacity: 1; transform: translateX(0); }

  .node-icon {
    width: clamp(46px, 6.5vh, 60px);
    height: clamp(46px, 6.5vh, 60px);
    border-radius: 14px;
    background: #141414;
    border: 1px solid #232323;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.85);
    transition: border-color 0.4s, box-shadow 0.4s, background 0.4s;
    position: relative;
  }
  .node-icon svg {
    width: 50%;
    height: 50%;
  }
  .input-node.firing .node-icon {
    border-color: rgba(251,59,36,0.5);
    background: linear-gradient(135deg, #141414 0%, rgba(251,59,36,0.08) 100%);
    box-shadow: 0 0 18px rgba(251,59,36,0.25);
  }
  .input-node.firing .node-icon svg { color: #FB3B24; }

  .node-label {
    font-size: clamp(10px, 1.3vh, 12px);
    font-weight: 600;
    color: rgba(255,255,255,0.65);
    text-align: center;
    line-height: 1.2;
    max-width: clamp(80px, 12vw, 130px);
    transition: color 0.3s;
  }
  .input-node.firing .node-label { color: rgba(255,255,255,0.95); }

  /* === MIDDLE: SVG connectors === */
  .conn-svg {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .conn-path {
    fill: none;
    stroke: rgba(255,255,255,0.12);
    stroke-width: 1.2;
    stroke-dasharray: 4 6;
    vector-effect: non-scaling-stroke;
  }
  .conn-path.flowing {
    stroke: #FB3B24;
    stroke-width: 1.4;
    stroke-dasharray: 6 8;
    animation: dashFlow 1.4s linear infinite;
    filter: drop-shadow(0 0 4px rgba(251,59,36,0.6));
  }
  @keyframes dashFlow {
    to { stroke-dashoffset: -28; }
  }

  .conn-junction {
    fill: rgba(255,255,255,0.2);
    transition: fill 0.4s;
  }
  .conn-junction.active {
    fill: #FB3B24;
    filter: drop-shadow(0 0 6px rgba(251,59,36,0.8));
  }

  /* === RIGHT: Firon AI Engine === */
  .engine-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  .engine {
    width: 100%;
    max-width: clamp(180px, 22vw, 240px);
    background: #141414;
    border: 1px solid #232323;
    border-radius: 16px;
    padding: clamp(14px, 2.2vh, 20px) clamp(14px, 2vw, 22px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(8px, 1.4vh, 12px);
    position: relative;
    opacity: 0;
    transform: scale(0.94);
    transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.6s ease, box-shadow 0.6s ease;
  }
  .engine.show { opacity: 1; transform: scale(1); }
  .engine.alive {
    border-color: rgba(251,59,36,0.4);
    box-shadow:
      0 0 0 1px rgba(251,59,36,0.15),
      0 0 40px rgba(251,59,36,0.18),
      0 16px 36px -16px rgba(0,0,0,0.55);
    animation: engineBreathe 3s ease-in-out infinite;
  }
  @keyframes engineBreathe {
    0%, 100% {
      box-shadow:
        0 0 0 1px rgba(251,59,36,0.15),
        0 0 28px rgba(251,59,36,0.18),
        0 16px 36px -16px rgba(0,0,0,0.55);
    }
    50% {
      box-shadow:
        0 0 0 1px rgba(251,59,36,0.3),
        0 0 50px rgba(251,59,36,0.32),
        0 16px 36px -16px rgba(0,0,0,0.55);
    }
  }

  .engine-orb {
    width: clamp(46px, 6.5vh, 60px);
    height: clamp(46px, 6.5vh, 60px);
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #FB3B24 0%, #C72D17 70%, #8B1D0C 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(22px, 3.2vh, 30px);
    font-weight: 800;
    position: relative;
    flex-shrink: 0;
  }
  .engine-orb::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(251,59,36,0.4);
    animation: orbPulse 2.4s ease-out infinite;
  }
  .engine-orb::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(251,59,36,0.4);
    animation: orbPulse 2.4s ease-out 1.2s infinite;
  }
  @keyframes orbPulse {
    0% { transform: scale(1); opacity: 0.7; }
    100% { transform: scale(1.45); opacity: 0; }
  }
  .engine.show .engine-orb svg { width: 55%; height: 55%; }

  .engine-name {
    font-size: clamp(13px, 1.7vh, 16px);
    font-weight: 800;
    color: #fff;
    text-align: center;
    letter-spacing: -0.2px;
    line-height: 1.1;
  }
  .engine-name span {
    color: #FB3B24;
  }
  .engine-status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: clamp(9px, 1.1vh, 10.5px);
    font-weight: 700;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .engine-status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #FB3B24;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.4;} }
  .engine-meta {
    font-size: clamp(9px, 1vh, 10px);
    color: #555;
    font-family: ui-monospace, monospace;
    letter-spacing: 0.3px;
    text-align: center;
  }
  .engine-meta b { color: rgba(255,255,255,0.7); font-weight: 700; }

  /* === MOBILE: keep horizontal flow but compress === */
  @media (max-aspect-ratio: 1/1) {
    .card { padding: 14px 12px; }
    .stage {
      grid-template-columns: minmax(0, 0.8fr) minmax(0, 1fr) minmax(0, 0.95fr);
    }
    .nodes-col {
      gap: 4px;
      padding: 0;
    }
    .node-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
    }
    .node-label {
      font-size: 9.5px;
      max-width: 100px;
    }
    .engine {
      padding: 12px 10px;
      gap: 6px;
      max-width: 100%;
    }
    .engine-orb {
      width: 38px;
      height: 38px;
      font-size: 18px;
    }
    .engine-name { font-size: 12px; }
    .engine-status { font-size: 8.5px; }
    .engine-meta { font-size: 8.5px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="stage" id="stage">
    <!-- SVG connectors layered behind -->
    <svg class="conn-svg" id="connSvg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <path class="conn-path" id="p0" d="M 0 12.5 C 35 12.5, 65 50, 100 50"></path>
      <path class="conn-path" id="p1" d="M 0 37.5 C 35 37.5, 65 50, 100 50"></path>
      <path class="conn-path" id="p2" d="M 0 62.5 C 35 62.5, 65 50, 100 50"></path>
      <path class="conn-path" id="p3" d="M 0 87.5 C 35 87.5, 65 50, 100 50"></path>
      <circle class="conn-junction" id="junction" cx="100" cy="50" r="1.4"></circle>
    </svg>

    <!-- LEFT: 4 floating nodes -->
    <div class="nodes-col">
      <div class="input-node" data-i="0">
        <div class="node-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 7h14l-1.2 12.2a2 2 0 0 1-2 1.8H8.2a2 2 0 0 1-2-1.8L5 7z"/>
            <path d="M8 7V5a4 4 0 0 1 8 0v2"/>
          </svg>
        </div>
        <div class="node-label">Product Catalog</div>
      </div>
      <div class="input-node" data-i="1">
        <div class="node-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
          </svg>
        </div>
        <div class="node-label">Customer Support FAQs</div>
      </div>
      <div class="input-node" data-i="2">
        <div class="node-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <polyline points="9 12 11 14 15 10"/>
          </svg>
        </div>
        <div class="node-label">Brand Policies</div>
      </div>
      <div class="input-node" data-i="3">
        <div class="node-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 19l7-7 3 3-7 7-3-3z"/>
            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
            <path d="M2 2l7.586 7.586"/>
            <circle cx="11" cy="11" r="2"/>
          </svg>
        </div>
        <div class="node-label">Blogs &amp; Sizing Guides</div>
      </div>
    </div>

    <!-- MIDDLE: spacer (the SVG draws over this) -->
    <div></div>

    <!-- RIGHT: Firon AI Engine -->
    <div class="engine-wrap">
      <div class="engine" id="engine">
        <div class="engine-orb">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l1.8 5.6L19.4 6 17 11l5 1.5L17 14l2.4 5-5.6-1.6L12 23l-1.8-5.6L4.6 19 7 14l-5-1.5L7 11 4.6 6l5.6 1.6L12 2z"/>
          </svg>
        </div>
        <div class="engine-name">The <span>Firon</span> AI Engine</div>
        <div class="engine-status">
          <span class="engine-status-dot"></span>
          Live · ingesting
        </div>
        <div class="engine-meta">4 sources · <b>synced</b></div>
      </div>
    </div>
  </div>
</div>

<script>
var nodes = document.querySelectorAll('.input-node');
var paths = [
  document.getElementById('p0'),
  document.getElementById('p1'),
  document.getElementById('p2'),
  document.getElementById('p3')
];
var junction = document.getElementById('junction');
var engine = document.getElementById('engine');

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function runCycle() {
  // Reset
  nodes.forEach(function(n) { n.classList.remove('show', 'firing'); });
  paths.forEach(function(p) { p.classList.remove('flowing'); });
  junction.classList.remove('active');
  engine.classList.remove('show', 'alive');

  await sleep(400);

  // Nodes appear with stagger from top to bottom
  for (var i = 0; i < nodes.length; i++) {
    nodes[i].classList.add('show');
    await sleep(180);
  }

  await sleep(300);

  // Engine fades in
  engine.classList.add('show');
  await sleep(550);

  // Data starts flowing: nodes fire, connections animate, junction lights up
  for (var i = 0; i < nodes.length; i++) {
    nodes[i].classList.add('firing');
    paths[i].classList.add('flowing');
    if (i === 0) {
      // Junction lights as soon as first stream reaches it
      setTimeout(function() { junction.classList.add('active'); }, 700);
    }
    await sleep(220);
  }

  // Engine comes alive once all inputs are flowing
  await sleep(500);
  engine.classList.add('alive');

  // Hold ingestion state
  await sleep(5200);
  runCycle();
}

window.addEventListener('load', function() { setTimeout(runCycle, 200); });
</script>
</body>
</html>
