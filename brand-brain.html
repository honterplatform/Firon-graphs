<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Firon AI Engine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0F0F0F;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
  }

  .card {
    width: 100%;
    height: 100%;
    background: #0F0F0F;
    padding: clamp(16px, 3vh, 26px) clamp(16px, 3vw, 28px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* --- Stage: nodes | connectors | engine --- */
  .stage {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr) minmax(0, 1.1fr);
    gap: 0;
    align-items: stretch;
    position: relative;
  }

  /* === LEFT: 4 input nodes === */
  .nodes-col {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    gap: clamp(6px, 1.2vh, 12px);
    padding: clamp(4px, 1vh, 8px) 0;
    z-index: 2;
  }
  .input-node {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .input-node.show { opacity: 1; transform: translateX(0); }

  .node-icon {
    width: clamp(34px, 4.8vh, 42px);
    height: clamp(34px, 4.8vh, 42px);
    border-radius: 8px;
    background: #141414;
    border: 1px solid #232323;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.7);
    transition: border-color 0.4s, color 0.4s, background 0.4s;
    flex-shrink: 0;
  }
  .node-icon svg {
    width: 50%;
    height: 50%;
  }
  .input-node.firing .node-icon {
    border-color: rgba(251,59,36,0.45);
    background: rgba(251,59,36,0.04);
    color: #FB3B24;
  }

  .node-label {
    font-size: clamp(10.5px, 1.3vh, 12px);
    font-weight: 600;
    color: rgba(255,255,255,0.65);
    line-height: 1.25;
    min-width: 0;
    transition: color 0.3s;
  }
  .input-node.firing .node-label { color: rgba(255,255,255,0.95); }

  /* === MIDDLE: SVG connectors === */
  .conn-svg {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .conn-path {
    fill: none;
    stroke: rgba(255,255,255,0.1);
    stroke-width: 1;
    stroke-dasharray: 3 5;
    vector-effect: non-scaling-stroke;
    transition: stroke 0.4s;
  }
  .conn-path.flowing {
    stroke: #FB3B24;
    stroke-width: 1.2;
    stroke-dasharray: 4 6;
    animation: dashFlow 1.6s linear infinite;
  }
  @keyframes dashFlow {
    to { stroke-dashoffset: -20; }
  }

  /* === RIGHT: Firon AI Engine === */
  .engine-wrap {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding-left: clamp(4px, 1vw, 10px);
    z-index: 2;
  }
  .engine {
    background: #141414;
    border: 1px solid #232323;
    border-radius: 8px;
    padding: clamp(12px, 1.8vh, 16px) clamp(14px, 1.8vw, 18px);
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 1.2vh, 11px);
    position: relative;
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.5s ease, transform 0.5s ease, border-color 0.4s;
    width: 100%;
    max-width: clamp(180px, 22vw, 240px);
  }
  .engine.show { opacity: 1; transform: translateX(0); }
  .engine.alive { border-color: rgba(251,59,36,0.4); }

  .engine-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: clamp(7px, 1.1vh, 10px);
    border-bottom: 1px solid #1E1E1E;
    flex-shrink: 0;
  }
  .engine-mark {
    width: clamp(22px, 3vh, 26px);
    height: clamp(22px, 3vh, 26px);
    border-radius: 6px;
    background: rgba(251,59,36,0.12);
    color: #FB3B24;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.4s;
  }
  .engine.alive .engine-mark { background: rgba(251,59,36,0.2); }
  .engine-mark svg {
    width: 55%;
    height: 55%;
  }
  .engine-title-group {
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
  }
  .engine-title {
    font-size: clamp(12px, 1.5vh, 13.5px);
    font-weight: 700;
    color: rgba(255,255,255,0.92);
    letter-spacing: -0.15px;
    line-height: 1.1;
  }
  .engine-title span { color: #FB3B24; }
  .engine-sub {
    font-size: clamp(8.5px, 1vh, 10px);
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-family: ui-monospace, monospace;
  }

  .engine-rows {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex-shrink: 0;
  }
  .erow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: clamp(9px, 1.1vh, 10.5px);
    color: rgba(255,255,255,0.55);
    font-family: ui-monospace, monospace;
  }
  .erow b {
    color: rgba(255,255,255,0.85);
    font-weight: 700;
  }
  .erow.status .er-val {
    color: #FB3B24;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-weight: 700;
  }
  .erow.status .er-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #FB3B24;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.4;} }

  /* === MOBILE === */
  @media (max-aspect-ratio: 1/1) {
    .card { padding: 12px 11px; }
    .stage {
      grid-template-columns: minmax(0, 0.85fr) minmax(0, 1fr) minmax(0, 1fr);
    }
    .nodes-col { gap: 5px; padding: 0; }
    .input-node { gap: 7px; }
    .node-icon {
      width: 30px;
      height: 30px;
      border-radius: 6px;
    }
    .node-label { font-size: 10px; }
    .engine {
      padding: 10px 11px;
      gap: 7px;
    }
    .engine-mark { width: 22px; height: 22px; }
    .engine-title { font-size: 11.5px; }
    .engine-sub { font-size: 8.5px; }
    .erow { font-size: 9px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="stage" id="stage">
    <!-- SVG connectors layered behind. Paths end at x=66 so they meet the left edge
         of the engine card (third grid column) instead of continuing to the stage edge. -->
    <svg class="conn-svg" id="connSvg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <path class="conn-path" id="p0" d="M 0 12.5 C 28 12.5, 50 50, 66 50"></path>
      <path class="conn-path" id="p1" d="M 0 37.5 C 28 37.5, 50 50, 66 50"></path>
      <path class="conn-path" id="p2" d="M 0 62.5 C 28 62.5, 50 50, 66 50"></path>
      <path class="conn-path" id="p3" d="M 0 87.5 C 28 87.5, 50 50, 66 50"></path>
    </svg>

    <!-- LEFT: 4 floating nodes -->
    <div class="nodes-col">
      <div class="input-node" data-i="0">
        <div class="node-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 7h14l-1.2 12.2a2 2 0 0 1-2 1.8H8.2a2 2 0 0 1-2-1.8L5 7z"/>
            <path d="M8 7V5a4 4 0 0 1 8 0v2"/>
          </svg>
        </div>
        <div class="node-label">Product Catalog</div>
      </div>
      <div class="input-node" data-i="1">
        <div class="node-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
          </svg>
        </div>
        <div class="node-label">Customer Support FAQs</div>
      </div>
      <div class="input-node" data-i="2">
        <div class="node-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <polyline points="9 12 11 14 15 10"/>
          </svg>
        </div>
        <div class="node-label">Brand Policies</div>
      </div>
      <div class="input-node" data-i="3">
        <div class="node-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="8" y1="13" x2="16" y2="13"/>
            <line x1="8" y1="17" x2="14" y2="17"/>
          </svg>
        </div>
        <div class="node-label">Blogs &amp; Sizing Guides</div>
      </div>
    </div>

    <!-- MIDDLE: spacer (SVG draws over) -->
    <div></div>

    <!-- RIGHT: Firon AI Engine -->
    <div class="engine-wrap">
      <div class="engine" id="engine">
        <div class="engine-head">
          <div class="engine-mark">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 3l1.6 5L19 9.6l-4 3.3 1.3 5.4L12 15l-4.3 3.3 1.3-5.4-4-3.3L10.4 8 12 3z"/>
            </svg>
          </div>
          <div class="engine-title-group">
            <div class="engine-title">The <span>Firon</span> AI Engine</div>
            <div class="engine-sub">Unified · indexed</div>
          </div>
        </div>
        <div class="engine-rows">
          <div class="erow"><span>Sources</span><b>4 / 4</b></div>
          <div class="erow"><span>Edges</span><b>1,829</b></div>
          <div class="erow status"><span>Status</span><span class="er-val"><span class="er-dot"></span>Ingesting</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var nodes = document.querySelectorAll('.input-node');
var paths = [
  document.getElementById('p0'),
  document.getElementById('p1'),
  document.getElementById('p2'),
  document.getElementById('p3')
];
var engine = document.getElementById('engine');

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function runCycle() {
  nodes.forEach(function(n) { n.classList.remove('show', 'firing'); });
  paths.forEach(function(p) { p.classList.remove('flowing'); });
  engine.classList.remove('show', 'alive');

  await sleep(400);

  for (var i = 0; i < nodes.length; i++) {
    nodes[i].classList.add('show');
    await sleep(160);
  }

  await sleep(250);

  engine.classList.add('show');
  await sleep(450);

  for (var i = 0; i < nodes.length; i++) {
    nodes[i].classList.add('firing');
    paths[i].classList.add('flowing');
    await sleep(200);
  }

  await sleep(400);
  engine.classList.add('alive');

  await sleep(5000);
  runCycle();
}

window.addEventListener('load', function() { setTimeout(runCycle, 200); });
</script>
</body>
</html>
