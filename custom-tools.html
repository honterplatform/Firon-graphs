<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Tools Page</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0F0F0F;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
    /* Scale type to viewport so the layout adapts to short iframes */
    font-size: clamp(9px, 1.6vh, 13px);
  }

  .stage {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: clamp(6px, 1vh, 12px);
    padding: clamp(6px, 1.2vh, 12px);
  }

  .panel {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: clamp(8px, 1.4vh, 14px);
    display: flex;
    flex-direction: column;
    gap: clamp(6px, 1vh, 10px);
    position: relative;
    overflow: hidden;
    min-height: 0;
    min-width: 0;
  }

  /* --- Tool header --- */
  .tool-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: clamp(4px, 0.8vh, 8px);
    border-bottom: 1px solid #1E1E1E;
    flex-shrink: 0;
  }
  .tool-title { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .tool-icon {
    width: 1.6em; height: 1.6em;
    background: rgba(251,59,36,0.12);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    color: #FB3B24;
    font-size: 0.85em;
    flex-shrink: 0;
  }
  .tool-name {
    font-size: 0.92em;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tool-name span {
    color: #555;
    font-weight: 500;
    margin-left: 4px;
  }
  .api-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.65em;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #FB3B24;
    background: rgba(251,59,36,0.08);
    border: 1px solid rgba(251,59,36,0.2);
    padding: 3px 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .api-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #FB3B24;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% {opacity:1;} 50% {opacity:0.3;} }

  /* --- Input row --- */
  .input-row {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .input-field {
    flex: 1;
    min-width: 0;
    background: #0D0D0D;
    border: 1px solid #222;
    border-radius: 6px;
    padding: clamp(5px, 0.9vh, 9px) 10px;
    font-size: 0.92em;
    color: rgba(255,255,255,0.85);
    font-family: ui-monospace, monospace;
    display: flex;
    align-items: center;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-field.focused {
    border-color: rgba(251,59,36,0.4);
    box-shadow: 0 0 0 2px rgba(251,59,36,0.06);
  }
  .input-text { white-space: nowrap; overflow: hidden; }
  .input-cursor {
    display: inline-block;
    width: 1.5px;
    height: 1em;
    background: #FB3B24;
    margin-left: 1px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  .scan-btn {
    background: #FB3B24;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 0 12px;
    font-size: 0.82em;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.1s, box-shadow 0.2s, background 0.2s, color 0.2s;
  }
  .scan-btn.pressed {
    transform: scale(0.95);
    box-shadow: 0 0 12px rgba(251,59,36,0.4);
  }
  .scan-btn.loading {
    background: #1A1A1A;
    color: rgba(255,255,255,0.4);
    cursor: wait;
  }

  /* --- Processing strip (replaces input-row visually when active to save space) --- */
  .processing {
    background: #0D0D0D;
    border: 1px solid #1E1E1E;
    border-radius: 6px;
    padding: clamp(5px, 0.8vh, 8px) 10px;
    font-size: 0.78em;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    height: 0;
    opacity: 0;
    overflow: hidden;
    transition: height 0.25s, opacity 0.2s, padding 0.25s, border-color 0.25s;
    border-color: transparent;
    padding-top: 0;
    padding-bottom: 0;
  }
  .processing.active {
    height: auto;
    opacity: 1;
    padding-top: clamp(5px, 0.8vh, 8px);
    padding-bottom: clamp(5px, 0.8vh, 8px);
    border-color: #1E1E1E;
  }
  .shimmer {
    flex: 1;
    height: 5px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(251,59,36,0.15) 30%,
      rgba(251,59,36,0.4) 50%,
      rgba(251,59,36,0.15) 70%,
      transparent 100%
    );
    background-size: 200% 100%;
    border-radius: 3px;
    animation: shimmerMove 1.4s linear infinite;
  }
  @keyframes shimmerMove {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .proc-step {
    font-family: ui-monospace, monospace;
    color: rgba(255,255,255,0.55);
    font-size: 0.85em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* --- Results --- */
  .results {
    flex: 1;
    min-height: 0;
    background: #0D0D0D;
    border: 1px solid #1E1E1E;
    border-radius: 6px;
    padding: clamp(8px, 1.2vh, 12px);
    display: flex;
    flex-direction: column;
    gap: clamp(4px, 0.8vh, 8px);
    opacity: 0.3;
    transition: opacity 0.4s;
    overflow: hidden;
  }
  .results.active { opacity: 1; }
  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-bottom: clamp(4px, 0.6vh, 6px);
    border-bottom: 1px solid #1A1A1A;
    flex-shrink: 0;
  }
  .results-label {
    font-size: 0.7em;
    font-weight: 700;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .score {
    font-size: 1.55em;
    font-weight: 800;
    color: #FB3B24;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .score-suffix { font-size: 0.75em; color: #555; font-weight: 600; }

  .metrics {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    gap: clamp(2px, 0.5vh, 6px);
  }
  .metric-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82em;
    opacity: 0;
    transform: translateY(3px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .metric-row.show { opacity: 1; transform: translateY(0); }
  .metric-name {
    color: rgba(255,255,255,0.7);
    flex: 1;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .metric-bar {
    flex: 1.2;
    height: 3px;
    background: #1A1A1A;
    border-radius: 2px;
    overflow: hidden;
  }
  .metric-fill {
    height: 100%;
    background: #FB3B24;
    width: 0;
    transition: width 0.6s cubic-bezier(.2,.8,.2,1);
  }
  .metric-value {
    color: rgba(255,255,255,0.5);
    font-family: ui-monospace, monospace;
    font-size: 0.85em;
    min-width: 28px;
    text-align: right;
  }

  /* Phantom cursor */
  .cursor {
    position: absolute;
    width: 12px;
    height: 16px;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.3s, transform 0.4s cubic-bezier(.5,.1,.3,1);
  }
  .cursor svg { width: 100%; height: 100%; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6)); }
  .cursor.show { opacity: 1; }
  .cursor.click::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border: 2px solid #FB3B24;
    border-radius: 50%;
    left: -6px; top: -4px;
    animation: clickRing 0.5s ease-out;
  }
  @keyframes clickRing {
    0% { opacity: 1; transform: scale(0.4); }
    100% { opacity: 0; transform: scale(1.4); }
  }

  /* --- Moat panel --- */
  .moat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: clamp(4px, 0.8vh, 8px);
    border-bottom: 1px solid #1E1E1E;
    flex-shrink: 0;
    gap: 6px;
  }
  .moat-title-group { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .moat-title {
    font-size: 0.92em;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
  }
  .moat-sub {
    font-size: 0.65em;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .moat-height { text-align: right; }
  .moat-h-value {
    font-size: 1.45em;
    font-weight: 800;
    color: #FB3B24;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .moat-h-label {
    font-size: 0.62em;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
    font-weight: 600;
  }

  .moat-area {
    flex: 1;
    min-height: 0;
    position: relative;
    background: linear-gradient(to bottom, transparent 0%, rgba(251,59,36,0.03) 100%);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 4px;
  }
  .moat-area::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: rgba(251,59,36,0.3);
  }
  .moat-bricks {
    display: flex;
    flex-direction: column-reverse;
    gap: 2px;
  }
  .brick {
    height: clamp(11px, 1.6vh, 16px);
    background: linear-gradient(180deg, rgba(251,59,36,0.18) 0%, rgba(251,59,36,0.10) 100%);
    border: 1px solid rgba(251,59,36,0.35);
    border-radius: 2px;
    display: flex;
    align-items: center;
    padding: 0 6px;
    font-size: 0.62em;
    font-weight: 700;
    color: rgba(251,59,36,0.9);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    transform: translateY(-300px);
    opacity: 0;
    animation: brickDrop 0.55s cubic-bezier(.45,1.5,.55,1) forwards;
    position: relative;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
  }
  .brick::after {
    content: '';
    position: absolute;
    right: 6px;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #FB3B24;
    box-shadow: 0 0 6px #FB3B24;
  }
  @keyframes brickDrop {
    0% { transform: translateY(-300px); opacity: 0; }
    70% { transform: translateY(3px); opacity: 1; }
    100% { transform: translateY(0); opacity: 1; }
  }

  .moat-footer {
    display: flex;
    gap: 5px;
    padding-top: clamp(4px, 0.8vh, 8px);
    border-top: 1px solid #1E1E1E;
    flex-shrink: 0;
  }
  .stat {
    flex: 1;
    background: #0D0D0D;
    border: 1px solid #1E1E1E;
    border-radius: 4px;
    padding: clamp(4px, 0.7vh, 7px) 6px;
    min-width: 0;
  }
  .stat-label {
    font-size: 0.58em;
    font-weight: 700;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 2px;
    white-space: nowrap;
  }
  .stat-value {
    font-size: 1em;
    font-weight: 800;
    color: rgba(255,255,255,0.9);
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .stat-value.red { color: #FB3B24; }

  /* Tight viewport: stack vertically */
  @media (max-aspect-ratio: 1/1) {
    .stage { grid-template-columns: 1fr; grid-template-rows: 1.6fr 1fr; }
  }
</style>
</head>
<body>
<div class="stage">
  <!-- Tool panel -->
  <div class="panel">
    <div class="tool-header">
      <div class="tool-title">
        <div class="tool-icon">✦</div>
        <div class="tool-name">AI Visibility Scanner <span>by Your Brand</span></div>
      </div>
      <div class="api-badge">
        <span class="api-dot"></span>
        Claude API
      </div>
    </div>

    <div class="input-row">
      <div class="input-field" id="inputField">
        <span class="input-text" id="inputText"></span>
        <span class="input-cursor" id="inputCursor"></span>
      </div>
      <button class="scan-btn" id="scanBtn">Scan</button>
    </div>

    <div class="processing" id="processing">
      <div class="proc-step" id="procStep">Sending to Claude API…</div>
      <div class="shimmer"></div>
    </div>

    <div class="results" id="results">
      <div class="results-header">
        <div class="results-label">AI Citation Score</div>
        <div><span class="score" id="scoreVal">0</span><span class="score-suffix">/100</span></div>
      </div>
      <div class="metrics">
        <div class="metric-row">
          <div class="metric-name">Schema coverage</div>
          <div class="metric-bar"><div class="metric-fill" data-target="64"></div></div>
          <div class="metric-value">64%</div>
        </div>
        <div class="metric-row">
          <div class="metric-name">Entity recognition</div>
          <div class="metric-bar"><div class="metric-fill" data-target="42"></div></div>
          <div class="metric-value">42%</div>
        </div>
        <div class="metric-row">
          <div class="metric-name">Citation rate</div>
          <div class="metric-bar"><div class="metric-fill" data-target="28"></div></div>
          <div class="metric-value">28%</div>
        </div>
      </div>
    </div>

    <div class="cursor" id="cursor">
      <svg viewBox="0 0 14 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1 L1 13 L4.5 10 L7 15 L9 14 L6.5 9 L11 9 Z"
              fill="#fff" stroke="#000" stroke-width="0.8" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <!-- Moat panel -->
  <div class="panel">
    <div class="moat-header">
      <div class="moat-title-group">
        <div class="moat-title">GEO Moat</div>
        <div class="moat-sub">Competitor barrier</div>
      </div>
      <div class="moat-height">
        <div class="moat-h-value"><span id="moatH">0</span>%</div>
        <div class="moat-h-label">Lock-in</div>
      </div>
    </div>

    <div class="moat-area">
      <div class="moat-bricks" id="bricks"></div>
    </div>

    <div class="moat-footer">
      <div class="stat">
        <div class="stat-label">Interactions</div>
        <div class="stat-value red" id="statInter">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Signals</div>
        <div class="stat-value" id="statSig">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Bricks</div>
        <div class="stat-value" id="statBricks">0</div>
      </div>
    </div>
  </div>
</div>

<script>
var inputField = document.getElementById('inputField');
var inputText = document.getElementById('inputText');
var scanBtn = document.getElementById('scanBtn');
var processing = document.getElementById('processing');
var procStep = document.getElementById('procStep');
var results = document.getElementById('results');
var scoreVal = document.getElementById('scoreVal');
var cursor = document.getElementById('cursor');
var bricks = document.getElementById('bricks');
var moatH = document.getElementById('moatH');
var statInter = document.getElementById('statInter');
var statSig = document.getElementById('statSig');
var statBricks = document.getElementById('statBricks');

var QUERIES = [
  { domain: 'your-saas.com', score: 84 },
  { domain: 'boutique-brand.io', score: 67 },
  { domain: 'ecommerce-store.com', score: 91 },
  { domain: 'agency-firm.co', score: 73 },
  { domain: 'fintech-app.com', score: 88 }
];

var BRICK_LABELS = [
  'Schema indexed',
  'User dwell signal',
  'Citation backlink',
  'Entity claim',
  'Engagement event',
  'AI training signal',
  'Authority cluster',
  'Behavioral lock',
  'Topic ownership',
  'Moat reinforced'
];

var queryIdx = 0;
var brickCount = 0;
var interCount = 0;
var sigCount = 0;
var moatPct = 0;

function tween(from, to, dur, cb, done) {
  var start = Date.now();
  function step() {
    var t = Math.min(1, (Date.now() - start) / dur);
    var v = from + (to - from) * (1 - Math.pow(1 - t, 3));
    cb(v);
    if (t < 1) requestAnimationFrame(step);
    else if (done) done();
  }
  requestAnimationFrame(step);
}

function sleep(ms) {
  return new Promise(function(r) { setTimeout(r, ms); });
}

function moveCursorTo(targetEl, opts) {
  opts = opts || {};
  var stage = inputField.parentNode.parentNode;
  var stageRect = stage.getBoundingClientRect();
  var targetRect = targetEl.getBoundingClientRect();
  var x = targetRect.left - stageRect.left + (opts.offsetX || targetRect.width * 0.3);
  var y = targetRect.top - stageRect.top + (opts.offsetY || targetRect.height * 0.5);
  cursor.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
}

async function typeInto(text) {
  inputText.textContent = '';
  inputField.classList.add('focused');
  for (var i = 0; i <= text.length; i++) {
    inputText.textContent = text.substring(0, i);
    await sleep(40 + Math.random() * 50);
  }
}

function addBrick(label) {
  var b = document.createElement('div');
  b.className = 'brick';
  b.textContent = label;
  bricks.appendChild(b);
  // Cap visible bricks; oldest fade out
  while (bricks.children.length > 8) {
    bricks.removeChild(bricks.firstChild);
  }
}

async function runCycle() {
  var q = QUERIES[queryIdx % QUERIES.length];
  queryIdx++;

  // Reset state
  inputText.textContent = '';
  inputField.classList.remove('focused');
  scanBtn.classList.remove('pressed', 'loading');
  scanBtn.textContent = 'Scan';
  processing.classList.remove('active');
  results.classList.remove('active');
  document.querySelectorAll('.metric-row').forEach(function(r) { r.classList.remove('show'); });
  document.querySelectorAll('.metric-fill').forEach(function(f) { f.style.width = '0'; });
  scoreVal.textContent = '0';

  await sleep(300);

  // Cursor → input
  cursor.classList.add('show');
  moveCursorTo(inputField, { offsetX: 30, offsetY: 16 });
  await sleep(550);

  cursor.classList.add('click');
  await sleep(140);
  cursor.classList.remove('click');
  await typeInto(q.domain);
  await sleep(220);

  // Cursor → button
  moveCursorTo(scanBtn, { offsetX: 35, offsetY: 16 });
  await sleep(450);
  cursor.classList.add('click');
  scanBtn.classList.add('pressed');
  await sleep(180);
  scanBtn.classList.remove('pressed');
  cursor.classList.remove('click');
  cursor.classList.remove('show');

  // Loading
  scanBtn.classList.add('loading');
  scanBtn.textContent = 'Scanning…';
  processing.classList.add('active');

  var steps = [
    'Sending to Claude API…',
    'Analyzing schema…',
    'Mapping entities…',
    'Computing score…'
  ];
  for (var s = 0; s < steps.length; s++) {
    procStep.textContent = steps[s];
    await sleep(380);
  }

  // Results
  processing.classList.remove('active');
  scanBtn.classList.remove('loading');
  scanBtn.textContent = 'Done';
  results.classList.add('active');

  tween(0, q.score, 800, function(v) {
    scoreVal.textContent = Math.round(v);
  });

  var metrics = document.querySelectorAll('.metric-row');
  for (var i = 0; i < metrics.length; i++) {
    setTimeout((function(idx) {
      return function() {
        metrics[idx].classList.add('show');
        var fill = metrics[idx].querySelector('.metric-fill');
        fill.style.width = fill.dataset.target + '%';
      };
    })(i), 150 + i * 160);
  }

  await sleep(1100);

  // Brick + stats
  addBrick(BRICK_LABELS[brickCount % BRICK_LABELS.length]);
  brickCount++;
  interCount += 1;
  sigCount += Math.floor(3 + Math.random() * 4);
  moatPct = Math.min(99, moatPct + 7 + Math.floor(Math.random() * 3));

  tween(parseInt(statInter.textContent), interCount, 600, function(v) {
    statInter.textContent = Math.round(v);
  });
  tween(parseInt(statSig.textContent), sigCount, 600, function(v) {
    statSig.textContent = Math.round(v);
  });
  tween(parseInt(statBricks.textContent), brickCount, 600, function(v) {
    statBricks.textContent = Math.round(v);
  });
  tween(parseInt(moatH.textContent), moatPct, 800, function(v) {
    moatH.textContent = Math.round(v);
  });

  scanBtn.textContent = 'Scan';
  await sleep(1200);

  runCycle();
}

cursor.style.transform = 'translate(-50px, -50px)';
runCycle();
</script>
</body>
</html>
