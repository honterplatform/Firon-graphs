<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom AI Shopping Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0F0F0F;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
    font-size: clamp(9px, 1.6vh, 13px);
  }

  .stage {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: clamp(6px, 1vh, 12px);
    padding: clamp(6px, 1.2vh, 12px);
  }

  .panel {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: clamp(8px, 1.4vh, 14px);
    display: flex;
    flex-direction: column;
    gap: clamp(6px, 1vh, 10px);
    position: relative;
    overflow: hidden;
    min-height: 0;
    min-width: 0;
  }

  /* --- Chat header --- */
  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: clamp(4px, 0.8vh, 8px);
    border-bottom: 1px solid #1E1E1E;
    flex-shrink: 0;
    gap: 8px;
  }
  .chat-title { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .chat-icon {
    width: 1.7em; height: 1.7em;
    background: rgba(251,59,36,0.12);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #FB3B24;
    font-size: 0.9em;
    flex-shrink: 0;
    position: relative;
  }
  .chat-icon::after {
    content: '';
    position: absolute;
    bottom: -1px; right: -1px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4BC882;
    border: 1.5px solid #141414;
  }
  .chat-name {
    font-size: 0.92em;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chat-name span {
    color: #555;
    font-weight: 500;
    font-size: 0.85em;
  }
  .api-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.62em;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #FB3B24;
    background: rgba(251,59,36,0.08);
    border: 1px solid rgba(251,59,36,0.2);
    padding: 3px 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .api-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #FB3B24;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% {opacity:1;} 50% {opacity:0.3;} }

  /* Memory chip */
  .memory-chip {
    background: linear-gradient(90deg, rgba(251,59,36,0.06) 0%, rgba(251,59,36,0.02) 100%);
    border: 1px solid rgba(251,59,36,0.18);
    border-radius: 5px;
    padding: clamp(4px, 0.7vh, 7px) clamp(8px, 1.1vh, 11px);
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72em;
    color: rgba(255,255,255,0.6);
    flex-shrink: 0;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.4s, transform 0.4s;
  }
  .memory-chip.show { opacity: 1; transform: translateY(0); }
  .mem-icon {
    color: #FB3B24;
    font-weight: 800;
    font-size: 0.9em;
  }
  .mem-text strong {
    color: rgba(255,255,255,0.9);
    font-weight: 700;
    font-family: ui-monospace, monospace;
    font-size: 0.92em;
  }

  /* Chat body */
  .chat-body {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: clamp(5px, 0.8vh, 8px);
    overflow: hidden;
    position: relative;
  }

  .msg {
    display: flex;
    gap: 6px;
    align-items: flex-end;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s;
    max-width: 90%;
  }
  .msg.show { opacity: 1; transform: translateY(0); }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 1.4em; height: 1.4em;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7em;
    font-weight: 800;
    flex-shrink: 0;
  }
  .msg.ai .msg-avatar {
    background: rgba(251,59,36,0.15);
    color: #FB3B24;
  }
  .msg.user .msg-avatar {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6);
  }

  .msg-bubble {
    background: #0D0D0D;
    border: 1px solid #1E1E1E;
    border-radius: 9px;
    padding: clamp(5px, 0.8vh, 8px) clamp(8px, 1.1vh, 11px);
    font-size: 0.82em;
    color: rgba(255,255,255,0.85);
    line-height: 1.35;
  }
  .msg.user .msg-bubble {
    background: rgba(251,59,36,0.12);
    border-color: rgba(251,59,36,0.3);
    color: rgba(255,255,255,0.95);
  }
  .msg-bubble b { color: #FB3B24; font-weight: 700; }

  /* Typing indicator */
  .typing-dots {
    display: inline-flex;
    gap: 3px;
    padding: 2px 0;
    align-items: center;
  }
  .typing-dots span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    animation: typingBlink 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typingBlink {
    0%, 60%, 100% { opacity: 0.3; }
    30% { opacity: 1; }
  }

  /* Product cards inside chat */
  .product-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 4px;
  }
  .product-card {
    display: flex;
    align-items: center;
    gap: 7px;
    background: #0D0D0D;
    border: 1px solid #1E1E1E;
    border-radius: 6px;
    padding: clamp(4px, 0.6vh, 6px) clamp(6px, 0.9vh, 8px);
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.3s, transform 0.3s, border-color 0.3s, background 0.3s;
  }
  .product-card.show { opacity: 1; transform: translateX(0); }
  .product-card.selected {
    border-color: rgba(75,200,130,0.45);
    background: rgba(75,200,130,0.04);
  }
  .prod-img {
    width: 1.8em; height: 1.8em;
    border-radius: 4px;
    background: linear-gradient(135deg, #2A1F1A 0%, #1A1410 100%);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .prod-img::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
  }
  .prod-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .prod-name {
    font-size: 0.78em;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .prod-meta {
    font-size: 0.62em;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .prod-price {
    font-size: 0.8em;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    font-family: ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .product-card.selected .prod-price { color: #4BC882; }

  /* Quick action button */
  .quick-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .qa-btn {
    flex: 1;
    background: #FB3B24;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: clamp(6px, 0.9vh, 9px) 12px;
    font-size: 0.8em;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: transform 0.1s, box-shadow 0.2s, background 0.3s;
    opacity: 0.4;
  }
  .qa-btn.active { opacity: 1; }
  .qa-btn.pressed {
    transform: scale(0.97);
    box-shadow: 0 0 14px rgba(251,59,36,0.5);
  }
  .qa-btn.completed {
    background: #4BC882;
    color: #08200F;
  }

  /* --- Right side: Conversion Moat --- */
  .moat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: clamp(4px, 0.8vh, 8px);
    border-bottom: 1px solid #1E1E1E;
    flex-shrink: 0;
    gap: 6px;
  }
  .moat-title-group { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .moat-title {
    font-size: 0.92em;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
  }
  .moat-sub {
    font-size: 0.62em;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .moat-height { text-align: right; }
  .moat-h-value {
    font-size: 1.45em;
    font-weight: 800;
    color: #FB3B24;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .moat-h-label {
    font-size: 0.6em;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
    font-weight: 600;
  }

  .moat-area {
    flex: 1;
    min-height: 0;
    position: relative;
    background: linear-gradient(to bottom, transparent 0%, rgba(251,59,36,0.03) 100%);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 4px;
  }
  .moat-area::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: rgba(251,59,36,0.3);
  }
  .moat-bricks {
    display: flex;
    flex-direction: column-reverse;
    gap: 2px;
  }
  .brick {
    height: clamp(11px, 1.6vh, 16px);
    background: linear-gradient(180deg, rgba(251,59,36,0.18) 0%, rgba(251,59,36,0.10) 100%);
    border: 1px solid rgba(251,59,36,0.35);
    border-radius: 2px;
    display: flex;
    align-items: center;
    padding: 0 6px;
    font-size: 0.6em;
    font-weight: 700;
    color: rgba(251,59,36,0.9);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    transform: translateY(-300px);
    opacity: 0;
    animation: brickDrop 0.55s cubic-bezier(.45,1.5,.55,1) forwards;
    position: relative;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
  }
  .brick::after {
    content: '';
    position: absolute;
    right: 6px;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #FB3B24;
    box-shadow: 0 0 6px #FB3B24;
  }
  @keyframes brickDrop {
    0% { transform: translateY(-300px); opacity: 0; }
    70% { transform: translateY(3px); opacity: 1; }
    100% { transform: translateY(0); opacity: 1; }
  }

  .moat-footer {
    display: flex;
    gap: 5px;
    padding-top: clamp(4px, 0.8vh, 8px);
    border-top: 1px solid #1E1E1E;
    flex-shrink: 0;
  }
  .stat {
    flex: 1;
    background: #0D0D0D;
    border: 1px solid #1E1E1E;
    border-radius: 4px;
    padding: clamp(4px, 0.7vh, 7px) 6px;
    min-width: 0;
  }
  .stat-label {
    font-size: 0.56em;
    font-weight: 700;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stat-value {
    font-size: 1em;
    font-weight: 800;
    color: rgba(255,255,255,0.9);
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .stat-value.red { color: #FB3B24; }

  /* Tight viewport */
  @media (max-aspect-ratio: 1/1) {
    .stage { grid-template-columns: 1fr; grid-template-rows: 1.4fr 1fr; }
  }
</style>
</head>
<body>
<div class="stage">
  <!-- Chat panel -->
  <div class="panel">
    <div class="chat-header">
      <div class="chat-title">
        <div class="chat-icon">✦</div>
        <div class="chat-name">Maison Flâneur Concierge <span>· AI shopping</span></div>
      </div>
      <div class="api-badge"><span class="api-dot"></span>Claude API</div>
    </div>

    <div class="memory-chip" id="memChip">
      <span class="mem-icon">⟁</span>
      <span class="mem-text">Recognizes: <strong id="memText">—</strong></span>
    </div>

    <div class="chat-body" id="chatBody"></div>

    <div class="quick-actions">
      <button class="qa-btn" id="qaBtn">Add to cart →</button>
    </div>
  </div>

  <!-- Moat panel -->
  <div class="panel">
    <div class="moat-header">
      <div class="moat-title-group">
        <div class="moat-title">Conversion Moat</div>
        <div class="moat-sub">Customer barrier</div>
      </div>
      <div class="moat-height">
        <div class="moat-h-value"><span id="moatH">0</span>%</div>
        <div class="moat-h-label">Lock-in</div>
      </div>
    </div>

    <div class="moat-area">
      <div class="moat-bricks" id="bricks"></div>
    </div>

    <div class="moat-footer">
      <div class="stat">
        <div class="stat-label">Sessions</div>
        <div class="stat-value red" id="statSessions">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Cart adds</div>
        <div class="stat-value" id="statCart">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Bricks</div>
        <div class="stat-value" id="statBricks">0</div>
      </div>
    </div>
  </div>
</div>

<script>
var chatBody = document.getElementById('chatBody');
var memChip = document.getElementById('memChip');
var memText = document.getElementById('memText');
var qaBtn = document.getElementById('qaBtn');
var bricks = document.getElementById('bricks');
var moatH = document.getElementById('moatH');
var statSessions = document.getElementById('statSessions');
var statCart = document.getElementById('statCart');
var statBricks = document.getElementById('statBricks');

// Scenarios
var SCENARIOS = [
  {
    memory: 'Sarah · returning · linen',
    greeting: 'Welcome back, Sarah. ✨',
    ai_intro: 'Got it. Based on your taste:',
    user_msg: 'Something cozy for tonight?',
    products: [
      { name: 'Heavyweight Wool Throw', meta: 'In stock', price: '£189' },
      { name: 'Cashmere Lounge Set', meta: 'Restocked', price: '£345' }
    ],
    brick: 'Personalized match',
    action: 'Add to cart →'
  },
  {
    memory: 'Marcus · gift seeker',
    greeting: 'Hi Marcus. Gift mode on. 🎁',
    ai_intro: 'For coastal style, try these:',
    user_msg: 'Gift for my sister, loves coastal',
    products: [
      { name: 'Linen Sheet Set', meta: 'Hand-finished', price: '£268' },
      { name: 'Coastal Pillar Candle', meta: 'Bestseller', price: '£52' }
    ],
    brick: 'Gift bundle taken',
    action: 'Add bundle →'
  },
  {
    memory: 'Elena · cart recovery',
    greeting: 'Welcome back, Elena.',
    ai_intro: 'You left these yesterday — still want them?',
    user_msg: 'Yes — finish my order',
    products: [
      { name: 'Merino Cardigan', meta: 'Last 2 in your size', price: '£295' }
    ],
    brick: 'Cart recovered',
    action: 'Complete order →'
  },
  {
    memory: 'David · cross-sell',
    greeting: 'Hi David. Looking sharp.',
    ai_intro: 'These pair with your Wool Throw:',
    user_msg: 'Complete the look',
    products: [
      { name: 'Cashmere Beanie', meta: 'Bundle save 12%', price: '£128' },
      { name: 'Wool Socks · 2pk', meta: 'New', price: '£48' }
    ],
    brick: 'Cross-sell complete',
    action: 'Bundle & save →'
  }
];

var BRICK_LABELS = [
  'Customer recognized',
  'Intent decoded',
  'Product matched',
  'Cart populated',
  'Checkout reached',
  'Purchase complete',
  'Repeat visit',
  'Loyalty deepened',
  'Cohort retained',
  'Lifetime extended'
];

var scenarioIdx = 0;
var brickCount = 0;
var sessionsCount = 0;
var cartCount = 0;
var moatPct = 0;

function sleep(ms) {
  return new Promise(function(r) { setTimeout(r, ms); });
}

function tween(from, to, dur, cb) {
  var start = Date.now();
  function step() {
    var t = Math.min(1, (Date.now() - start) / dur);
    var v = from + (to - from) * (1 - Math.pow(1 - t, 3));
    cb(v);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function clearChat() {
  chatBody.innerHTML = '';
  memChip.classList.remove('show');
  qaBtn.classList.remove('active', 'pressed', 'completed');
}

function addMessage(side, content, opts) {
  opts = opts || {};
  var msg = document.createElement('div');
  msg.className = 'msg ' + side;
  var avatar = side === 'ai' ? '✦' : 'S';
  msg.innerHTML =
    '<div class="msg-avatar">' + (opts.avatarText || avatar) + '</div>' +
    '<div class="msg-bubble">' + content + '</div>';
  chatBody.appendChild(msg);
  // Trigger reflow then show
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      msg.classList.add('show');
    });
  });
  return msg;
}

function addTypingBubble() {
  var msg = document.createElement('div');
  msg.className = 'msg ai';
  msg.innerHTML =
    '<div class="msg-avatar">✦</div>' +
    '<div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  chatBody.appendChild(msg);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { msg.classList.add('show'); });
  });
  return msg;
}

function addProductsBubble(products) {
  var msg = document.createElement('div');
  msg.className = 'msg ai';
  var prodHTML = '<div class="product-list">';
  products.forEach(function(p, i) {
    prodHTML +=
      '<div class="product-card" data-idx="' + i + '">' +
        '<div class="prod-img"></div>' +
        '<div class="prod-info">' +
          '<div class="prod-name">' + p.name + '</div>' +
          '<div class="prod-meta">' + p.meta + '</div>' +
        '</div>' +
        '<div class="prod-price">' + p.price + '</div>' +
      '</div>';
  });
  prodHTML += '</div>';
  msg.innerHTML =
    '<div class="msg-avatar">✦</div>' +
    '<div class="msg-bubble">' + prodHTML + '</div>';
  chatBody.appendChild(msg);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { msg.classList.add('show'); });
  });

  // Stagger product card appearance
  var cards = msg.querySelectorAll('.product-card');
  cards.forEach(function(c, i) {
    setTimeout(function() { c.classList.add('show'); }, 150 + i * 220);
  });

  return msg;
}

function addBrick(label) {
  var b = document.createElement('div');
  b.className = 'brick';
  b.textContent = label;
  bricks.appendChild(b);
  while (bricks.children.length > 8) {
    bricks.removeChild(bricks.firstChild);
  }
}

async function typeUserMessage(text) {
  var msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML =
    '<div class="msg-avatar">S</div>' +
    '<div class="msg-bubble"><span id="userTyping"></span></div>';
  chatBody.appendChild(msg);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { msg.classList.add('show'); });
  });
  var span = msg.querySelector('#userTyping');
  span.id = '';
  for (var i = 0; i <= text.length; i++) {
    span.textContent = text.substring(0, i);
    await sleep(28 + Math.random() * 40);
  }
}

async function runScenario(s) {
  clearChat();

  await sleep(350);

  // 1. Memory chip flashes in
  memText.textContent = s.memory;
  memChip.classList.add('show');
  await sleep(600);

  // 2. AI greeting
  addMessage('ai', s.greeting);
  await sleep(900);

  // 3. User typing message
  await typeUserMessage(s.user_msg);
  await sleep(400);

  // 4. AI typing dots
  var typing = addTypingBubble();
  await sleep(900);
  typing.remove();

  // 5. AI response + products
  addMessage('ai', s.ai_intro);
  await sleep(350);
  var productsMsg = addProductsBubble(s.products);

  // Wait for cards to appear
  await sleep(150 + s.products.length * 240);

  // 6. Activate action button
  qaBtn.textContent = s.action;
  qaBtn.classList.add('active');
  await sleep(700);

  // 7. "Press" button
  qaBtn.classList.add('pressed');
  // Select all products
  var cards = productsMsg.querySelectorAll('.product-card');
  cards.forEach(function(c) { c.classList.add('selected'); });
  await sleep(300);
  qaBtn.classList.remove('pressed');
  qaBtn.classList.add('completed');
  qaBtn.textContent = '✓ Added to cart';

  // 8. Drop brick + update stats
  var brickLabel = BRICK_LABELS[brickCount % BRICK_LABELS.length];
  addBrick(brickLabel);
  brickCount++;
  sessionsCount++;
  cartCount += s.products.length;
  moatPct = Math.min(99, moatPct + 8 + Math.floor(Math.random() * 3));

  tween(parseInt(statSessions.textContent), sessionsCount, 600, function(v) {
    statSessions.textContent = Math.round(v);
  });
  tween(parseInt(statCart.textContent), cartCount, 600, function(v) {
    statCart.textContent = Math.round(v);
  });
  tween(parseInt(statBricks.textContent), brickCount, 600, function(v) {
    statBricks.textContent = Math.round(v);
  });
  tween(parseInt(moatH.textContent), moatPct, 800, function(v) {
    moatH.textContent = Math.round(v);
  });

  await sleep(1600);
}

async function runLoop() {
  var s = SCENARIOS[scenarioIdx % SCENARIOS.length];
  scenarioIdx++;
  await runScenario(s);
  runLoop();
}

runLoop();
</script>
