<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Sleep Guide</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0A0A0A;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
  }
  .card {
    background: #0F0F0F;
    width: 100%;
    height: 100%;
    overflow: hidden;
    padding: 16px;
  }
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    font-size: 13px;
    color: #888;
  }
  .breadcrumb .separator { color: #444; }
  .breadcrumb .active { color: #ccc; font-weight: 600; }
  .url-bar {
    font-size: 11px;
    color: #555;
    margin-bottom: 14px;
    padding: 6px 10px;
    background: #141414;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .url-globe {
    width: 14px; height: 14px;
    background: #333;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .content {
    display: flex;
    gap: 16px;
    height: calc(100% - 56px);
    overflow: hidden;
  }
  .fields-panel {
    flex: 1;
    min-width: 0;
    overflow-y: auto;
  }
  .fields-panel::-webkit-scrollbar { display: none; }
  .field-row {
    display: flex;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #1A1A1A;
    opacity: 0;
    transform: translateX(-10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .field-row.visible {
    opacity: 1;
    transform: translateX(0);
  }
  .field-row.indent { padding-left: 20px; }
  .field-key {
    width: 140px;
    flex-shrink: 0;
    font-size: 12px;
    color: #666;
  }
  .field-value {
    font-size: 12px;
    color: #ccc;
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .field-value .mono { font-family: 'SF Mono', monospace; }
  .field-value .ok { color: #4BC882; font-weight: 600; }
  .field-value .accent { color: #FB3B24; font-weight: 600; }
  .tog-zones {
    display: flex;
    gap: 4px;
    flex: 1;
    min-width: 0;
  }
  .tog-zone {
    flex: 1;
    padding: 3px 4px;
    border: 1px solid #222;
    border-radius: 3px;
    text-align: center;
    font-family: 'SF Mono', monospace;
    font-size: 10px;
    color: #555;
    min-width: 0;
    line-height: 1.3;
  }
  .tog-zone.active {
    border-color: #4BC882;
    background: rgba(75,200,130,0.08);
    color: #4BC882;
    font-weight: 700;
  }
  .tog-zone span { display: block; font-size: 9px; opacity: 0.7; }
  .code-panel {
    width: 280px;
    flex-shrink: 0;
    background: #141414;
    border-radius: 4px;
    padding: 12px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .code-panel.visible { opacity: 1; }
  .code-tabs {
    display: flex;
    gap: 16px;
    margin-bottom: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .code-tab { color: #555; cursor: pointer; padding-bottom: 4px; }
  .code-tab.active { color: #FB3B24; border-bottom: 2px solid #FB3B24; }
  .code-line {
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    font-size: 10px;
    line-height: 1.7;
    white-space: pre;
    color: #888;
  }
  .ck { color: #FB3B24; }
  .cv { color: #ccc; }
  .cb { color: #555; }
  .cg { color: #4BC882; }
  @media (max-width: 480px) {
    .breadcrumb { font-size: 11px; margin-bottom: 2px; }
    .url-bar { margin-bottom: 8px; padding: 4px 8px; font-size: 10px; }
    .content { flex-direction: column; gap: 8px; height: auto; }
    .fields-panel { flex: none; }
    .field-row { padding: 5px 0; }
    .field-row.indent { padding-left: 12px; }
    .field-key { width: 100px; font-size: 11px; }
    .field-value { font-size: 11px; }
    .tog-zone { font-size: 9px; padding: 2px 3px; }
    .tog-zone span { font-size: 8px; }
    .code-panel { width: 100%; max-height: 120px; padding: 8px; }
    .code-tabs { gap: 10px; margin-bottom: 6px; font-size: 10px; }
    .code-line { font-size: 9px; line-height: 1.5; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="breadcrumb">
    <span>Guides</span>
    <span class="separator">›</span>
    <span class="active">Safe sleep</span>
  </div>
  <div class="url-bar">
    <div class="url-globe"></div>
    https://petit-atelier.com/api/safe-sleep?room=nursery_01&amp;temp=18
  </div>
  <div class="content">
    <div class="fields-panel" id="fields"></div>
    <div class="code-panel" id="codePanel">
      <div class="code-tabs">
        <span class="code-tab active">RECOMMEND</span>
        <span class="code-tab">GUIDELINES</span>
        <span class="code-tab">MORE INFO</span>
      </div>
      <div id="codeContent"></div>
    </div>
  </div>
</div>
<script>
const fields = [
  { key: 'sensor', value: '<span class="mono">nursery_01</span> · <span class="ok">live</span>' },
  { key: 'room_temp', value: '<span class="accent">18.0°C</span>' },
  { key: 'tog_scale', value: '<div class="tog-zones"><div class="tog-zone">24+<span>0.2</span></div><div class="tog-zone">20-24<span>1.0</span></div><div class="tog-zone active">16-20<span>2.5</span></div><div class="tog-zone">&lt;16<span>3.5</span></div></div>' },
  { key: 'tog_match', value: '<span class="ok mono">2.5 TOG</span>' },
  { key: 'guideline', value: 'AAP · NHS aligned' },
  { key: 'product', value: '<span class="accent">Petit Sleep Bag</span>' },
  { key: 'sku', value: '<span class="mono">PSB-25-69</span>' },
  { key: 'size', value: '6-12M' },
  { key: 'material', value: 'Cotton-lined · 2.5 TOG', indent: true },
  { key: 'price', value: '<span class="mono">£42</span>' },
  { key: 'compliance', value: '<span class="ok">✓ medically aligned</span>' },
];

const fieldsEl = document.getElementById('fields');
fields.forEach(f => {
  const row = document.createElement('div');
  row.className = 'field-row' + (f.indent ? ' indent' : '');
  row.innerHTML = '<div class="field-key">' + f.key + '</div><div class="field-value">' + f.value + '</div>';
  fieldsEl.appendChild(row);
});

const codeLines = [
  '<span class="cb">GET /api/safe-sleep</span>',
  '<span class="cb">{</span>',
  '  <span class="ck">"sensor"</span>: <span class="cv">"nursery_01"</span>,',
  '  <span class="ck">"temp_c"</span>: <span class="cv">18.0</span>,',
  '  <span class="ck">"tog_match"</span>: <span class="cg">2.5</span>,',
  '  <span class="ck">"guideline"</span>: <span class="cv">"AAP+NHS"</span>,',
  '  <span class="ck">"recommend"</span>: <span class="cb">{</span>',
  '    <span class="ck">"sku"</span>: <span class="cv">"PSB-25-69"</span>,',
  '    <span class="ck">"name"</span>: <span class="cv">"Petit Sleep Bag"</span>,',
  '    <span class="ck">"tog"</span>: <span class="cv">2.5</span>,',
  '    <span class="ck">"size"</span>: <span class="cv">"6-12M"</span>,',
  '    <span class="ck">"price"</span>: <span class="cv">42.00</span>',
  '  <span class="cb">}</span>,',
  '  <span class="ck">"medical_aligned"</span>: <span class="cg">true</span>',
  '<span class="cb">}</span>',
];

const codeContent = document.getElementById('codeContent');
codeLines.forEach(line => {
  const el = document.createElement('div');
  el.className = 'code-line';
  el.innerHTML = line;
  codeContent.appendChild(el);
});

const rows = document.querySelectorAll('.field-row');
rows.forEach((row, i) => {
  setTimeout(() => row.classList.add('visible'), 200 + i * 85);
});
setTimeout(() => document.getElementById('codePanel').classList.add('visible'), 500);
</script>
</body>
</html>
