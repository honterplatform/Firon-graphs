<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Source Accuracy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0A0A0A; font-family: system-ui, -apple-system, sans-serif; color: #fff; }
  .card {
    background: #0F0F0F;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .title { font-size: 14px; font-weight: 700; color: #ccc; }
  .state-tag {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 3px;
    transition: background 0.4s ease, color 0.4s ease;
  }
  .state-tag.before { background: rgba(60,60,60,0.2); color: #555; }
  .state-tag.after { background: rgba(251,59,36,0.1); color: #FB3B24; }
  .pipeline {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 0;
  }
  .stage {
    flex: 1;
    background: #141414;
    border: 1px solid #1A1A1A;
    border-radius: 5px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 8px;
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.4s ease;
  }
  .stage.visible { opacity: 1; transform: translateX(0); }
  .stage.full { border-color: rgba(251,59,36,0.2); }
  .stage-num {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #1A1A1A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 800;
    color: #444;
    flex-shrink: 0;
    transition: background 0.4s ease, color 0.4s ease;
  }
  .stage.full .stage-num {
    background: rgba(251,59,36,0.15);
    color: #FB3B24;
  }
  .stage-info { flex: 1; min-width: 0; }
  .stage-name {
    font-size: 10px;
    font-weight: 600;
    color: #555;
    transition: color 0.4s ease;
  }
  .stage.full .stage-name { color: #ccc; }
  .stage-bar-wrap {
    width: 100%;
    height: 4px;
    background: #1A1A1A;
    border-radius: 2px;
    overflow: hidden;
    margin-top: 2px;
  }
  .stage-bar {
    height: 100%;
    border-radius: 2px;
    width: 0%;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1), background 0.4s ease;
  }
  .stage-pct {
    width: 40px;
    flex-shrink: 0;
    text-align: right;
    font-size: 13px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: #333;
    transition: color 0.4s ease;
  }
  .stage.full .stage-pct { color: #FB3B24; }
  .stage-lost {
    font-size: 7px;
    font-weight: 600;
    color: #333;
    text-align: right;
    width: 46px;
    flex-shrink: 0;
    transition: color 0.4s ease, opacity 0.4s ease;
    font-variant-numeric: tabular-nums;
  }
  .stage-lost.hidden { opacity: 0; }
  @media (max-width: 480px) {
    .title { font-size: 13px; }
    .stage { padding: 0 8px; gap: 6px; }
    .stage-name { font-size: 9px; }
    .stage-pct { font-size: 11px; width: 32px; }
    .stage-lost { width: 38px; font-size: 6px; }
    .stage-num { width: 14px; height: 14px; font-size: 7px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="title">Source Persistence</div>
    <div class="state-tag before" id="stateTag">Before</div>
  </div>
  <div class="pipeline" id="pipeline"></div>
</div>
<script>
var stages = [
  { name: 'First Click',   before: 100, after: 100 },
  { name: 'Landing Page',  before: 88,  after: 100 },
  { name: 'Product View',  before: 64,  after: 100 },
  { name: 'Add to Cart',   before: 46,  after: 100 },
  { name: 'Checkout',      before: 32,  after: 100 },
  { name: 'Final Sale',    before: 18,  after: 100 },
];

var pipelineEl = document.getElementById('pipeline');
var stateTag = document.getElementById('stateTag');
var stageEls = [];
var isAfter = false;

stages.forEach(function(s, i) {
  var el = document.createElement('div');
  el.className = 'stage';
  el.innerHTML =
    '<div class="stage-num">' + (i + 1) + '</div>' +
    '<div class="stage-info">' +
      '<div class="stage-name">' + s.name + '</div>' +
      '<div class="stage-bar-wrap"><div class="stage-bar" id="bar' + i + '"></div></div>' +
    '</div>' +
    '<div class="stage-pct" id="pct' + i + '">0%</div>' +
    '<div class="stage-lost" id="lost' + i + '"></div>';
  pipelineEl.appendChild(el);
  stageEls.push(el);
});

function applyState(after) {
  stateTag.className = 'state-tag ' + (after ? 'after' : 'before');
  stateTag.textContent = after ? 'With Firon' : 'Before';

  stages.forEach(function(s, i) {
    var val = after ? s.after : s.before;
    var bar = document.getElementById('bar' + i);
    var pct = document.getElementById('pct' + i);
    var lost = document.getElementById('lost' + i);
    var isFull = val === 100;

    bar.style.width = val + '%';
    bar.style.background = isFull ? '#FB3B24' : '#333';
    pct.textContent = val + '%';

    if (!after && val < 100) {
      lost.textContent = '-' + (100 - val) + '% lost';
      lost.className = 'stage-lost';
      lost.style.color = '#662222';
    } else if (after) {
      lost.textContent = 'Persisted';
      lost.className = 'stage-lost';
      lost.style.color = 'rgba(251,59,36,0.4)';
    } else {
      lost.textContent = '';
      lost.className = 'stage-lost hidden';
    }

    stageEls[i].className = 'stage visible' + (isFull ? ' full' : '');
  });
}

// Staggered reveal
stageEls.forEach(function(el, i) {
  setTimeout(function() { el.classList.add('visible'); }, 300 + i * 100);
});

// Initial state
setTimeout(function() { applyState(false); }, 600);

// Cycle
setInterval(function() {
  isAfter = !isAfter;
  applyState(isAfter);
}, 3000);
</script>
</body>
</html>
