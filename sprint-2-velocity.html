<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 2 · Mass Deployment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0F0F0F;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
  }

  .card {
    width: 100%;
    height: 100%;
    background: #0F0F0F;
    padding: clamp(20px, 4vh, 36px) clamp(20px, 3.5vw, 40px);
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 1.5vh, 14px);
    position: relative;
    overflow: hidden;
  }

  .card-label {
    font-size: clamp(11px, 1.5vh, 14px);
    font-weight: 700;
    color: #FB3B24;
    text-transform: uppercase;
    letter-spacing: 1.4px;
  }

  .card-title {
    font-size: clamp(26px, 5vh, 44px);
    font-weight: 800;
    color: rgba(255,255,255,0.95);
    line-height: 1.05;
    letter-spacing: -0.5px;
  }

  .stat-area {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: clamp(6px, 1vh, 10px);
    padding: clamp(6px, 1vh, 12px) 0;
  }

  .big-stat {
    display: flex;
    align-items: baseline;
    gap: clamp(8px, 1.5vw, 16px);
    flex-wrap: wrap;
  }
  .big-num {
    font-size: clamp(46px, 9vh, 90px);
    font-weight: 800;
    color: #fff;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -2px;
  }
  .big-arrow {
    color: #FB3B24;
    font-size: clamp(20px, 3vh, 28px);
    font-weight: 800;
    line-height: 1;
  }
  .big-label {
    color: #FB3B24;
    font-size: clamp(12px, 1.6vh, 15px);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    line-height: 1.1;
  }

  .comp-stat {
    display: flex;
    align-items: baseline;
    gap: clamp(8px, 1.5vw, 16px);
    flex-wrap: wrap;
    opacity: 0.45;
    margin-top: clamp(4px, 0.8vh, 8px);
  }
  .comp-num {
    font-size: clamp(28px, 5.5vh, 56px);
    font-weight: 800;
    color: rgba(255,255,255,0.5);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
  }
  .comp-arrow {
    color: rgba(255,255,255,0.4);
    font-size: clamp(14px, 2vh, 20px);
    font-weight: 700;
  }
  .comp-label {
    color: rgba(255,255,255,0.5);
    font-size: clamp(11px, 1.4vh, 13px);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .chart-area {
    flex: 0 0 auto;
    height: clamp(50px, 9vh, 90px);
    margin-top: clamp(4px, 0.8vh, 8px);
    position: relative;
  }
  .chart-svg { width: 100%; height: 100%; display: block; }
  .chart-axis {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-size: clamp(9px, 1.1vh, 11px);
    color: rgba(255,255,255,0.3);
    font-weight: 600;
  }

  .card-footer {
    font-size: clamp(11px, 1.5vh, 14px);
    color: rgba(255,255,255,0.55);
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-label">Phase 2 · The Velocity Engine</div>

  <div class="stat-area">
    <div class="big-stat">
      <span class="big-num" id="bigNum">0</span>
      <div style="display:flex;flex-direction:column;gap:2px;">
        <span class="big-arrow">↑</span>
        <span class="big-label">SKUs Agent-Ready</span>
      </div>
    </div>

    <div class="comp-stat">
      <span class="comp-num">0</span>
      <div style="display:flex;flex-direction:column;gap:2px;">
        <span class="comp-arrow">·</span>
        <span class="comp-label">Pre-Sprint</span>
      </div>
    </div>

    <div class="chart-area">
      <svg class="chart-svg" id="chart" preserveAspectRatio="none"></svg>
      <div class="chart-axis">
        <span>Day 31</span><span>Day 40</span><span>Day 50</span><span>Day 60</span>
      </div>
    </div>
  </div>
</div>

<script>
var bigNum = document.getElementById('bigNum');
var TARGET = 1247;

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function tween(from, to, dur, cb) {
  var start = Date.now();
  function step() {
    var t = Math.min(1, (Date.now() - start) / dur);
    var v = from + (to - from) * (1 - Math.pow(1 - t, 3));
    cb(v);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function drawChart() {
  var svg = document.getElementById('chart');
  var rect = svg.getBoundingClientRect();
  var W = rect.width;
  var H = rect.height;
  if (W < 2 || H < 2) return;
  var pad = 2;
  // Growth curve from 0 to 1247
  var points = [
    {x: 0,   y: 0.95},
    {x: 0.15, y: 0.92},
    {x: 0.3, y: 0.78},
    {x: 0.45, y: 0.58},
    {x: 0.6, y: 0.36},
    {x: 0.75, y: 0.18},
    {x: 0.9, y: 0.06},
    {x: 1.0, y: 0.02}
  ].map(function(p) {
    return { x: pad + p.x * (W - pad * 2), y: pad + p.y * (H - pad * 2) };
  });

  var lineD = '';
  points.forEach(function(p, i) {
    if (i === 0) lineD += 'M ' + p.x + ' ' + p.y;
    else {
      var prev = points[i-1];
      var mx = (prev.x + p.x) / 2;
      lineD += ' Q ' + mx + ' ' + prev.y + ' ' + mx + ' ' + ((prev.y + p.y) / 2);
      lineD += ' Q ' + mx + ' ' + p.y + ' ' + p.x + ' ' + p.y;
    }
  });
  var areaD = lineD + ' L ' + points[points.length-1].x + ' ' + (H - pad) + ' L ' + points[0].x + ' ' + (H - pad) + ' Z';
  var last = points[points.length - 1];

  svg.innerHTML =
    '<defs><linearGradient id="cgrad" x1="0" x2="0" y1="0" y2="1">' +
    '<stop offset="0%" stop-color="#FB3B24" stop-opacity="0.4"/>' +
    '<stop offset="100%" stop-color="#FB3B24" stop-opacity="0"/>' +
    '</linearGradient></defs>' +
    '<path d="' + areaD + '" fill="url(#cgrad)"/>' +
    '<path id="chartLine" d="' + lineD + '" fill="none" stroke="#FB3B24" stroke-width="2.5" stroke-linecap="round"' +
    ' style="filter: drop-shadow(0 0 6px rgba(251,59,36,0.5));"/>' +
    '<circle cx="' + last.x + '" cy="' + last.y + '" r="4" fill="#FB3B24"/>' +
    '<circle cx="' + last.x + '" cy="' + last.y + '" r="7" fill="none" stroke="#FB3B24" stroke-width="1" opacity="0.5">' +
    '<animate attributeName="r" values="6;10;6" dur="1.6s" repeatCount="indefinite"/>' +
    '<animate attributeName="opacity" values="0.5;0;0.5" dur="1.6s" repeatCount="indefinite"/>' +
    '</circle>';

  // Animate line stroke
  var line = document.getElementById('chartLine');
  var len = line.getTotalLength();
  line.style.strokeDasharray = len;
  line.style.strokeDashoffset = len;
}

async function runCycle() {
  bigNum.textContent = '0';
  drawChart();
  // Trigger line draw animation
  var line = document.getElementById('chartLine');
  if (line) {
    requestAnimationFrame(function() {
      line.style.transition = 'stroke-dashoffset 1.6s cubic-bezier(.4,0,.2,1)';
      line.style.strokeDashoffset = 0;
    });
  }

  await sleep(300);

  // Tween counter
  tween(0, TARGET, 1600, function(v) {
    bigNum.textContent = Math.round(v).toLocaleString();
  });

  await sleep(5500);
  runCycle();
}

window.addEventListener('load', function() { setTimeout(runCycle, 200); });
window.addEventListener('resize', function() { setTimeout(drawChart, 50); });
</script>
</body>
</html>
