<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabric Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0A0A0A;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
  }
  .card {
    background: #0F0F0F;
    width: 100%;
    height: 100%;
    overflow: hidden;
    padding: 16px;
  }
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    font-size: 13px;
    color: #888;
  }
  .breadcrumb .separator { color: #444; }
  .breadcrumb .active { color: #ccc; font-weight: 600; }
  .url-bar {
    font-size: 11px;
    color: #555;
    margin-bottom: 14px;
    padding: 6px 10px;
    background: #141414;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .url-globe {
    width: 14px; height: 14px;
    background: #333;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .content {
    display: flex;
    gap: 16px;
    height: calc(100% - 56px);
    overflow: hidden;
  }
  .fields-panel {
    flex: 1;
    min-width: 0;
    overflow-y: auto;
  }
  .fields-panel::-webkit-scrollbar { display: none; }
  .field-row {
    display: flex;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #1A1A1A;
    opacity: 0;
    transform: translateX(-10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .field-row.visible {
    opacity: 1;
    transform: translateX(0);
  }
  .field-key {
    width: 130px;
    flex-shrink: 0;
    font-size: 12px;
    color: #666;
  }
  .field-value {
    font-size: 12px;
    color: #ccc;
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .field-value .mono { font-family: 'SF Mono', monospace; }
  .field-value .ok { color: #4BC882; }
  .compare-cell {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 0;
  }
  .compare-cell .label {
    font-size: 10px;
    color: #555;
    font-family: 'SF Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    width: 16px;
    flex-shrink: 0;
  }
  .compare-cell .val {
    font-family: 'SF Mono', monospace;
    color: #ccc;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .compare-cell .val.win {
    color: #4BC882;
    font-weight: 700;
  }
  .compare-cell + .compare-cell {
    border-left: 1px dashed #222;
    padding-left: 8px;
  }
  .swatch {
    width: 14px; height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .swatch.merino {
    background: repeating-linear-gradient(45deg, #C8B098 0px, #C8B098 2px, #B49677 2px, #B49677 4px);
  }
  .swatch.cotton {
    background: linear-gradient(135deg, #F5F0E6 0%, #E0D9C8 100%);
  }
  .code-panel {
    width: 280px;
    flex-shrink: 0;
    background: #141414;
    border-radius: 4px;
    padding: 12px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .code-panel.visible { opacity: 1; }
  .code-tabs {
    display: flex;
    gap: 16px;
    margin-bottom: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .code-tab { color: #555; cursor: pointer; padding-bottom: 4px; }
  .code-tab.active { color: #FB3B24; border-bottom: 2px solid #FB3B24; }
  .code-line {
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    font-size: 10px;
    line-height: 1.7;
    white-space: pre;
    color: #888;
  }
  .ck { color: #FB3B24; }
  .cv { color: #ccc; }
  .cb { color: #555; }
  .cg { color: #4BC882; }
  @media (max-width: 480px) {
    .breadcrumb { font-size: 11px; margin-bottom: 2px; }
    .url-bar { margin-bottom: 8px; padding: 4px 8px; font-size: 10px; }
    .content { flex-direction: column; gap: 8px; height: auto; }
    .fields-panel { flex: none; }
    .field-row { padding: 5px 0; }
    .field-key { width: 90px; font-size: 11px; }
    .field-value { font-size: 11px; }
    .compare-cell .label { font-size: 9px; width: 14px; }
    .compare-cell .val { font-size: 11px; }
    .code-panel { width: 100%; max-height: 120px; padding: 8px; }
    .code-tabs { gap: 10px; margin-bottom: 6px; font-size: 10px; }
    .code-line { font-size: 9px; line-height: 1.5; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="breadcrumb">
    <span>Compare</span>
    <span class="separator">›</span>
    <span class="active">Fabric analysis</span>
  </div>
  <div class="url-bar">
    <div class="url-globe"></div>
    https://petit-atelier.com/api/compare?a=merino&amp;b=organic-cotton
  </div>
  <div class="content">
    <div class="fields-panel" id="fields"></div>
    <div class="code-panel" id="codePanel">
      <div class="code-tabs">
        <span class="code-tab active">SPECS</span>
        <span class="code-tab">RECOMMEND</span>
        <span class="code-tab">MORE INFO</span>
      </div>
      <div id="codeContent"></div>
    </div>
  </div>
</div>
<script>
const fields = [
  { key: 'query', value: '<span class="mono">"merino vs organic cotton, newborn"</span>' },
  { key: 'fabric_A', value: '<span class="swatch merino"></span>Merino Wool · 100% · 180gsm' },
  { key: 'fabric_B', value: '<span class="swatch cotton"></span>Organic Cotton · GOTS · 220gsm' },
  { key: 'warmth', value: '<div class="compare-cell"><span class="label">A</span><span class="val win">9/10</span></div><div class="compare-cell"><span class="label">B</span><span class="val">5/10</span></div>' },
  { key: 'breathability', value: '<div class="compare-cell"><span class="label">A</span><span class="val">8/10</span></div><div class="compare-cell"><span class="label">B</span><span class="val win">10/10</span></div>' },
  { key: 'weight', value: '<div class="compare-cell"><span class="label">A</span><span class="val">180gsm</span></div><div class="compare-cell"><span class="label">B</span><span class="val">220gsm</span></div>' },
  { key: 'care', value: '<div class="compare-cell"><span class="label">A</span><span class="val">Hand wash</span></div><div class="compare-cell"><span class="label">B</span><span class="val win">Machine</span></div>' },
  { key: 'verdict', value: '<span class="ok">Merino</span> for October arrival' },
  { key: 'rationale', value: 'Superior warmth + moisture-wicking' },
];

const fieldsEl = document.getElementById('fields');
fields.forEach(f => {
  const row = document.createElement('div');
  row.className = 'field-row';
  row.innerHTML = '<div class="field-key">' + f.key + '</div><div class="field-value">' + f.value + '</div>';
  fieldsEl.appendChild(row);
});

const codeLines = [
  '<span class="cb">{</span>',
  '  <span class="ck">"fabric_a"</span>: <span class="cv">"merino-wool"</span>,',
  '  <span class="ck">"fabric_b"</span>: <span class="cv">"organic-cotton"</span>,',
  '  <span class="ck">"specs"</span>: <span class="cb">{</span>',
  '    <span class="ck">"warmth"</span>: <span class="cb">[</span><span class="cg">9</span>,<span class="cv">5</span><span class="cb">]</span>,',
  '    <span class="ck">"breath"</span>: <span class="cb">[</span><span class="cv">8</span>,<span class="cg">10</span><span class="cb">]</span>,',
  '    <span class="ck">"weight"</span>: <span class="cb">[</span><span class="cv">180</span>,<span class="cv">220</span><span class="cb">]</span>,',
  '    <span class="ck">"care"</span>: <span class="cb">[</span><span class="cv">"hand"</span>,<span class="cg">"machine"</span><span class="cb">]</span>',
  '  <span class="cb">}</span>,',
  '  <span class="ck">"context"</span>: <span class="cv">"newborn.october"</span>,',
  '  <span class="ck">"verdict"</span>: <span class="cg">"merino-wool"</span>,',
  '  <span class="ck">"confidence"</span>: <span class="cv">0.91</span>',
  '<span class="cb">}</span>',
];

const codeContent = document.getElementById('codeContent');
codeLines.forEach(line => {
  const el = document.createElement('div');
  el.className = 'code-line';
  el.innerHTML = line;
  codeContent.appendChild(el);
});

const rows = document.querySelectorAll('.field-row');
rows.forEach((row, i) => {
  setTimeout(() => row.classList.add('visible'), 200 + i * 90);
});
setTimeout(() => document.getElementById('codePanel').classList.add('visible'), 500);
</script>
</body>
</html>
