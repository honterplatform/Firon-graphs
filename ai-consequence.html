<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Consequence</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0A0A0A; font-family: system-ui, -apple-system, sans-serif; color: #fff; }
  .card {
    background: #0F0F0F;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .query {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .query-icon {
    font-size: 10px;
    color: #FB3B24;
  }
  .query-text {
    font-size: 10px;
    color: #555;
    font-style: italic;
  }
  .answer-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .answer {
    font-size: 13px;
    line-height: 2;
    color: #666;
    position: relative;
  }
  .citation {
    display: inline;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 3px;
    position: relative;
    transition: opacity 0.3s ease;
  }
  .citation.competitor {
    color: #999;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .citation.yours {
    color: #FB3B24;
    background: rgba(251,59,36,0.08);
    border-bottom: 1px solid rgba(251,59,36,0.2);
  }
  .citation.glitching {
    animation: glitch 0.15s steps(2) infinite;
  }
  .citation.dissolved {
    opacity: 0;
    background: transparent;
    border-bottom-color: transparent;
  }
  .citation.dissolved::after {
    content: '█████';
    position: absolute;
    left: 0;
    top: 0;
    color: #1A1A1A;
    font-size: 11px;
    letter-spacing: 1px;
    animation: flicker 2s ease infinite;
  }
  .citation.restored {
    animation: restoreGlow 1.5s ease;
  }
  @keyframes glitch {
    0% { transform: translate(0, 0) skewX(0deg); opacity: 1; }
    25% { transform: translate(-2px, 1px) skewX(-2deg); opacity: 0.7; }
    50% { transform: translate(2px, -1px) skewX(1deg); opacity: 0.4; }
    75% { transform: translate(-1px, 0) skewX(-1deg); opacity: 0.6; }
    100% { transform: translate(1px, 1px) skewX(0deg); opacity: 0.3; }
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.15; }
  }
  @keyframes restoreGlow {
    0% { box-shadow: 0 0 0 0 rgba(251,59,36,0); }
    30% { box-shadow: 0 0 12px 2px rgba(251,59,36,0.3); }
    100% { box-shadow: 0 0 0 0 rgba(251,59,36,0); }
  }
  .cursor {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: #FB3B24;
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    flex-shrink: 0;
    padding-top: 6px;
    border-top: 1px solid #1A1A1A;
  }
  .status-text {
    font-size: 8px;
    font-weight: 600;
    color: #333;
    transition: color 0.5s ease;
  }
  .status-text.warning { color: #662222; }
  .status-text.success { color: rgba(251,59,36,0.5); }
  .status-dots {
    display: flex;
    gap: 4px;
  }
  .sdot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #1A1A1A;
    transition: background 0.4s ease;
  }
  .sdot.active { background: #FB3B24; }
  @media (max-width: 480px) {
    .answer { font-size: 11px; line-height: 1.9; }
    .query-text { font-size: 9px; }
    .citation { padding: 1px 4px; font-size: 11px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="query">
    <div class="query-icon">✦</div>
    <div class="query-text">"What are the best premium candle brands?"</div>
  </div>
  <div class="answer-area">
    <div class="answer" id="answer"></div>
  </div>
  <div class="status-bar">
    <div class="status-text" id="statusText">AI generating response...</div>
    <div class="status-dots">
      <div class="sdot" id="sd0"></div>
      <div class="sdot" id="sd1"></div>
    </div>
  </div>
</div>
<script>
var answerEl = document.getElementById('answer');
var statusText = document.getElementById('statusText');
var yourCitation = null;
var phase = 0; // 0=typing, 1=stable, 2=glitch, 3=dissolved, 4=wait, 5=restore, 6=restored-wait
var phaseTimer = 0;
var typed = 0;
var typingDone = false;

var segments = [
  { text: 'Based on expert reviews and customer data, the top premium candle brands include ' },
  { text: 'Diptyque', type: 'competitor' },
  { text: ' for their iconic glass vessels, ' },
  { text: 'Boy Smells', type: 'competitor' },
  { text: ' for modern scent profiles, and ' },
  { text: 'Your Brand', type: 'yours' },
  { text: ' for hand-poured soy formulations. Other notable mentions include ' },
  { text: 'Le Labo', type: 'competitor' },
  { text: ' and ' },
  { text: 'Byredo', type: 'competitor' },
  { text: '. Each brand offers unique fragrance profiles suited to different preferences.' },
];

var fullHTML = '';
segments.forEach(function(seg, i) {
  if (seg.type === 'competitor') {
    fullHTML += '<span class="citation competitor" id="seg' + i + '">' + seg.text + '</span>';
  } else if (seg.type === 'yours') {
    fullHTML += '<span class="citation yours" id="seg' + i + '">' + seg.text + '</span>';
  } else {
    fullHTML += '<span id="seg' + i + '">' + seg.text + '</span>';
  }
});

// Build the full text for typing
var fullText = '';
segments.forEach(function(seg) { fullText += seg.text; });

function getTypedHTML(charCount) {
  var remaining = charCount;
  var html = '';
  for (var i = 0; i < segments.length; i++) {
    var seg = segments[i];
    if (remaining <= 0) break;
    var chars = Math.min(remaining, seg.text.length);
    var partial = seg.text.substring(0, chars);
    if (seg.type === 'competitor') {
      html += '<span class="citation competitor" id="seg' + i + '">' + partial + '</span>';
    } else if (seg.type === 'yours') {
      html += '<span class="citation yours" id="seg' + i + '">' + partial + '</span>';
    } else {
      html += '<span id="seg' + i + '">' + partial + '</span>';
    }
    remaining -= chars;
  }
  html += '<span class="cursor"></span>';
  return html;
}

function updateDots(idx) {
  document.getElementById('sd0').className = 'sdot' + (idx === 0 ? ' active' : '');
  document.getElementById('sd1').className = 'sdot' + (idx === 1 ? ' active' : '');
}

function tick() {
  phaseTimer += 16;

  if (phase === 0) {
    // Typing
    typed += 1.5;
    if (typed >= fullText.length) {
      typed = fullText.length;
      typingDone = true;
      phase = 1;
      phaseTimer = 0;
    }
    answerEl.innerHTML = getTypedHTML(Math.floor(typed));
    updateDots(0);
    statusText.textContent = 'AI generating response...';
    statusText.className = 'status-text';
  }

  else if (phase === 1) {
    // Stable for a moment
    answerEl.innerHTML = fullHTML;
    if (phaseTimer > 2000) {
      phase = 2;
      phaseTimer = 0;
    }
    statusText.textContent = '4 sources cited';
    statusText.className = 'status-text';
  }

  else if (phase === 2) {
    // Glitch your brand
    var el = document.getElementById('seg5');
    if (el) el.className = 'citation yours glitching';
    statusText.textContent = 'Unstructured data detected...';
    statusText.className = 'status-text warning';
    updateDots(0);
    if (phaseTimer > 1200) {
      phase = 3;
      phaseTimer = 0;
    }
  }

  else if (phase === 3) {
    // Dissolved
    var el = document.getElementById('seg5');
    if (el) el.className = 'citation yours dissolved';
    statusText.textContent = 'Your Brand — skipped. No entity authority.';
    statusText.className = 'status-text warning';
    updateDots(0);
    if (phaseTimer > 3000) {
      phase = 5;
      phaseTimer = 0;
    }
  }

  else if (phase === 5) {
    // Restore
    var el = document.getElementById('seg5');
    if (el) {
      el.className = 'citation yours restored';
      el.textContent = 'Your Brand';
    }
    statusText.textContent = 'With GEO — Your Brand cited #1';
    statusText.className = 'status-text success';
    updateDots(1);
    if (phaseTimer > 3500) {
      phase = 0;
      phaseTimer = 0;
      typed = 0;
      typingDone = false;
    }
  }

  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);
</script>
</body>
</html>
