<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Consequence</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0A0A0A; font-family: system-ui, -apple-system, sans-serif; color: #fff; }
  .card {
    background: #0F0F0F;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 16px;
  }
  .search-bar {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .search-icon {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: rgba(251,59,36,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #FB3B24;
    flex-shrink: 0;
  }
  .search-text {
    font-size: 15px;
    color: #888;
    flex: 1;
  }
  .search-badge {
    font-size: 9px;
    font-weight: 700;
    color: #FB3B24;
    background: rgba(251,59,36,0.08);
    border: 1px solid rgba(251,59,36,0.15);
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    flex-shrink: 0;
  }
  .answer-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }
  .answer {
    font-size: 18px;
    line-height: 2.1;
    color: #666;
    position: relative;
  }
  .word {
    display: inline;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .word.visible { opacity: 1; }
  .citation {
    display: inline;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    position: relative;
    transition: opacity 0.3s ease;
  }
  .citation.competitor {
    color: #999;
    background: rgba(255,255,255,0.04);
    border-bottom: 2px solid rgba(255,255,255,0.08);
  }
  .citation.yours {
    color: #FB3B24;
    background: rgba(251,59,36,0.08);
    border-bottom: 2px solid rgba(251,59,36,0.2);
  }
  .citation.glitching {
    animation: glitch 0.12s steps(2) infinite;
  }
  .citation.dissolved {
    opacity: 0;
    background: transparent;
    border-bottom-color: transparent;
  }
  .citation.dissolved::after {
    content: '██████';
    position: absolute;
    left: 0;
    top: 0;
    color: #1A1A1A;
    font-size: 14px;
    letter-spacing: 2px;
    animation: flicker 2s ease infinite;
  }
  .citation.restored {
    animation: restoreGlow 1.5s ease;
  }
  @keyframes glitch {
    0% { transform: translate(0, 0) skewX(0deg); opacity: 1; }
    25% { transform: translate(-3px, 1px) skewX(-3deg); opacity: 0.6; }
    50% { transform: translate(3px, -1px) skewX(2deg); opacity: 0.3; }
    75% { transform: translate(-2px, 0) skewX(-1deg); opacity: 0.5; }
    100% { transform: translate(2px, 1px) skewX(0deg); opacity: 0.2; }
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 0.12; }
  }
  @keyframes restoreGlow {
    0% { box-shadow: 0 0 0 0 rgba(251,59,36,0); }
    20% { box-shadow: 0 0 16px 4px rgba(251,59,36,0.35); }
    100% { box-shadow: 0 0 0 0 rgba(251,59,36,0); }
  }
  .cursor {
    display: inline-block;
    width: 2px;
    height: 18px;
    background: #FB3B24;
    vertical-align: middle;
    margin-left: 3px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    flex-shrink: 0;
    padding-top: 8px;
    border-top: 1px solid #1A1A1A;
  }
  .status-text {
    font-size: 10px;
    font-weight: 600;
    color: #333;
    transition: color 0.5s ease;
  }
  .status-text.warning { color: #662222; }
  .status-text.success { color: rgba(251,59,36,0.5); }
  .status-dots {
    display: flex;
    gap: 5px;
  }
  .sdot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #1A1A1A;
    transition: background 0.4s ease;
  }
  .sdot.active { background: #FB3B24; }
  @media (max-width: 480px) {
    .card { padding: 12px; }
    .search-bar { padding: 10px 12px; }
    .search-text { font-size: 13px; }
    .answer { font-size: 14px; line-height: 2; }
    .citation { padding: 2px 6px; }
    .cursor { height: 14px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="search-bar">
    <div class="search-icon">✦</div>
    <div class="search-text" id="searchText"></div>
    <div class="search-badge">AI Search</div>
  </div>
  <div class="answer-area">
    <div class="answer" id="answer"></div>
  </div>
  <div class="status-bar">
    <div class="status-text" id="statusText"></div>
    <div class="status-dots">
      <div class="sdot" id="sd0"></div>
      <div class="sdot" id="sd1"></div>
    </div>
  </div>
</div>
<script>
var answerEl = document.getElementById('answer');
var searchTextEl = document.getElementById('searchText');
var statusText = document.getElementById('statusText');

var queryText = 'What are the best premium candle brands?';
var queryTyped = 0;

var segments = [
  { text: 'Based on expert reviews and customer data, the top premium candle brands include ' },
  { text: 'Diptyque', type: 'competitor' },
  { text: ' for their iconic glass vessels, ' },
  { text: 'Boy Smells', type: 'competitor' },
  { text: ' for modern scent profiles, and ' },
  { text: 'Your Brand', type: 'yours' },
  { text: ' for hand-poured soy formulations. Other notable mentions include ' },
  { text: 'Le Labo', type: 'competitor' },
  { text: ' and ' },
  { text: 'Byredo', type: 'competitor' },
  { text: '.' },
];

// Build word-level tokens for natural reveal
var tokens = [];
segments.forEach(function(seg, si) {
  var words = seg.text.split(/(\s+)/);
  words.forEach(function(w) {
    if (w.length > 0) {
      tokens.push({ text: w, type: seg.type || null, segIdx: si });
    }
  });
});

var fullHTML = '';
segments.forEach(function(seg, i) {
  if (seg.type === 'competitor') {
    fullHTML += '<span class="citation competitor" id="seg' + i + '">' + seg.text + '</span>';
  } else if (seg.type === 'yours') {
    fullHTML += '<span class="citation yours" id="seg' + i + '">' + seg.text + '</span>';
  } else {
    fullHTML += seg.text;
  }
});

var phase = -1; // -1=query typing, 0=word reveal, 1=stable, 2=glitch, 3=dissolved, 5=restore
var phaseTimer = 0;
var wordIdx = 0;
var wordTimer = 0;

function buildRevealHTML(visibleCount) {
  var html = '';
  var currentSeg = -1;
  var inCitation = false;

  for (var i = 0; i < tokens.length; i++) {
    var tok = tokens[i];
    var vis = i < visibleCount;

    // Handle citation boundaries
    if (tok.type && !inCitation) {
      var cls = tok.type === 'yours' ? 'citation yours' : 'citation competitor';
      html += '<span class="' + cls + '" id="seg' + tok.segIdx + '">';
      inCitation = true;
      currentSeg = tok.segIdx;
    }
    if (inCitation && tok.segIdx !== currentSeg) {
      html += '</span>';
      inCitation = false;
      if (tok.type) {
        var cls2 = tok.type === 'yours' ? 'citation yours' : 'citation competitor';
        html += '<span class="' + cls2 + '" id="seg' + tok.segIdx + '">';
        inCitation = true;
        currentSeg = tok.segIdx;
      }
    }
    if (!tok.type && inCitation) {
      html += '</span>';
      inCitation = false;
    }

    html += '<span class="word' + (vis ? ' visible' : '') + '">' + tok.text + '</span>';
  }
  if (inCitation) html += '</span>';
  html += '<span class="cursor"></span>';
  return html;
}

function updateDots(idx) {
  document.getElementById('sd0').className = 'sdot' + (idx === 0 ? ' active' : '');
  document.getElementById('sd1').className = 'sdot' + (idx === 1 ? ' active' : '');
}

function tick() {
  phaseTimer += 16;

  // Phase -1: type query
  if (phase === -1) {
    queryTyped += 0.6;
    var chars = Math.min(Math.floor(queryTyped), queryText.length);
    searchTextEl.textContent = queryText.substring(0, chars) + (chars < queryText.length ? '|' : '');
    statusText.textContent = '';
    if (chars >= queryText.length) {
      searchTextEl.textContent = queryText;
      if (phaseTimer > queryText.length / 0.6 * 16 + 600) {
        phase = 0;
        phaseTimer = 0;
        wordIdx = 0;
        wordTimer = 0;
        statusText.textContent = 'Generating response...';
        statusText.className = 'status-text';
      }
    }
  }

  // Phase 0: reveal words naturally (2-4 at a time, varying speed)
  else if (phase === 0) {
    wordTimer += 16;
    var speed = 50 + Math.random() * 40; // ms per word cluster
    if (wordTimer > speed) {
      wordTimer = 0;
      var batch = 1 + Math.floor(Math.random() * 3); // 1-3 words at once
      wordIdx = Math.min(wordIdx + batch, tokens.length);
    }
    answerEl.innerHTML = buildRevealHTML(wordIdx);
    updateDots(0);
    statusText.textContent = 'Generating response...';
    statusText.className = 'status-text';
    if (wordIdx >= tokens.length) {
      phase = 1;
      phaseTimer = 0;
    }
  }

  // Phase 1: stable
  else if (phase === 1) {
    answerEl.innerHTML = fullHTML + '<span class="cursor"></span>';
    statusText.textContent = '5 sources cited';
    statusText.className = 'status-text';
    updateDots(0);
    if (phaseTimer > 2200) {
      phase = 2;
      phaseTimer = 0;
    }
  }

  // Phase 2: glitch
  else if (phase === 2) {
    if (phaseTimer < 50) answerEl.innerHTML = fullHTML;
    var el = document.getElementById('seg5');
    if (el) el.className = 'citation yours glitching';
    statusText.textContent = 'Unstructured data detected...';
    statusText.className = 'status-text warning';
    updateDots(0);
    if (phaseTimer > 1400) {
      phase = 3;
      phaseTimer = 0;
    }
  }

  // Phase 3: dissolved
  else if (phase === 3) {
    var el = document.getElementById('seg5');
    if (el) el.className = 'citation yours dissolved';
    statusText.textContent = 'Your Brand — skipped. No entity authority.';
    statusText.className = 'status-text warning';
    updateDots(0);
    if (phaseTimer > 3000) {
      phase = 5;
      phaseTimer = 0;
    }
  }

  // Phase 5: restore
  else if (phase === 5) {
    var el = document.getElementById('seg5');
    if (el) {
      el.className = 'citation yours restored';
      el.textContent = 'Your Brand';
    }
    statusText.textContent = 'With GEO — Your Brand cited #1';
    statusText.className = 'status-text success';
    updateDots(1);
    if (phaseTimer > 3500) {
      // Reset everything
      phase = -1;
      phaseTimer = 0;
      queryTyped = 0;
      wordIdx = 0;
      searchTextEl.textContent = '';
      answerEl.innerHTML = '';
    }
  }

  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);
</script>
</body>
</html>
