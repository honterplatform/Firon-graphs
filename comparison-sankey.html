<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Old Way vs Firon Way</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0A0A0A; font-family: system-ui, -apple-system, sans-serif; color: #fff; }
  .card { background: #0F0F0F; width: 100%; height: 100%; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="card"><canvas id="c"></canvas></div>
<script>
var c = document.getElementById('c');
var ctx = c.getContext('2d');
var dpr = window.devicePixelRatio || 1;

function resize() {
  var r = c.parentElement.getBoundingClientRect();
  c.width = r.width * dpr;
  c.height = r.height * dpr;
  c.style.width = r.width + 'px';
  c.style.height = r.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { w: r.width, h: r.height };
}

function drawFlow(x1, y1, x2, y2, thickness, color, alpha) {
  var t = thickness / 2;
  var cpx = (x1 + x2) / 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1 - t);
  ctx.bezierCurveTo(cpx, y1 - t, cpx, y2 - t, x2, y2 - t);
  ctx.lineTo(x2, y2 + t);
  ctx.bezierCurveTo(cpx, y2 + t, cpx, y1 + t, x1, y1 + t);
  ctx.closePath();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fill();
  ctx.globalAlpha = 1;
}

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }

var d = resize();
var duration = 4000;
var startTime = null;

// Left flows: Budget -> channels (some wasted)
var leftFlows = [
  { label: 'Search', value: 12, color: '#444' },
  { label: 'Social', value: 10, color: '#3A3A3A' },
  { label: 'Display', value: 8, color: '#333' },
  { label: 'Other', value: 8, color: '#2A2A2A' },
  { label: 'Wasted', value: 62, color: '#1A1A1A' },
];

// Right flows: Budget -> channels -> all reach profit
var rightFlows = [
  { label: 'Search', value: 30, color: '#FB3B24' },
  { label: 'Social', value: 24, color: '#FC5844' },
  { label: 'Email', value: 18, color: '#FF7A6B' },
  { label: 'SEO', value: 16, color: '#FFB0A5' },
  { label: 'Direct', value: 12, color: '#FDD8D3' },
];

function getFlowPositions(flows, topY, botY, maxThickness) {
  var total = flows.reduce(function(s, f) { return s + f.value; }, 0);
  var available = botY - topY;
  var gap = 4;
  var totalGap = gap * (flows.length - 1);
  var usable = available - totalGap;
  var positions = [];
  var currentY = topY;
  flows.forEach(function(f) {
    var t = (f.value / total) * usable;
    t = Math.max(t, 3);
    positions.push({ cy: currentY + t / 2, thickness: t });
    currentY += t + gap;
  });
  return positions;
}

function draw(ts) {
  if (!startTime) startTime = ts;
  var p = Math.min((ts - startTime) / duration, 1);
  d = resize();
  var w = d.w, h = d.h, hw = w / 2;
  var mob = w <= 480;
  var fs = mob ? 9 : 11;
  var titleFs = mob ? 11 : 13;

  ctx.clearRect(0, 0, w, h);

  // Divider
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = '#1A1A1A';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(hw, 28); ctx.lineTo(hw, h - 6);
  ctx.stroke();
  ctx.setLineDash([]);

  var padX = mob ? 10 : 20;
  var topY = 50;
  var botY = h - 20;

  // ---- LEFT SIDE ----
  var lp = easeOutCubic(Math.min(p / 0.42, 1));

  // Title
  ctx.font = 'bold ' + titleFs + 'px system-ui';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#555';
  ctx.fillText('The Old Way', hw * 0.5, 18);

  var lSourceX = padX + 10;
  var lDestX = hw - padX - 10;
  var lSourcePos = getFlowPositions(leftFlows, topY, botY, 40);
  var lDestPos = getFlowPositions(leftFlows, topY, botY, 40);

  // Source label
  ctx.save();
  ctx.font = 'bold ' + fs + 'px system-ui';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#666';
  ctx.globalAlpha = lp;
  ctx.fillText('Budget', lSourceX - 4, topY - 10);

  // Draw flows
  leftFlows.forEach(function(f, i) {
    var sp = lSourcePos[i];
    var dp = lDestPos[i];
    var flowAlpha = lp * (f.label === 'Wasted' ? 0.7 : 0.5);
    drawFlow(lSourceX, sp.cy, lDestX, dp.cy, sp.thickness * lp, f.color, flowAlpha);

    // Destination labels
    if (lp > 0.6) {
      ctx.globalAlpha = (lp - 0.6) / 0.4;
      ctx.font = fs + 'px system-ui';
      ctx.textAlign = 'left';
      ctx.fillStyle = f.label === 'Wasted' ? '#555' : '#444';
      ctx.fillText(f.label + (f.label === 'Wasted' ? '' : ''), lDestX + 6, dp.cy + 3);

    }
  });

  // Source bracket
  ctx.beginPath();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.moveTo(lSourceX - 2, topY);
  ctx.lineTo(lSourceX - 2, botY);
  ctx.stroke();

  ctx.restore();

  // ---- RIGHT SIDE ----
  var rStart = 0.40;
  var rp = easeOutCubic(Math.max(0, Math.min((p - rStart) / 0.48, 1)));

  // Title
  ctx.font = 'bold ' + titleFs + 'px system-ui';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FB3B24';
  ctx.globalAlpha = rp > 0 ? 1 : 0;
  ctx.fillText('Firon Way', hw + hw * 0.5, 18);
  ctx.globalAlpha = 1;

  var rSourceX = hw + padX + 10;
  var rMidX = hw + hw * 0.52;
  var rDestX = w - padX - 10;
  var rSourcePos = getFlowPositions(rightFlows, topY, botY, 40);

  // All converge to "Profit" center
  var profitY = topY + (botY - topY) / 2;

  ctx.save();
  ctx.globalAlpha = rp;

  // Source label
  ctx.font = 'bold ' + fs + 'px system-ui';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#888';
  ctx.fillText('Budget', rSourceX - 4, topY - 10);

  // Profit label
  ctx.textAlign = 'right';
  ctx.fillStyle = '#FB3B24';
  ctx.font = 'bold ' + (mob ? 12 : 14) + 'px system-ui';
  if (rp > 0.5) {
    ctx.globalAlpha = (rp - 0.5) / 0.5;
    ctx.fillText('Profit', rDestX + 4, profitY - 8);
    ctx.globalAlpha = rp;
  }

  // Draw flows: source -> mid (spread), then mid -> profit (converge)
  var rMidPos = getFlowPositions(rightFlows, topY, botY, 40);

  rightFlows.forEach(function(f, i) {
    var sp = rSourcePos[i];
    var mp = rMidPos[i];
    var flowAlpha = rp * 0.7;

    // Source to mid (spread)
    drawFlow(rSourceX, sp.cy, rMidX, mp.cy, sp.thickness * rp, f.color, flowAlpha);

    // Mid to profit (converge)
    var convThickness = Math.max(sp.thickness * rp * 0.6, 2);
    drawFlow(rMidX, mp.cy, rDestX - 20, profitY, convThickness, f.color, flowAlpha * 0.8);

    // Channel labels at mid
    if (rp > 0.4) {
      ctx.globalAlpha = (rp - 0.4) / 0.6;
      ctx.font = (mob ? 8 : 10) + 'px system-ui';
      ctx.textAlign = 'left';
      ctx.fillStyle = '#888';
      ctx.fillText(f.label, rMidX + 4, mp.cy + 3);
      ctx.globalAlpha = rp;
    }
  });

  // Source bracket
  ctx.beginPath();
  ctx.strokeStyle = '#FB3B24';
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = rp * 0.5;
  ctx.moveTo(rSourceX - 2, topY);
  ctx.lineTo(rSourceX - 2, botY);
  ctx.stroke();

  // Profit glow
  if (rp > 0.8) {
    ctx.globalAlpha = (rp - 0.8) / 0.2 * 0.15;
    ctx.beginPath();
    ctx.arc(rDestX - 10, profitY, 30, 0, Math.PI * 2);
    ctx.fillStyle = '#FB3B24';
    ctx.fill();
  }

  ctx.restore();

  if (p < 1) requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
window.addEventListener('resize', function() { startTime = null; requestAnimationFrame(draw); });
</script>
</body>
</html>
