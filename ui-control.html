<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Total UI Control</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0A0A0A;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
  }
  .card {
    background: #0F0F0F;
    width: 100%;
    height: 100%;
    overflow: hidden;
    padding: 16px;
  }
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    font-size: 13px;
    color: #888;
  }
  .breadcrumb .separator { color: #444; }
  .breadcrumb .active { color: #ccc; font-weight: 600; }
  .url-bar {
    font-size: 11px;
    color: #555;
    margin-bottom: 14px;
    padding: 6px 10px;
    background: #141414;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .url-globe {
    width: 14px; height: 14px;
    background: #333;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .content {
    display: flex;
    gap: 16px;
    height: calc(100% - 56px);
    overflow: hidden;
  }
  .fields-panel {
    flex: 1;
    min-width: 0;
    overflow-y: auto;
  }
  .fields-panel::-webkit-scrollbar { display: none; }
  .field-row {
    display: flex;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #1A1A1A;
    opacity: 0;
    transform: translateX(-10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .field-row.visible {
    opacity: 1;
    transform: translateX(0);
  }
  .field-key {
    width: 130px;
    flex-shrink: 0;
    font-size: 12px;
    color: #666;
  }
  .field-value {
    font-size: 12px;
    color: #ccc;
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .swatch {
    width: 14px; height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .swatch.red { background: #FB3B24; }
  .swatch.dark { background: #0F0F0F; }
  .swatch.cream { background: #F5F0E6; }
  .swatch.green { background: #4BC882; }
  .mono { font-family: 'SF Mono', monospace; color: #ccc; }
  .code-panel {
    width: 280px;
    flex-shrink: 0;
    background: #141414;
    border-radius: 4px;
    padding: 12px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .code-panel.visible { opacity: 1; }
  .code-tabs {
    display: flex;
    gap: 16px;
    margin-bottom: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .code-tab { color: #555; cursor: pointer; padding-bottom: 4px; }
  .code-tab.active { color: #FB3B24; border-bottom: 2px solid #FB3B24; }
  .code-line {
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    font-size: 10px;
    line-height: 1.7;
    white-space: pre;
    color: #888;
  }
  .ck { color: #FB3B24; }
  .cv { color: #ccc; }
  .cb { color: #555; }
  @media (max-width: 480px) {
    .breadcrumb { font-size: 11px; margin-bottom: 2px; }
    .url-bar { margin-bottom: 8px; padding: 4px 8px; font-size: 10px; }
    .content { flex-direction: column; gap: 8px; height: auto; }
    .fields-panel { flex: none; }
    .field-row { padding: 5px 0; }
    .field-key { width: 100px; font-size: 11px; }
    .field-value { font-size: 11px; }
    .code-panel { width: 100%; max-height: 120px; padding: 8px; }
    .code-tabs { gap: 10px; margin-bottom: 6px; font-size: 10px; }
    .code-line { font-size: 9px; line-height: 1.5; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="breadcrumb">
    <span>Theme</span>
    <span class="separator">›</span>
    <span class="active">Brand tokens</span>
  </div>
  <div class="url-bar">
    <div class="url-globe"></div>
    https://firon.io/themes/petit-atelier/concierge
  </div>
  <div class="content">
    <div class="fields-panel" id="fields"></div>
    <div class="code-panel" id="codePanel">
      <div class="code-tabs">
        <span class="code-tab active">THEME</span>
        <span class="code-tab">PREVIEW</span>
        <span class="code-tab">MORE INFO</span>
      </div>
      <div id="codeContent"></div>
    </div>
  </div>
</div>
<script>
const fields = [
  { key: 'theme_id', value: '<span class="mono">petit-atelier-concierge</span>' },
  { key: 'ownership', value: 'Brand-owned · no third-party' },
  { key: 'primary', value: '<span class="swatch red"></span><span class="mono">#FB3B24</span>' },
  { key: 'surface', value: '<span class="swatch dark"></span><span class="mono">#0F0F0F</span>' },
  { key: 'accent', value: '<span class="swatch cream"></span><span class="mono">#F5F0E6</span>' },
  { key: 'success', value: '<span class="swatch green"></span><span class="mono">#4BC882</span>' },
  { key: 'typeface', value: 'Inter, system-ui' },
  { key: 'radius', value: '<span class="mono">14px</span>' },
  { key: 'avatar', value: 'P · gradient · live' },
  { key: 'voice', value: 'warm · concise · expert' },
  { key: 'powered_by_label', value: '<span style="color:#FB3B24;">none</span>' },
  { key: 'sdk_visible', value: '<span style="color:#FB3B24;">false</span>' },
];

const fieldsEl = document.getElementById('fields');
fields.forEach(f => {
  const row = document.createElement('div');
  row.className = 'field-row';
  row.innerHTML = '<div class="field-key">' + f.key + '</div><div class="field-value">' + f.value + '</div>';
  fieldsEl.appendChild(row);
});

const codeLines = [
  '<span class="cb">{</span>',
  '  <span class="ck">"theme_id"</span>: <span class="cv">"petit-atelier"</span>,',
  '  <span class="ck">"tokens"</span>: <span class="cb">{</span>',
  '    <span class="ck">"primary"</span>: <span class="cv">"#FB3B24"</span>,',
  '    <span class="ck">"surface"</span>: <span class="cv">"#0F0F0F"</span>,',
  '    <span class="ck">"accent"</span>: <span class="cv">"#F5F0E6"</span>,',
  '    <span class="ck">"radius"</span>: <span class="cv">14</span>,',
  '    <span class="ck">"font"</span>: <span class="cv">"Inter"</span>',
  '  <span class="cb">}</span>,',
  '  <span class="ck">"voice"</span>: <span class="cv">"warm.expert"</span>,',
  '  <span class="ck">"avatar"</span>: <span class="cv">"P.gradient"</span>,',
  '  <span class="ck">"powered_by"</span>: <span class="cv">null</span>,',
  '  <span class="ck">"sdk_chrome"</span>: <span class="cv">false</span>',
  '<span class="cb">}</span>',
];

const codeContent = document.getElementById('codeContent');
codeLines.forEach(line => {
  const el = document.createElement('div');
  el.className = 'code-line';
  el.innerHTML = line;
  codeContent.appendChild(el);
});

const rows = document.querySelectorAll('.field-row');
rows.forEach((row, i) => {
  setTimeout(() => row.classList.add('visible'), 200 + i * 75);
});
setTimeout(() => document.getElementById('codePanel').classList.add('visible'), 500);
</script>
</body>
</html>
