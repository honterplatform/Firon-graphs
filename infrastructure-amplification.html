<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infrastructure First Amplification</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0A0A0A; font-family: system-ui, -apple-system, sans-serif; color: #fff; }
  .card {
    background: #0F0F0F;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .title { font-size: 14px; font-weight: 700; color: #ccc; }
  .threshold-label {
    font-size: 9px;
    font-weight: 600;
    color: #555;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .threshold-line {
    width: 16px;
    height: 1px;
    background: #FB3B24;
    opacity: 0.5;
  }
  .clusters {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-height: 0;
  }
  .cluster {
    flex: 1;
    background: #141414;
    border: 1px solid #1A1A1A;
    border-radius: 6px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 10px;
    opacity: 0;
    transform: translateX(-8px);
    transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.5s ease;
  }
  .cluster.visible { opacity: 1; transform: translateX(0); }
  .cluster.deploying { border-color: rgba(251,59,36,0.25); }
  .cl-info {
    width: 100px;
    flex-shrink: 0;
  }
  .cl-name {
    font-size: 10px;
    font-weight: 600;
    color: #555;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.4s ease;
  }
  .cluster.deploying .cl-name { color: #ccc; }
  .cl-organic {
    font-size: 8px;
    color: #333;
    margin-top: 2px;
    font-weight: 600;
  }
  .cl-organic span {
    color: #555;
    transition: color 0.4s ease;
  }
  .cluster.deploying .cl-organic span { color: #FB3B24; }
  .sis-area {
    flex: 1;
    min-width: 0;
  }
  .sis-bar-wrap {
    width: 100%;
    height: 6px;
    background: #1A1A1A;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }
  .sis-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1), background 0.4s ease;
    width: 0%;
  }
  .sis-threshold {
    position: absolute;
    left: 40%;
    top: -4px;
    bottom: -4px;
    width: 1px;
    background: rgba(251,59,36,0.35);
    pointer-events: none;
  }
  .sis-val {
    font-size: 8px;
    font-weight: 600;
    color: #444;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
    transition: color 0.4s ease;
  }
  .cluster.deploying .sis-val { color: #FB3B24; }
  .cl-qs {
    width: 32px;
    flex-shrink: 0;
    text-align: center;
  }
  .qs-val {
    font-size: 14px;
    font-weight: 800;
    color: #333;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    transition: color 0.4s ease;
  }
  .cluster.deploying .qs-val { color: #FB3B24; }
  .qs-label {
    font-size: 7px;
    font-weight: 600;
    color: #333;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .cl-status {
    width: 62px;
    flex-shrink: 0;
    text-align: right;
  }
  .status-tag {
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    padding: 2px 6px;
    border-radius: 3px;
    display: inline-block;
    background: rgba(60,60,60,0.15);
    color: #444;
    transition: background 0.4s ease, color 0.4s ease;
  }
  .cluster.deploying .status-tag {
    background: rgba(251,59,36,0.1);
    color: #FB3B24;
  }
  .status-dot {
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #333;
    margin-right: 3px;
    vertical-align: middle;
    transition: background 0.4s ease;
  }
  .cluster.deploying .status-dot {
    background: #FB3B24;
    animation: pulse 1.5s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @media (max-width: 480px) {
    .title { font-size: 13px; }
    .cl-info { width: 72px; }
    .cl-name { font-size: 9px; }
    .qs-val { font-size: 12px; }
    .cl-status { width: 52px; }
    .status-tag { font-size: 7px; padding: 2px 4px; }
    .cluster { padding: 0 8px; gap: 6px; }
    .cl-qs { width: 26px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="title">Search Impression Share</div>
    <div class="threshold-label"><div class="threshold-line"></div>40% deploy threshold</div>
  </div>
  <div class="clusters" id="clusters"></div>
</div>
<script>
var clusters = [
  { name: 'Brand + Product', organic: 'Pos 1-3', sis: [62, 68, 72, 65], qs: [9, 10, 10, 9] },
  { name: 'High-Intent Buyer', organic: 'Pos 1-5', sis: [48, 54, 51, 58], qs: [8, 9, 9, 9] },
  { name: 'Category Terms', organic: 'Pos 2-6', sis: [41, 44, 38, 46], qs: [8, 8, 7, 8] },
  { name: 'Comparison KWs', organic: 'Pos 3-8', sis: [34, 32, 36, 42], qs: [7, 7, 7, 8] },
  { name: 'Broad Discovery', organic: 'Pos 8-15', sis: [18, 16, 20, 22], qs: [5, 5, 6, 5] },
];

var stateIdx = 0;
var clustersEl = document.getElementById('clusters');
var clusterEls = [];

clusters.forEach(function(cl, i) {
  var el = document.createElement('div');
  el.className = 'cluster';
  el.innerHTML =
    '<div class="cl-info">' +
      '<div class="cl-name">' + cl.name + '</div>' +
      '<div class="cl-organic">Organic <span>' + cl.organic + '</span></div>' +
    '</div>' +
    '<div class="sis-area">' +
      '<div class="sis-bar-wrap">' +
        '<div class="sis-bar" id="sisbar' + i + '"></div>' +
        '<div class="sis-threshold"></div>' +
      '</div>' +
      '<div class="sis-val" id="sisval' + i + '">0%</div>' +
    '</div>' +
    '<div class="cl-qs">' +
      '<div class="qs-val" id="qs' + i + '">0</div>' +
      '<div class="qs-label">QS</div>' +
    '</div>' +
    '<div class="cl-status">' +
      '<div class="status-tag" id="tag' + i + '"><span class="status-dot"></span>—</div>' +
    '</div>';
  clustersEl.appendChild(el);
  clusterEls.push(el);
});

function applyState(idx) {
  clusters.forEach(function(cl, i) {
    var sis = cl.sis[idx];
    var qs = cl.qs[idx];
    var isDeploying = sis >= 40;
    var bar = document.getElementById('sisbar' + i);
    var val = document.getElementById('sisval' + i);
    var qsEl = document.getElementById('qs' + i);
    var tag = document.getElementById('tag' + i);

    bar.style.width = sis + '%';
    bar.style.background = isDeploying ? '#FB3B24' : '#333';
    val.textContent = sis + '%';
    qsEl.textContent = qs;

    tag.innerHTML = '<span class="status-dot"></span>' + (isDeploying ? 'Deploying' : 'Building');
    clusterEls[i].className = 'cluster visible' + (isDeploying ? ' deploying' : '');
  });
}

// Staggered reveal
clusterEls.forEach(function(el, i) {
  setTimeout(function() { el.classList.add('visible'); }, 300 + i * 100);
});

// Initial state
setTimeout(function() {
  applyState(0);
}, 500);

// Cycle states
setInterval(function() {
  stateIdx = (stateIdx + 1) % clusters[0].sis.length;
  applyState(stateIdx);
}, 3000);
</script>
</body>
</html>
