<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database Memory</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0A0A0A;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
  }
  .card {
    background: #0F0F0F;
    width: 100%;
    height: 100%;
    overflow: hidden;
    padding: 16px;
  }
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    font-size: 13px;
    color: #888;
  }
  .breadcrumb .separator { color: #444; }
  .breadcrumb .active { color: #ccc; font-weight: 600; }
  .url-bar {
    font-size: 11px;
    color: #555;
    margin-bottom: 14px;
    padding: 6px 10px;
    background: #141414;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .url-globe {
    width: 14px; height: 14px;
    background: #333;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .content {
    display: flex;
    gap: 16px;
    height: calc(100% - 56px);
    overflow: hidden;
  }
  .fields-panel {
    flex: 1;
    min-width: 0;
    overflow-y: auto;
  }
  .fields-panel::-webkit-scrollbar { display: none; }
  .field-row {
    display: flex;
    padding: 8px 0;
    border-bottom: 1px solid #1A1A1A;
    opacity: 0;
    transform: translateX(-10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .field-row.visible {
    opacity: 1;
    transform: translateX(0);
  }
  .field-row.indent { padding-left: 20px; }
  .field-key {
    width: 130px;
    flex-shrink: 0;
    font-size: 12px;
    color: #666;
  }
  .field-value {
    font-size: 12px;
    color: #ccc;
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .field-value .accent { color: #FB3B24; font-weight: 600; }
  .field-value .ok { color: #4BC882; }
  .code-panel {
    width: 280px;
    flex-shrink: 0;
    background: #141414;
    border-radius: 4px;
    padding: 12px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .code-panel.visible { opacity: 1; }
  .code-tabs {
    display: flex;
    gap: 16px;
    margin-bottom: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .code-tab { color: #555; cursor: pointer; padding-bottom: 4px; }
  .code-tab.active { color: #FB3B24; border-bottom: 2px solid #FB3B24; }
  .code-line {
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    font-size: 10px;
    line-height: 1.7;
    white-space: pre;
    color: #888;
  }
  .ck { color: #FB3B24; }
  .cv { color: #ccc; }
  .cb { color: #555; }
  .cg { color: #4BC882; }
  @media (max-width: 480px) {
    .breadcrumb { font-size: 11px; margin-bottom: 2px; }
    .url-bar { margin-bottom: 8px; padding: 4px 8px; font-size: 10px; }
    .content { flex-direction: column; gap: 8px; height: auto; }
    .fields-panel { flex: none; }
    .field-row { padding: 5px 0; }
    .field-row.indent { padding-left: 12px; }
    .field-key { width: 90px; font-size: 11px; }
    .field-value { font-size: 11px; }
    .code-panel { width: 100%; max-height: 120px; padding: 8px; }
    .code-tabs { gap: 10px; margin-bottom: 6px; font-size: 10px; }
    .code-line { font-size: 9px; line-height: 1.5; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="breadcrumb">
    <span>Profiles</span>
    <span class="separator">›</span>
    <span class="active">Customer memory</span>
  </div>
  <div class="url-bar">
    <div class="url-globe"></div>
    https://firon.io/profiles/sarah-k-2814?brand=petit-atelier
  </div>
  <div class="content">
    <div class="fields-panel" id="fields"></div>
    <div class="code-panel" id="codePanel">
      <div class="code-tabs">
        <span class="code-tab active">RECORD</span>
        <span class="code-tab">PREDICT</span>
        <span class="code-tab">MORE INFO</span>
      </div>
      <div id="codeContent"></div>
    </div>
  </div>
</div>
<script>
const fields = [
  { key: 'customer_id', value: 'sarah_k_2814' },
  { key: 'status', value: '<span class="ok">● returning</span> · visit 4' },
  { key: 'member_since', value: '2024-08-12' },
  { key: 'sizing_arc', value: '' },
  { key: 'worn', value: '0–3M, 3–6M', indent: true },
  { key: 'current', value: '3–6M', indent: true },
  { key: 'predicted_next', value: '<span class="accent">6–9M</span>', indent: true },
  { key: 'last_visit', value: '6 weeks ago' },
  { key: 'next_size_due', value: '~4 weeks' },
  { key: 'last_purchases', value: '' },
  { key: 'item_1', value: 'Botanical Bloom Romper · 3-6M · £42', indent: true },
  { key: 'item_2', value: 'Sand Stripe Onesie · 3-6M · £28', indent: true },
  { key: 'item_3', value: 'Constellation Sleeper · 0-3M · £38', indent: true },
  { key: 'predicted', value: '<span class="accent">Petit Linen Sleeper · 6-9M · £38</span>' },
  { key: 'confidence', value: '<span class="ok">0.94</span>' },
];

const fieldsEl = document.getElementById('fields');
fields.forEach(f => {
  const row = document.createElement('div');
  row.className = 'field-row' + (f.indent ? ' indent' : '');
  row.innerHTML = '<div class="field-key">' + f.key + '</div><div class="field-value">' + f.value + '</div>';
  fieldsEl.appendChild(row);
});

const codeLines = [
  '<span class="cb">{</span>',
  '  <span class="ck">"customer_id"</span>: <span class="cv">"sarah_k_2814"</span>,',
  '  <span class="ck">"sizing_arc"</span>: <span class="cb">[</span>',
  '    <span class="cv">"0-3M"</span>, <span class="cv">"3-6M"</span>, <span class="ck">"6-9M*"</span>',
  '  <span class="cb">]</span>,',
  '  <span class="ck">"last_visit_days"</span>: <span class="cv">42</span>,',
  '  <span class="ck">"purchases"</span>: <span class="cv">7</span>,',
  '  <span class="ck">"ltv"</span>: <span class="cv">342.00</span>,',
  '  <span class="ck">"predicted"</span>: <span class="cb">{</span>',
  '    <span class="ck">"sku"</span>: <span class="cv">"PLS-69"</span>,',
  '    <span class="ck">"size"</span>: <span class="cv">"6-9M"</span>,',
  '    <span class="ck">"price"</span>: <span class="cv">38.00</span>,',
  '    <span class="ck">"confidence"</span>: <span class="cg">0.94</span>',
  '  <span class="cb">}</span>',
  '<span class="cb">}</span>',
];

const codeContent = document.getElementById('codeContent');
codeLines.forEach(line => {
  const el = document.createElement('div');
  el.className = 'code-line';
  el.innerHTML = line;
  codeContent.appendChild(el);
});

const rows = document.querySelectorAll('.field-row');
rows.forEach((row, i) => {
  setTimeout(() => row.classList.add('visible'), 200 + i * 75);
});
setTimeout(() => document.getElementById('codePanel').classList.add('visible'), 500);
</script>
</body>
</html>
