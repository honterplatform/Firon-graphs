<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>527% Growth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0A0A0A; font-family: system-ui, -apple-system, sans-serif; color: #fff; }
  .card { background: #0F0F0F; width: 100%; height: 100%; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="card"><canvas id="c"></canvas></div>
<script>
var c = document.getElementById('c');
var ctx = c.getContext('2d');
var dpr = window.devicePixelRatio || 1;
var time = 0;

function resize() {
  var r = c.parentElement.getBoundingClientRect();
  c.width = r.width * dpr;
  c.height = r.height * dpr;
  c.style.width = r.width + 'px';
  c.style.height = r.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { w: r.width, h: r.height };
}

// Data: AI referral traffic index (base = 100 in 2022)
var bars = [
  { label: '2022', value: 100 },
  { label: '2023', value: 180 },
  { label: '2024', value: 340 },
  { label: '2025', value: 527 },
  { label: '2026', value: 627 },
];
var maxVal = 680;

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function draw() {
  var d = resize();
  var w = d.w, h = d.h;
  var mob = w <= 480;
  time += 0.016;

  ctx.clearRect(0, 0, w, h);

  // Subtle grid
  ctx.strokeStyle = 'rgba(251,59,36,0.03)';
  ctx.lineWidth = 0.5;
  var gs = mob ? 20 : 28;
  for (var gx = 0; gx < w; gx += gs) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, h); ctx.stroke();
  }
  for (var gy = 0; gy < h; gy += gs) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();
  }

  // Chart area
  var padL = mob ? 10 : 16;
  var padR = mob ? 10 : 16;
  var padT = mob ? 14 : 18;
  var padB = mob ? 24 : 30;
  var chartW = w - padL - padR;
  var chartH = h - padT - padB;
  var barGap = mob ? 6 : 10;
  var barW = (chartW - barGap * (bars.length + 1)) / bars.length;
  var baseY = padT + chartH;

  // Horizontal grid lines
  for (var gl = 0; gl <= 4; gl++) {
    var gy2 = baseY - (gl / 4) * chartH;
    ctx.beginPath();
    ctx.moveTo(padL, gy2);
    ctx.lineTo(w - padR, gy2);
    ctx.strokeStyle = '#1A1A1A';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Draw bars with staggered animation
  bars.forEach(function(bar, i) {
    var barDelay = i * 0.3;
    var barT = Math.max(0, Math.min((time - 0.3 - barDelay) / 1.2, 1));
    var ease = easeOutCubic(barT);

    var barH = (bar.value / maxVal) * chartH * ease;
    var bx = padL + barGap + i * (barW + barGap);
    var by = baseY - barH;

    var isHighlight = i >= 3;
    var alpha = isHighlight ? 0.9 : 0.3 + i * 0.1;

    // Bar glow for highlighted
    if (isHighlight && barT > 0) {
      ctx.shadowColor = 'rgba(251,59,36,0.2)';
      ctx.shadowBlur = 16;
    }

    // Bar
    if (barH > 2) {
      roundRectPath(bx, by, barW, barH, 3);
      ctx.fillStyle = isHighlight ? '#FB3B24' : 'rgba(251,59,36,' + alpha + ')';
      ctx.fill();
    }

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Value on top of bar
    if (barT > 0.5) {
      var valAlpha = Math.min((barT - 0.5) / 0.5, 1);
      ctx.font = 'bold ' + (mob ? 10 : 13) + 'px system-ui';
      ctx.textAlign = 'center';
      ctx.globalAlpha = valAlpha;
      ctx.fillStyle = isHighlight ? '#FB3B24' : '#555';

      if (i === 3) {
        // Show 527% growth label
        ctx.fillStyle = '#FB3B24';
        ctx.fillText('527%', bx + barW / 2, by - (mob ? 4 : 6));
      } else {
        ctx.fillText(bar.value, bx + barW / 2, by - (mob ? 4 : 6));
      }
      ctx.globalAlpha = 1;
    }

    // Year label
    ctx.font = (mob ? 8 : 10) + 'px system-ui';
    ctx.textAlign = 'center';
    ctx.fillStyle = isHighlight ? '#FB3B24' : '#444';
    ctx.fillText(bar.label, bx + barW / 2, baseY + (mob ? 12 : 16));
  });

  // Growth arrow from 2022 to 2025
  var arrowT = Math.max(0, Math.min((time - 2.5) / 1, 1));
  if (arrowT > 0) {
    var x1 = padL + barGap + 0 * (barW + barGap) + barW / 2;
    var x2 = padL + barGap + 3 * (barW + barGap) + barW / 2;
    var arrowY = padT + chartH * 0.08;

    ctx.globalAlpha = easeOutCubic(arrowT) * 0.6;

    // Arrow line
    ctx.beginPath();
    ctx.moveTo(x1, arrowY);
    ctx.lineTo(x1 + (x2 - x1) * easeOutCubic(arrowT), arrowY);
    ctx.strokeStyle = '#FB3B24';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrow head
    if (arrowT > 0.8) {
      var ax = x1 + (x2 - x1) * easeOutCubic(arrowT);
      ctx.beginPath();
      ctx.moveTo(ax, arrowY);
      ctx.lineTo(ax - 6, arrowY - 3);
      ctx.lineTo(ax - 6, arrowY + 3);
      ctx.closePath();
      ctx.fillStyle = '#FB3B24';
      ctx.fill();
    }

    // "527% YoY" label on arrow
    if (arrowT > 0.5) {
      ctx.font = 'bold ' + (mob ? 8 : 10) + 'px system-ui';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#FB3B24';
      ctx.fillText('527% YoY', (x1 + x2) / 2, arrowY - (mob ? 5 : 6));
    }

    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
