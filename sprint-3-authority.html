<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 3 · Authority Layer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0F0F0F;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
  }

  .card {
    width: 100%;
    height: 100%;
    background:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px) 0 0 / 100% 24px,
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px) 0 0 / 24px 100%,
      #0F0F0F;
    padding: clamp(20px, 4vh, 36px) clamp(20px, 3.5vw, 40px);
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 1.5vh, 14px);
    position: relative;
    overflow: hidden;
  }

  .card-label {
    font-size: clamp(11px, 1.5vh, 14px);
    font-weight: 700;
    color: #FB3B24;
    text-transform: uppercase;
    letter-spacing: 1.4px;
  }

  .card-title {
    font-size: clamp(26px, 5vh, 44px);
    font-weight: 800;
    color: rgba(255,255,255,0.95);
    line-height: 1.05;
    letter-spacing: -0.5px;
  }

  .chart-container {
    flex: 1;
    min-height: 0;
    position: relative;
    padding: clamp(20px, 3vh, 28px) 0 clamp(20px, 3vh, 30px) 0;
  }
  .bars {
    height: 100%;
    width: 100%;
    display: flex;
    align-items: flex-end;
    gap: clamp(8px, 2vw, 22px);
    justify-content: space-between;
    position: relative;
  }
  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
    position: relative;
    min-width: 0;
  }
  .bar-num {
    font-size: clamp(11px, 1.5vh, 14px);
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    font-variant-numeric: tabular-nums;
    transition: color 0.4s;
  }
  .bar-col.highlight .bar-num { color: #FB3B24; }
  .bar {
    width: 100%;
    background: rgba(120,40,30,0.45);
    border-radius: 3px 3px 0 0;
    height: 0;
    transition: height 1.1s cubic-bezier(.2,.8,.2,1);
    box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2);
  }
  .bar-col.highlight .bar {
    background: linear-gradient(180deg, #FB3B24 0%, rgba(251,59,36,0.6) 100%);
    box-shadow: 0 0 16px rgba(251,59,36,0.5), inset 0 -2px 0 rgba(0,0,0,0.2);
  }
  .bar-label {
    font-size: clamp(10px, 1.3vh, 12px);
    font-weight: 700;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: color 0.4s;
  }
  .bar-col.highlight .bar-label { color: #FB3B24; }

  /* Floating annotation */
  .annotation {
    position: absolute;
    top: 14%;
    right: 10%;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: clamp(11px, 1.5vh, 14px);
    font-weight: 700;
    color: #FB3B24;
    letter-spacing: 0.5px;
    opacity: 0;
    transition: opacity 0.6s ease 0.8s;
    pointer-events: none;
  }
  .annotation.show { opacity: 1; }
  .annotation .arrow {
    flex: 1;
    height: 1px;
    border-top: 1.5px dashed #FB3B24;
    min-width: 40px;
    position: relative;
  }
  .annotation .arrow::after {
    content: '';
    position: absolute;
    right: -2px;
    top: -4px;
    border-left: 6px solid #FB3B24;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
  }

  .card-footer {
    font-size: clamp(11px, 1.5vh, 14px);
    color: rgba(255,255,255,0.55);
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-label">Phase 3 · Growth &amp; Authority</div>
  <div class="card-title">"Authority Compound"</div>

  <div class="chart-container">
    <div class="annotation" id="annotation">
      <span>+278% Authority</span>
      <span class="arrow"></span>
    </div>
    <div class="bars" id="bars"></div>
  </div>

  <div class="card-footer">Clusters and citations. AI engines start recommending you.</div>
</div>

<script>
var DATA = [
  { val: 23, label: 'Pre-Sprint' },
  { val: 41, label: 'Week 1' },
  { val: 64, label: 'Week 2' },
  { val: 87, label: 'Week 3', highlight: true }
];

var MAX = 100;
var barsEl = document.getElementById('bars');
var annotation = document.getElementById('annotation');

function build() {
  barsEl.innerHTML = '';
  DATA.forEach(function(d) {
    var col = document.createElement('div');
    col.className = 'bar-col' + (d.highlight ? ' highlight' : '');
    col.innerHTML =
      '<div class="bar-num">' + d.val + '</div>' +
      '<div class="bar" data-h="' + (d.val / MAX * 100) + '"></div>' +
      '<div class="bar-label">' + d.label + '</div>';
    barsEl.appendChild(col);
  });
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function runCycle() {
  build();
  annotation.classList.remove('show');

  // Reset bar heights to 0
  document.querySelectorAll('.bar').forEach(function(b) { b.style.height = '0%'; });

  await sleep(400);

  // Grow bars sequentially
  var bars = document.querySelectorAll('.bar');
  for (var i = 0; i < bars.length; i++) {
    bars[i].style.height = bars[i].dataset.h + '%';
    await sleep(220);
  }

  await sleep(400);
  annotation.classList.add('show');

  await sleep(5500);
  runCycle();
}

build();
window.addEventListener('load', function() { setTimeout(runCycle, 200); });
</script>
</body>
</html>
