<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversion Rate</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0A0A0A; font-family: system-ui, -apple-system, sans-serif; color: #fff; }
  .card {
    background: #0F0F0F;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    text-align: center;
    margin-bottom: 12px;
    flex-shrink: 0;
  }
  .title { font-size: 14px; font-weight: 700; color: #ccc; }
  .ab-container {
    flex: 1;
    display: flex;
    gap: 0;
    min-height: 0;
  }
  .variant {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 8px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .variant.visible { opacity: 1; }
  .variant-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #555;
    margin-bottom: 8px;
  }
  .variant.winner .variant-label { color: #FB3B24; }
  .wireframe {
    width: 100%;
    max-width: 120px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 6px;
    border: 1px solid #1A1A1A;
    border-radius: 6px;
    min-height: 0;
  }
  .variant.winner .wireframe { border-color: rgba(251,59,36,0.2); }
  .wf-block {
    border-radius: 3px;
    flex-shrink: 0;
  }
  .wf-nav { height: 6px; background: #1A1A1A; }
  .wf-hero { flex: 2; background: #1A1A1A; min-height: 20px; }
  .wf-text { height: 4px; background: #1A1A1A; width: 80%; }
  .wf-text-sm { height: 4px; background: #1A1A1A; width: 60%; }
  .wf-cta {
    height: 10px;
    background: #333;
    width: 60%;
    align-self: center;
    border-radius: 3px;
  }
  .variant.winner .wf-cta { background: #FB3B24; }
  .variant.winner .wf-hero { background: #1A1A1A; }
  .rate-area {
    text-align: center;
    margin-top: 10px;
    flex-shrink: 0;
  }
  .rate-value {
    font-size: 26px;
    font-weight: 800;
    color: #555;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .variant.winner .rate-value { color: #FB3B24; }
  .rate-label {
    font-size: 9px;
    color: #444;
    margin-top: 2px;
  }
  .vs-divider {
    width: 36px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .vs-divider.visible { opacity: 1; }
  .vs-line {
    width: 1px;
    flex: 1;
    background: #1A1A1A;
  }
  .vs-text {
    font-size: 9px;
    color: #444;
    font-weight: 600;
  }
  .lift-badge {
    font-size: 11px;
    font-weight: 700;
    color: #FB3B24;
    background: rgba(251,59,36,0.08);
    padding: 3px 6px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .lift-badge.visible { opacity: 1; transform: scale(1); }
  @media (max-width: 480px) {
    .title { font-size: 13px; }
    .rate-value { font-size: 20px; }
    .wireframe { max-width: 90px; padding: 4px; }
    .vs-divider { width: 28px; }
    .lift-badge { font-size: 9px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="title">Landing Page CRO</div>
  </div>
  <div class="ab-container">
    <div class="variant" id="control">
      <div class="variant-label">Control</div>
      <div class="wireframe">
        <div class="wf-block wf-nav"></div>
        <div class="wf-block wf-hero"></div>
        <div class="wf-block wf-text"></div>
        <div class="wf-block wf-text-sm"></div>
        <div class="wf-block wf-text"></div>
        <div class="wf-block wf-cta"></div>
      </div>
      <div class="rate-area">
        <div class="rate-value" id="rateControl">0%</div>
        <div class="rate-label">Conversion Rate</div>
      </div>
    </div>
    <div class="vs-divider" id="divider">
      <div class="vs-line"></div>
      <div class="vs-text">VS</div>
      <div class="vs-line"></div>
    </div>
    <div class="variant winner" id="variantB">
      <div class="variant-label">Variant B</div>
      <div class="wireframe">
        <div class="wf-block wf-nav"></div>
        <div class="wf-block wf-cta"></div>
        <div class="wf-block wf-hero"></div>
        <div class="wf-block wf-text"></div>
        <div class="wf-block wf-text-sm"></div>
        <div class="wf-block wf-text"></div>
      </div>
      <div class="rate-area">
        <div class="rate-value" id="rateVariant">0%</div>
        <div class="rate-label">Conversion Rate</div>
      </div>
    </div>
  </div>
  <div style="text-align:center;padding:8px 0;flex-shrink:0">
    <div class="lift-badge" id="lift">+225% lift</div>
  </div>
</div>
<script>
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

function animateRate(el, target, dur, delay) {
  setTimeout(function() {
    var start = performance.now();
    function tick(now) {
      var p = Math.min((now - start) / dur, 1);
      var val = easeOutCubic(p) * target;
      el.textContent = val.toFixed(1) + '%';
      if (p < 1) requestAnimationFrame(tick);
      else el.textContent = target.toFixed(1) + '%';
    }
    requestAnimationFrame(tick);
  }, delay);
}

// Reveal sequence
setTimeout(function() { document.getElementById('control').classList.add('visible'); }, 200);
setTimeout(function() { document.getElementById('divider').classList.add('visible'); }, 400);
setTimeout(function() { document.getElementById('variantB').classList.add('visible'); }, 600);

animateRate(document.getElementById('rateControl'), 2.4, 1000, 400);
animateRate(document.getElementById('rateVariant'), 7.8, 1200, 800);

setTimeout(function() { document.getElementById('lift').classList.add('visible'); }, 1600);
</script>
</body>
</html>
