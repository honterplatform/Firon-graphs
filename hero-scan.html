<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Scan · GEO Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: transparent;
    font-family: 'Geist', -apple-system, system-ui, sans-serif;
    color: #000;
    letter-spacing: -0.01em;
  }

  .stage {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: stretch;
    justify-content: center;
    padding: 10px;
  }

  /* App canvas: filled F2F2F2, landscape, fills iframe */
  .shell {
    width: 100%;
    height: 100%;
    max-width: 920px;
    background: #F2F2F2;
    border: 1px solid rgba(0,0,0,0.05);
    border-radius: 8px;
    padding: 12px;
    display: flex;
    gap: 12px;
    overflow: hidden;
  }

  /* === Sidebar: scan history === */
  .sidebar {
    width: 210px;
    flex-shrink: 0;
    background: #FFFFFF;
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sb-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 14px 12px;
  }
  .sb-mark {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: #FB3B24;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .sb-mark svg { width: 12px; height: 12px; }
  .sb-name { font-size: 13px; font-weight: 600; letter-spacing: -0.02em; }
  .sb-name span { color: rgba(0,0,0,0.4); font-weight: 500; }

  .sb-new {
    margin: 0 12px 10px;
    height: 34px;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 12px;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 500;
    color: #000;
    cursor: pointer;
    background: #fff;
    transition: border-color 0.15s ease;
  }
  .sb-new:hover { border-color: #FB3B24; }
  .sb-new:focus-visible { outline: 2px solid #FB3B24; outline-offset: 2px; }
  .sb-new .plus { font-size: 15px; color: #FB3B24; line-height: 1; }

  .sb-label {
    padding: 4px 15px 6px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10px;
    color: rgba(0,0,0,0.4);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .sb-list {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    scrollbar-width: none;
    padding: 0 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .sb-list::-webkit-scrollbar { display: none; }

  .sb-foot {
    margin-top: auto;
    padding: 11px 15px;
    border-top: 1px solid rgba(0,0,0,0.06);
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10.5px;
    color: rgba(0,0,0,0.45);
    letter-spacing: 0;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .sb-foot .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #FB3B24;
    flex-shrink: 0;
    animation: pulse 1.6s ease-in-out infinite;
  }

  .sb-item {
    text-align: left;
    background: transparent;
    border: none;
    border-radius: 6px;
    padding: 8px 9px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 3px;
    position: relative;
    transition: background 0.15s ease;
    width: 100%;
    font-family: 'Geist', sans-serif;
  }
  .sb-item:hover { background: #F2F2F2; }
  .sb-item[aria-current="true"] { background: #F2F2F2; }
  .sb-item[aria-current="true"]::before {
    content: '';
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 2px;
    border-radius: 2px;
    background: #FB3B24;
  }
  .sb-item:focus-visible { outline: 2px solid #FB3B24; outline-offset: 1px; }
  .sb-q {
    font-size: 12.5px;
    font-weight: 500;
    color: rgba(0,0,0,0.75);
    letter-spacing: -0.01em;
    line-height: 1.25;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sb-item[aria-current="true"] .sb-q { color: #000; }
  .sb-win {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10.5px;
    color: rgba(0,0,0,0.45);
    letter-spacing: 0;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sb-win b { color: #FB3B24; font-weight: 500; }
  .sb-dot { width: 5px; height: 5px; border-radius: 50%; background: #FB3B24; flex-shrink: 0; }

  /* === Main panel: the live scan === */
  .main {
    flex: 1;
    min-width: 0;
    background: #FFFFFF;
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .tabs {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .tab {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    height: 34px;
    padding: 0 12px;
    background: #F2F2F2;
    border: 1px solid transparent;
    border-radius: 6px;
    font-family: 'Geist', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: rgba(0,0,0,0.45);
    cursor: pointer;
    transition: color 0.18s ease, border-color 0.18s ease;
    white-space: nowrap;
  }
  .tab .logo { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.55; transition: opacity 0.18s ease; }
  .tab .logo path { fill: currentColor; }
  .tab[aria-selected="true"] { color: #000; border-color: #FB3B24; }
  .tab[aria-selected="true"] .logo { opacity: 1; }
  .tab:hover { color: #000; }
  .tab:hover .logo { opacity: 1; }
  .tab:focus-visible { outline: 2px solid #FB3B24; outline-offset: 2px; }
  .p-meta {
    margin-left: auto;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10.5px;
    color: rgba(0,0,0,0.4);
    letter-spacing: 0;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .p-meta .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #FB3B24;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.35;} }

  /* === Conversation === */
  .convo {
    flex: 1;
    min-height: 0;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow: hidden;
  }
  .u-row {
    display: flex;
    justify-content: flex-end;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .u-row.on { opacity: 1; transform: translateY(0); }
  .u-bubble {
    background: #F2F2F2;
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 14.5px;
    font-weight: 500;
    max-width: 80%;
  }

  .a-row { display: flex; gap: 11px; align-items: flex-start; }
  .avatar {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: #F2F2F2;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .avatar svg { width: 15px; height: 15px; display: none; }
  .avatar svg.on { display: block; }
  .avatar svg path { fill: #000; }
  .a-body { flex: 1; min-width: 0; }

  .thinking { display: none; gap: 4px; padding: 7px 0; }
  .thinking.on { display: inline-flex; }
  .thinking span {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(0,0,0,0.3);
    animation: think 1s ease-in-out infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.14s; }
  .thinking span:nth-child(3) { animation-delay: 0.28s; }
  @keyframes think {
    0%, 60%, 100% { opacity: 0.25; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-2px); }
  }

  .a-text {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.6;
    color: #000;
    min-height: 78px;
  }
  .a-text strong { font-weight: 600; color: #FB3B24; }
  .cursor {
    display: none;
    width: 7px; height: 16px;
    background: rgba(0,0,0,0.75);
    vertical-align: -2px;
    margin-left: 2px;
  }
  .cursor.on { display: inline-block; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

  /* Sources row */
  .sources {
    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .src {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    height: 25px;
    padding: 0 10px;
    background: #F2F2F2;
    border-radius: 5px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10.5px;
    color: rgba(0,0,0,0.55);
    letter-spacing: 0;
    opacity: 0;
    transform: translateY(3px);
    transition: opacity 0.25s ease, transform 0.25s ease, color 0.15s ease;
    white-space: nowrap;
  }
  .src .fav { width: 6px; height: 6px; border-radius: 2px; background: rgba(0,0,0,0.25); flex-shrink: 0; }
  .src.on { opacity: 1; transform: translateY(0); }
  .src:hover { color: #000; }
  .src.more { color: rgba(0,0,0,0.4); }
  .src.more .fav { display: none; }

  /* Receipt */
  .receipt {
    margin-top: 16px;
    padding-top: 15px;
    border-top: 1px solid rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .receipt.on { opacity: 1; }
  .receipt-lbl {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10px;
    color: rgba(0,0,0,0.4);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    width: 100%;
    margin-bottom: -4px;
  }
  .meter { display: flex; gap: 3px; width: 100px; height: 7px; flex-shrink: 0; }
  .seg {
    height: 100%; border-radius: 2px;
    transition: width 0.5s cubic-bezier(.3,.7,.3,1), transform 0.15s ease;
  }
  .seg.you { background: #FB3B24; }
  .seg.a { background: rgba(0,0,0,0.3); }
  .seg.b { background: rgba(0,0,0,0.13); }
  .seg.hot { transform: scaleY(1.6); }
  .pct {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 14px; font-weight: 500;
    color: #FB3B24; letter-spacing: 0; white-space: nowrap;
  }
  .meta {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px; color: rgba(0,0,0,0.45); letter-spacing: 0; white-space: nowrap;
  }
  .meta .mk { transition: color 0.15s ease; }
  .meta .mk.hot { color: #000; }

  /* === Composer (display only) === */
  .composer {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 2px 20px 20px;
    background: #F2F2F2;
    border-radius: 8px;
    padding: 12px 8px 12px 16px;
    pointer-events: none;
  }
  .c-field {
    flex: 1; min-width: 0;
    font-size: 14.5px; font-weight: 500;
    white-space: nowrap; overflow: hidden;
    display: flex; align-items: center;
  }
  .c-ph { color: rgba(0,0,0,0.35); font-weight: 400; }
  .c-ph.hidden { display: none; }
  .c-caret { width: 1.5px; height: 17px; background: #000; margin-left: 1px; flex-shrink: 0; opacity: 0; }
  .c-caret.on { animation: blink 1.06s steps(1) infinite; }
  .send {
    width: 36px; height: 36px;
    border-radius: 7px;
    background: #FB3B24; color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s ease, opacity 0.2s ease;
    opacity: 0.5;
  }
  .send.ready { opacity: 1; }
  .send.pulse { animation: sendPulse 0.3s ease; }
  @keyframes sendPulse { 0% { transform: scale(1); } 45% { transform: scale(0.88); } 100% { transform: scale(1); } }
  .send svg { width: 16px; height: 16px; }

  .main.resetting .convo, .main.resetting .composer {
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  /* === Responsive: hide sidebar when too narrow === */
  @media (max-width: 640px) {
    .shell { max-width: 480px; }
    .sidebar { display: none; }
    .tabs { padding: 11px 13px; }
    .tab { padding: 0 10px; font-size: 11.5px; height: 32px; }
    .convo { padding: 14px; gap: 12px; }
    .a-text { font-size: 14px; min-height: 92px; }
    .u-bubble { font-size: 13.5px; }
    .composer { margin: 2px 14px 14px; }
    .meta { white-space: normal; }
  }
</style>
</head>

            <svg viewBox="0 0 24 24" data-m="0" class="on" aria-hidden="true"><path d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.073zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944zm-9.6607-4.1254a4.4708 4.4708 0 0 1-.5346-3.0137l.142.0852 4.783 2.7582a.7712.7712 0 0 0 .7806 0l5.8428-3.3685v2.3324a.0804.0804 0 0 1-.0332.0615L9.74 19.9502a4.4992 4.4992 0 0 1-6.1408-1.6464zM2.3408 7.8956a4.485 4.485 0 0 1 2.3655-1.9728V11.6a.7664.7664 0 0 0 .3879.6765l5.8144 3.3543-2.0201 1.1685a.0757.0757 0 0 1-.071 0l-4.8303-2.7865A4.504 4.504 0 0 1 2.3408 7.8956zm16.5963 3.8558L13.1038 8.364 15.1192 7.2a.0757.0757 0 0 1 .071 0l4.8303 2.7913a4.4944 4.4944 0 0 1-.6765 8.1042v-5.6772a.79.79 0 0 0-.407-.667zm2.0107-3.0231l-.142-.0852-4.7735-2.7818a.7759.7759 0 0 0-.7854 0L9.409 9.2297V6.8974a.0662.0662 0 0 1 .0284-.0615l4.8303-2.7866a4.4992 4.4992 0 0 1 6.6802 4.66zM8.3065 12.863l-2.02-1.1638a.0804.0804 0 0 1-.038-.0567V6.0742a4.4992 4.4992 0 0 1 7.3757-3.4537l-.142.0805L8.704 5.459a.7948.7948 0 0 0-.3927.6813zm1.0976-2.3654l2.602-1.4998 2.6069 1.4998v2.9994l-2.5974 1.4997-2.6067-1.4997Z"/></svg>
            <svg viewBox="0 0 24 24" data-m="1" aria-hidden="true"><path d="M12 24A14.304 14.304 0 0 0 0 12 14.304 14.304 0 0 0 12 0a14.305 14.305 0 0 0 12 12 14.305 14.305 0 0 0-12 12"/></svg>
            <svg viewBox="0 0 24 24" data-m="2" aria-hidden="true"><path d="M19.785 0v7.272H22.5V17.62h-2.935V24l-7.037-6.194v6.145h-1.091v-6.152L4.399 24v-6.465H1.5V7.188h2.808V0l7.129 6.135V.11h1.091v6.036L19.785 0Zm-7.257 9.044v7.319l5.946 5.234V14.44l-5.946-5.397Zm-1.099-.03-5.946 5.398v7.174l5.946-5.234V9.015ZM2.59 8.28v8.264h1.809v-4.489l4.11-3.775H2.59Zm13.652 0 4.11 3.775v4.489h1.057V8.28h-5.167ZM5.49 2.476v4.796h5.29L5.49 2.476Zm13.204 0L13.42 7.272h5.274V2.476Z"/></svg>
          </div>
          <div class="a-body">
            <div class="thinking" id="thinking"><span></span><span></span><span></span></div>
            <div class="a-text" id="aText"><span id="aPre"></span><strong id="aBrand"></strong><span id="aPost"></span><span class="cursor" id="cursor"></span></div>
            <div class="sources" id="sources">
              <span class="src"><span class="fav"></span>reddit.com</span>
              <span class="src"><span class="fav"></span>trustpilot.com</span>
              <span class="src"><span class="fav"></span>healthline.com</span>
              <span class="src more" id="srcMore">+9 sources</span>
            </div>
            <div class="receipt" id="receipt">
              <div class="receipt-lbl">AI Share of Voice</div>
              <div class="meter">
                <div class="seg you" data-k="0" style="width:68%"></div>
                <div class="seg a" data-k="1" style="width:21%"></div>
                <div class="seg b" data-k="2" style="width:11%"></div>
              </div>
              <span class="pct">&#8599; <span id="pctVal">68</span>%</span>
              <span class="meta"><span class="mk" data-k="0" id="mkYou">You 68%</span> &#183; <span class="mk" data-k="1" id="mkA">Comp A 21%</span> &#183; <span class="mk" data-k="2" id="mkB">Comp B 11%</span></span>
            </div>
          </div>
        </div>
      </div>

      <footer class="composer" aria-hidden="true">
        <div class="c-field">
          <span id="cText"></span>
          <span class="c-caret" id="cCaret"></span>
          <span class="c-ph" id="cPh">Ask anything&#8230;</span>
        </div>
        <div class="send" id="send">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 13V3M3.5 7.5 8 3l4.5 4.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </footer>
    </article>
  </section>
</main>

<script>
(function () {
  var CANCEL = {};

  var SCANS = [
    { q: 'Best clean protein subscription?', brand: 'VitalBlend',  cat: 'clean protein', sov: 68, more: '+9 sources' },
    { q: 'Top magnesium supplement brand?',  brand: 'NightCap',    cat: 'magnesium supplements', sov: 71, more: '+6 sources' },
    { q: 'Best sustainable activewear?',      brand: 'TerraForm',   cat: 'sustainable activewear', sov: 64, more: '+11 sources' },
    { q: 'Cleanest meal-kit ingredients?',    brand: 'FreshLeaf',   cat: 'clean meal kits', sov: 59, more: '+8 sources' },
    { q: 'Best organic baby formula?',        brand: 'PureStart',   cat: 'organic baby formula', sov: 66, more: '+10 sources' }
  ];

  var ENGINE_TPL = [
    'I’d go with {b} — the clear pick for {cat} on sourcing, testing, and label transparency.',
    '{b} leads {cat}: verified sourcing and the most transparent labels in the category. Competitors trail.',
    'Top result: {b} [1][3] — cited across sources as the {cat} leader on transparency and sourcing.'
  ];
  var ENGINE_OFFSET = [0, -13, -6];

  var main = document.getElementById('main');
  var sbList = document.getElementById('sbList');
  var sbNew = document.getElementById('sbNew');
  var tabs = [document.getElementById('tab0'), document.getElementById('tab1'), document.getElementById('tab2')];
  var avatarSvgs = document.querySelectorAll('#avatar svg');
  var uRow = document.getElementById('uRow');
  var uBubble = document.getElementById('uBubble');
  var thinking = document.getElementById('thinking');
  var aPre = document.getElementById('aPre');
  var aBrand = document.getElementById('aBrand');
  var aPost = document.getElementById('aPost');
  var cursor = document.getElementById('cursor');
  var srcChips = document.querySelectorAll('#sources .src');
  var srcMore = document.getElementById('srcMore');
  var receipt = document.getElementById('receipt');
  var pctVal = document.getElementById('pctVal');
  var segs = document.querySelectorAll('.meter .seg');
  var mkYou = document.getElementById('mkYou');
  var mkA = document.getElementById('mkA');
  var mkB = document.getElementById('mkB');
  var cText = document.getElementById('cText');
  var cCaret = document.getElementById('cCaret');
  var cPh = document.getElementById('cPh');
  var send = document.getElementById('send');

  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var gen = 0, paused = false, idleTimer = null;
  var curScan = 0, curEngine = 0;

  /* --- build sidebar --- */
  var sbItems = [];
  SCANS.forEach(function (s, i) {
    var btn = document.createElement('button');
    btn.className = 'sb-item';
    btn.setAttribute('role', 'option');
    btn.setAttribute('aria-current', i === 0 ? 'true' : 'false');
    btn.innerHTML = '<span class="sb-q">' + s.q + '</span>' +
      '<span class="sb-win"><span class="sb-dot"></span>' + s.brand + ' &#183; <b>' + s.sov + '%</b></span>';
    sbList.appendChild(btn);
    sbItems.push(btn);
    btn.addEventListener('click', function () { manualScan(i); });
  });

  /* --- timing helpers --- */
  function tSleep(ms, g) {
    return new Promise(function (resolve, reject) {
      var acc = 0, last = performance.now();
      (function tick() {
        if (g !== gen) return reject(CANCEL);
        setTimeout(function () {
          var now = performance.now();
          if (!paused) acc += now - last;
          last = now;
          if (acc >= ms) resolve(); else tick();
        }, 36);
      })();
    });
  }
  function typeChars(setter, text, dur, g) {
    return new Promise(function (resolve, reject) {
      var acc = 0, last = performance.now();
      (function tick() {
        if (g !== gen) return reject(CANCEL);
        setTimeout(function () {
          var now = performance.now();
          if (!paused) acc += now - last;
          last = now;
          var p = Math.min(1, acc / dur);
          setter(text.slice(0, Math.round(p * text.length)));
          if (p >= 1) resolve(); else tick();
        }, 34);
      })();
    });
  }
  function streamWords(setter, text, g) {
    var words = text.split(' ');
    return new Promise(function (resolve, reject) {
      var i = 0;
      (function tick() {
        if (g !== gen) return reject(CANCEL);
        setTimeout(function () {
          if (!paused) { i++; setter(words.slice(0, i).join(' ') + (i < words.length ? ' ' : '')); }
          if (i >= words.length) resolve(); else tick();
        }, 40 + Math.random() * 44);
      })();
    });
  }

  /* --- data helpers --- */
  function engineSov(e, scan) {
    var you = Math.max(42, Math.min(88, scan.sov + ENGINE_OFFSET[e]));
    var rem = 100 - you;
    var a = Math.round(rem * 0.62);
    return { you: you, a: a, b: rem - a };
  }
  function answerParts(e, scan) {
    var t = ENGINE_TPL[e].replace('{cat}', scan.cat);
    var idx = t.indexOf('{b}');
    return { pre: t.slice(0, idx), post: t.slice(idx + 3) };
  }

  /* --- visual helpers --- */
  function setAvatar(i) { avatarSvgs.forEach(function (s) { s.classList.toggle('on', s.getAttribute('data-m') == String(i)); }); }
  function selectTab(i) { tabs.forEach(function (t, k) { t.setAttribute('aria-selected', k === i ? 'true' : 'false'); }); }
  function highlightSidebar(i) { sbItems.forEach(function (b, k) { b.setAttribute('aria-current', k === i ? 'true' : 'false'); }); }
  function setSov(sv, animate) {
    var total = sv.you + sv.a + sv.b;
    segs[0].style.width = (sv.you / total * 100) + '%';
    segs[1].style.width = (sv.a / total * 100) + '%';
    segs[2].style.width = (sv.b / total * 100) + '%';
    mkYou.textContent = 'You ' + sv.you + '%';
    mkA.textContent = 'Comp A ' + sv.a + '%';
    mkB.textContent = 'Comp B ' + sv.b + '%';
    if (!animate) { pctVal.textContent = sv.you; return; }
    var from = parseInt(pctVal.textContent, 10) || 0;
    var t0 = performance.now();
    (function step(now) {
      var p = Math.min(1, (now - t0) / 420);
      pctVal.textContent = Math.round(from + (sv.you - from) * (1 - Math.pow(1 - p, 3)));
      if (p < 1) requestAnimationFrame(step);
    })(t0);
  }
  function hideSources() { srcChips.forEach(function (c) { c.classList.remove('on'); }); }
  async function showSources(scan, g) {
    srcMore.textContent = scan.more;
    for (var i = 0; i < srcChips.length; i++) { srcChips[i].classList.add('on'); await tSleep(90, g); }
  }
  function resetComposer() { cText.textContent = ''; cPh.classList.remove('hidden'); cCaret.classList.remove('on'); send.classList.remove('ready', 'pulse'); }
  function clearAnswer() { aPre.textContent = ''; aBrand.textContent = ''; aPost.textContent = ''; }

  function staticFill(scanIdx, engineIdx) {
    var scan = SCANS[scanIdx];
    var p = answerParts(engineIdx, scan);
    aPre.textContent = p.pre; aBrand.textContent = scan.brand; aPost.textContent = p.post;
    srcMore.textContent = scan.more;
  }

  /* --- run one scan (shared) --- */
  async function runScan(scanIdx, engineIdx, opts, g) {
    opts = opts || {};
    curScan = scanIdx; curEngine = engineIdx;
    var scan = SCANS[scanIdx];
    highlightSidebar(scanIdx);
    selectTab(engineIdx);
    setAvatar(engineIdx);

    if (opts.typeQuery) {
      uRow.classList.remove('on');
      resetComposer();
      cPh.classList.add('hidden');
      cCaret.classList.add('on');
      await tSleep(360, g);
      await typeChars(function (s) { cText.textContent = s; if (s.length > 2) send.classList.add('ready'); }, scan.q, 1050, g);
      await tSleep(180, g);
      cCaret.classList.remove('on');
      send.classList.add('pulse');
      await tSleep(220, g);
      resetComposer();
    }

    uBubble.textContent = scan.q;
    uRow.classList.add('on');

    clearAnswer();
    cursor.classList.remove('on');
    hideSources();
    receipt.classList.remove('on');
    thinking.classList.add('on');
    await tSleep(opts.fast ? 420 : 720, g);
    thinking.classList.remove('on');
    cursor.classList.add('on');

    var parts = answerParts(engineIdx, scan);
    await streamWords(function (s) { aPre.textContent = s; }, parts.pre.trimEnd(), g);
    aPre.textContent = parts.pre;
    aBrand.textContent = scan.brand;
    await tSleep(110, g);
    await streamWords(function (s) { aPost.textContent = s; }, parts.post.trimStart(), g);
    aPost.textContent = parts.post;
    cursor.classList.remove('on');

    await showSources(scan, g);
    receipt.classList.add('on');
    setSov(engineSov(engineIdx, scan), true);
  }

  /* --- auto loop: walk the sidebar --- */
  async function autoLoop(startAt) {
    var g = ++gen;
    var i = startAt || 0;
    try {
      while (true) {
        main.classList.remove('resetting');
        await runScan(i, 0, { typeQuery: true }, g);
        await tSleep(2600, g);
        main.classList.add('resetting');
        await tSleep(440, g);
        i = (i + 1) % SCANS.length;
      }
    } catch (e) { if (e !== CANCEL) throw e; }
  }

  function pokeIdle(from) {
    if (idleTimer) clearTimeout(idleTimer);
    idleTimer = setTimeout(function () { autoLoop((from + 1) % SCANS.length); }, 15000);
  }

  /* --- manual interactions --- */
  function manualScan(scanIdx) {
    var g = ++gen; paused = false;
    main.classList.remove('resetting');
    runScan(scanIdx, 0, { typeQuery: false, fast: true }, g).catch(function (e) { if (e !== CANCEL) throw e; });
    pokeIdle(scanIdx);
  }
  function manualEngine(engineIdx) {
    var g = ++gen; paused = false;
    main.classList.remove('resetting');
    runScan(curScan, engineIdx, { typeQuery: false, fast: true }, g).catch(function (e) { if (e !== CANCEL) throw e; });
    pokeIdle(curScan);
  }

  /* --- reduced motion --- */
  if (reduceMotion) {
    highlightSidebar(0); selectTab(0); setAvatar(0);
    uBubble.textContent = SCANS[0].q; uRow.classList.add('on');
    staticFill(0, 0);
    srcChips.forEach(function (c) { c.classList.add('on'); });
    receipt.classList.add('on');
    setSov(engineSov(0, SCANS[0]), false);
    sbItems.forEach(function (b, i) { b.addEventListener('click', function () {
      highlightSidebar(i); uBubble.textContent = SCANS[i].q; staticFill(i, 0); setSov(engineSov(0, SCANS[i]), false); curScan = i;
    }); });
    tabs.forEach(function (t, e) { t.addEventListener('click', function () {
      selectTab(e); setAvatar(e); staticFill(curScan, e); setSov(engineSov(e, SCANS[curScan]), false);
    }); });
    return;
  }

  /* --- wire up --- */
  main.addEventListener('mouseenter', function () { paused = true; });
  main.addEventListener('mouseleave', function () { paused = false; });
  tabs.forEach(function (t, e) { t.addEventListener('click', function () { manualEngine(e); }); });
  sbNew.addEventListener('click', function () { manualScan(0); });

  function wire(els) {
    els.forEach(function (el) {
      var k = el.getAttribute('data-k');
      el.addEventListener('mouseenter', function () { document.querySelectorAll('[data-k="' + k + '"]').forEach(function (x) { x.classList.add('hot'); }); });
      el.addEventListener('mouseleave', function () { document.querySelectorAll('[data-k="' + k + '"]').forEach(function (x) { x.classList.remove('hot'); }); });
    });
  }
  wire(Array.prototype.slice.call(segs));
  wire(Array.prototype.slice.call(document.querySelectorAll('.meta .mk')));

  autoLoop(0);
})();
</script>
</body>
