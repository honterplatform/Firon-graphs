<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Scan · GEO Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: transparent;
    font-family: 'Geist', -apple-system, system-ui, sans-serif;
    color: #000;
    letter-spacing: -0.01em;
  }

  .stage {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: stretch;
    justify-content: center;
    padding: 10px;
  }

  /* App canvas: filled F2F2F2, fills the iframe height */
  .shell {
    width: 100%;
    max-width: 470px;
    height: 100%;
    background: #F2F2F2;
    border: 1px solid rgba(0,0,0,0.05);
    border-radius: 8px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* === Deck: ghost scans peeking behind the live card === */
  .deck {
    position: relative;
    padding-top: 58px;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .ghost {
    position: absolute;
    background: #FFFFFF;
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: 8px;
    height: 96px;
    overflow: hidden;
  }
  .ghost.g2 { top: 0;    left: 7%;  right: 7%;  z-index: 1; opacity: 0.55; }
  .ghost.g1 { top: 29px; left: 3%;  right: 3%;  z-index: 2; opacity: 0.8; }
  .ghost-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 7px 14px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10.5px;
    letter-spacing: 0;
    white-space: nowrap;
  }
  .ghost-q { color: rgba(0,0,0,0.45); overflow: hidden; text-overflow: ellipsis; }
  .ghost-w { color: rgba(0,0,0,0.55); font-weight: 500; flex-shrink: 0; }
  .ghost-w b { color: #2540FF; font-weight: 500; }

  /* === Front panel: the live scan === */
  .panel {
    position: relative;
    z-index: 3;
    flex: 1;
    min-height: 0;
    background: #FFFFFF;
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .p-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 13px 16px 0;
  }
  .p-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .p-meta {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10.5px;
    color: rgba(0,0,0,0.4);
    letter-spacing: 0;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .p-meta .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #2540FF;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.35;} }

  /* Tabs: model picker */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 11px 16px 13px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .tab {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    height: 34px;
    padding: 0 12px;
    background: #F2F2F2;
    border: 1px solid transparent;
    border-radius: 6px;
    font-family: 'Geist', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: rgba(0,0,0,0.45);
    cursor: pointer;
    transition: color 0.18s ease, border-color 0.18s ease;
    white-space: nowrap;
  }
  .tab .logo { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.55; transition: opacity 0.18s ease; }
  .tab .logo path { fill: currentColor; }
  .tab[aria-selected="true"] { color: #000; border-color: #2540FF; }
  .tab[aria-selected="true"] .logo { opacity: 1; }
  .tab:hover { color: #000; }
  .tab:hover .logo { opacity: 1; }
  .tab:focus-visible { outline: 2px solid #2540FF; outline-offset: 2px; }

  /* === Conversation === */
  .convo {
    flex: 1;
    min-height: 0;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow: hidden;
  }
  .u-row {
    display: flex;
    justify-content: flex-end;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .u-row.on { opacity: 1; transform: translateY(0); }
  .u-bubble {
    background: #F2F2F2;
    border-radius: 6px;
    padding: 9px 13px;
    font-size: 14px;
    font-weight: 500;
    max-width: 80%;
  }

  .a-row { display: flex; gap: 10px; align-items: flex-start; }
  .avatar {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: #F2F2F2;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .avatar svg { width: 14px; height: 14px; display: none; }
  .avatar svg.on { display: block; }
  .avatar svg path { fill: #000; }
  .a-body { flex: 1; min-width: 0; }

  .thinking { display: none; gap: 4px; padding: 6px 0; }
  .thinking.on { display: inline-flex; }
  .thinking span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(0,0,0,0.3);
    animation: think 1s ease-in-out infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.14s; }
  .thinking span:nth-child(3) { animation-delay: 0.28s; }
  @keyframes think {
    0%, 60%, 100% { opacity: 0.25; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-2px); }
  }

  .a-text {
    font-size: 14.5px;
    font-weight: 400;
    line-height: 1.55;
    color: #000;
    min-height: 90px;
  }
  .a-text strong { font-weight: 600; color: #2540FF; }
  .cursor {
    display: none;
    width: 7px; height: 15px;
    background: rgba(0,0,0,0.75);
    vertical-align: -2px;
    margin-left: 2px;
  }
  .cursor.on { display: inline-block; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

  /* Sources row */
  .sources {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .src {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    height: 24px;
    padding: 0 9px;
    background: #F2F2F2;
    border-radius: 4px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10.5px;
    color: rgba(0,0,0,0.55);
    letter-spacing: 0;
    opacity: 0;
    transform: translateY(3px);
    transition: opacity 0.25s ease, transform 0.25s ease, color 0.15s ease;
    white-space: nowrap;
  }
  .src .fav {
    width: 6px; height: 6px;
    border-radius: 2px;
    background: rgba(0,0,0,0.25);
    flex-shrink: 0;
  }
  .src.on { opacity: 1; transform: translateY(0); }
  .src:hover { color: #000; }
  .src.more { color: rgba(0,0,0,0.4); }
  .src.more .fav { display: none; }

  /* Receipt: share of voice */
  .receipt {
    margin-top: 13px;
    padding-top: 13px;
    border-top: 1px solid rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .receipt.on { opacity: 1; }
  .meter { display: flex; gap: 3px; width: 84px; height: 6px; flex-shrink: 0; }
  .seg {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.3,.7,.3,1), transform 0.15s ease;
  }
  .seg.you { background: #2540FF; }
  .seg.a { background: rgba(0,0,0,0.3); }
  .seg.b { background: rgba(0,0,0,0.13); }
  .seg.hot { transform: scaleY(1.6); }
  .pct {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px;
    font-weight: 500;
    color: #2540FF;
    letter-spacing: 0;
    white-space: nowrap;
  }
  .meta {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    color: rgba(0,0,0,0.45);
    letter-spacing: 0;
    white-space: nowrap;
  }
  .meta .mk { transition: color 0.15s ease; }
  .meta .mk.hot { color: #000; }

  /* === Composer (display only) === */
  .composer {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 2px 16px 16px;
    background: #F2F2F2;
    border-radius: 8px;
    padding: 12px 8px 12px 15px;
    pointer-events: none;
  }
  .c-field {
    flex: 1;
    min-width: 0;
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    display: flex;
    align-items: center;
  }
  .c-ph { color: rgba(0,0,0,0.35); font-weight: 400; }
  .c-ph.hidden { display: none; }
  .c-caret {
    width: 1.5px; height: 16px;
    background: #000;
    margin-left: 1px;
    flex-shrink: 0;
    opacity: 0;
  }
  .c-caret.on { animation: blink 1.06s steps(1) infinite; }
  .send {
    width: 34px; height: 34px;
    border-radius: 6px;
    background: #2540FF;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s ease, opacity 0.2s ease;
    opacity: 0.5;
  }
  .send.ready { opacity: 1; }
  .send.pulse { animation: sendPulse 0.3s ease; }
  @keyframes sendPulse {
    0% { transform: scale(1); }
    45% { transform: scale(0.88); }
    100% { transform: scale(1); }
  }
  .send svg { width: 15px; height: 15px; }

  /* Loop fade */
  .panel.resetting .convo,
  .panel.resetting .composer {
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  @media (max-width: 480px) {
    .shell { padding: 12px; }
    .deck { padding-top: 46px; }
    .ghost.g1 { top: 23px; }
    .ghost-row { font-size: 9.5px; padding: 6px 12px; }
    .p-head { padding: 11px 13px 0; }
    .p-meta { display: none; }
    .tabs { padding: 9px 13px 11px; }
    .tab { padding: 0 9px; font-size: 11.5px; height: 32px; }
    .convo { padding: 13px; gap: 11px; }
    .a-text { font-size: 13.5px; min-height: 105px; }
    .u-bubble { font-size: 13px; max-width: 88%; }
    .composer { margin: 2px 13px 13px; }
    .meta { white-space: normal; }
  }
</style>
</head>

<script>
(function () {
  var QUESTION = 'Best clean protein subscription?';
  var BRAND = 'VitalBlend';
  var CANCEL = {};

  var MODELS = [
    { answer: 'I’d go with {b} — third-party tested, transparent labels, and sourcing you can trace to the farm. Competitor A and Competitor B trail on all three.',
      sov: 68, a: 21, b: 11, srcMore: '+9 sources' },
    { answer: '{b} leads this category: verified sourcing and the only subscription with full label transparency. Runners-up: Competitor A, then Competitor B.',
      sov: 54, a: 29, b: 17, srcMore: '+7 sources' },
    { answer: 'Top result: {b} [1][3] — cited across 12 sources for label transparency and verified sourcing. Competitor A [2] follows at a distance.',
      sov: 61, a: 24, b: 15, srcMore: '+12 sources' }
  ];

  var panel = document.getElementById('panel');
  var tabs = [document.getElementById('tab0'), document.getElementById('tab1'), document.getElementById('tab2')];
  var avatarSvgs = document.querySelectorAll('#avatar svg');
  var uRow = document.getElementById('uRow');
  var thinking = document.getElementById('thinking');
  var aPre = document.getElementById('aPre');
  var aBrand = document.getElementById('aBrand');
  var aPost = document.getElementById('aPost');
  var cursor = document.getElementById('cursor');
  var srcChips = document.querySelectorAll('#sources .src');
  var srcMore = document.getElementById('srcMore');
  var receipt = document.getElementById('receipt');
  var pctVal = document.getElementById('pctVal');
  var segs = document.querySelectorAll('.meter .seg');
  var mkYou = document.getElementById('mkYou');
  var mkA = document.getElementById('mkA');
  var mkB = document.getElementById('mkB');
  var cText = document.getElementById('cText');
  var cCaret = document.getElementById('cCaret');
  var cPh = document.getElementById('cPh');
  var send = document.getElementById('send');

  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var gen = 0;
  var paused = false;
  var idleTimer = null;

  /* --- pausable, cancellable timing --- */
  function tSleep(ms, g) {
    return new Promise(function (resolve, reject) {
      var acc = 0, last = performance.now();
      (function tick() {
        if (g !== gen) return reject(CANCEL);
        setTimeout(function () {
          var now = performance.now();
          if (!paused) acc += now - last;
          last = now;
          if (acc >= ms) resolve(); else tick();
        }, 36);
      })();
    });
  }
  function typeChars(setter, text, dur, g) {
    return new Promise(function (resolve, reject) {
      var acc = 0, last = performance.now();
      (function tick() {
        if (g !== gen) return reject(CANCEL);
        setTimeout(function () {
          var now = performance.now();
          if (!paused) acc += now - last;
          last = now;
          var p = Math.min(1, acc / dur);
          setter(text.slice(0, Math.round(p * text.length)));
          if (p >= 1) resolve(); else tick();
        }, 34);
      })();
    });
  }
  function streamWords(setter, text, g) {
    var words = text.split(' ');
    return new Promise(function (resolve, reject) {
      var i = 0;
      (function tick() {
        if (g !== gen) return reject(CANCEL);
        setTimeout(function () {
          if (!paused) {
            i++;
            setter(words.slice(0, i).join(' ') + (i < words.length ? ' ' : ''));
          }
          if (i >= words.length) resolve(); else tick();
        }, 42 + Math.random() * 46);
      })();
    });
  }

  /* --- visual helpers --- */
  function setAvatar(i) {
    avatarSvgs.forEach(function (s) {
      s.classList.toggle('on', s.getAttribute('data-m') == String(i));
    });
  }
  function selectTab(i) {
    tabs.forEach(function (t, k) { t.setAttribute('aria-selected', k === i ? 'true' : 'false'); });
  }
  function setSov(m, animate) {
    var total = m.sov + m.a + m.b;
    segs[0].style.width = (m.sov / total * 100) + '%';
    segs[1].style.width = (m.a / total * 100) + '%';
    segs[2].style.width = (m.b / total * 100) + '%';
    mkYou.textContent = 'You ' + m.sov + '%';
    mkA.textContent = 'Comp A ' + m.a + '%';
    mkB.textContent = 'Comp B ' + m.b + '%';
    if (!animate) { pctVal.textContent = m.sov; return; }
    var from = parseInt(pctVal.textContent, 10) || 0;
    var t0 = performance.now();
    (function step(now) {
      var p = Math.min(1, (now - t0) / 420);
      pctVal.textContent = Math.round(from + (m.sov - from) * (1 - Math.pow(1 - p, 3)));
      if (p < 1) requestAnimationFrame(step);
    })(t0);
  }
  function clearAnswer() {
    aPre.textContent = ''; aBrand.textContent = ''; aPost.textContent = '';
  }
  function fillAnswer(m) {
    var parts = m.answer.split('{b}');
    aPre.textContent = parts[0];
    aBrand.textContent = BRAND;
    aPost.textContent = parts[1] || '';
  }
  function hideSources() {
    srcChips.forEach(function (c) { c.classList.remove('on'); });
  }
  async function showSources(m, g) {
    srcMore.textContent = m.srcMore;
    for (var i = 0; i < srcChips.length; i++) {
      srcChips[i].classList.add('on');
      await tSleep(90, g);
    }
  }
  function resetComposer() {
    cText.textContent = '';
    cPh.classList.remove('hidden');
    cCaret.classList.remove('on');
    send.classList.remove('ready', 'pulse');
  }
  function resetAll() {
    panel.classList.remove('resetting');
    uRow.classList.remove('on');
    thinking.classList.remove('on');
    clearAnswer();
    cursor.classList.remove('on');
    hideSources();
    receipt.classList.remove('on');
    resetComposer();
    selectTab(0);
    setAvatar(0);
  }

  /* --- stream one model's answer (shared) --- */
  async function streamModel(i, g, fast) {
    selectTab(i);
    setAvatar(i);
    clearAnswer();
    cursor.classList.remove('on');
    hideSources();
    receipt.classList.remove('on');
    thinking.classList.add('on');
    await tSleep(fast ? 420 : 760, g);
    thinking.classList.remove('on');
    cursor.classList.add('on');
    var m = MODELS[i];
    var parts = m.answer.split('{b}');
    await streamWords(function (s) { aPre.textContent = s; }, parts[0].trimEnd(), g);
    aPre.textContent = parts[0];
    aBrand.textContent = BRAND;
    await tSleep(120, g);
    await streamWords(function (s) { aPost.textContent = s; }, (parts[1] || '').trimStart(), g);
    aPost.textContent = parts[1] || '';
    cursor.classList.remove('on');
    await showSources(m, g);
    receipt.classList.add('on');
    setSov(m, true);
  }

  /* --- the composer ask (auto only) --- */
  async function askPhase(g) {
    cPh.classList.add('hidden');
    cCaret.classList.add('on');
    await tSleep(420, g);
    await typeChars(function (s) {
      cText.textContent = s;
      if (s.length > 2) send.classList.add('ready');
    }, QUESTION, 1250, g);
    await tSleep(200, g);
    cCaret.classList.remove('on');
    send.classList.add('pulse');
    await tSleep(240, g);
    resetComposer();
    uRow.classList.add('on');
  }

  /* --- auto demo loop --- */
  async function autoLoop() {
    var g = ++gen;
    try {
      while (true) {
        resetAll();
        await tSleep(420, g);
        await askPhase(g);
        await streamModel(0, g, false);
        await tSleep(1900, g);
        await streamModel(1, g, true);
        await tSleep(1900, g);
        await streamModel(2, g, true);
        await tSleep(2300, g);
        panel.classList.add('resetting');
        await tSleep(460, g);
      }
    } catch (e) { if (e !== CANCEL) throw e; }
  }

  function pokeIdle() {
    if (idleTimer) clearTimeout(idleTimer);
    idleTimer = setTimeout(function () { autoLoop(); }, 14000);
  }

  /* --- reduced motion: static final state, instant tab switching --- */
  if (reduceMotion) {
    uRow.classList.add('on');
    fillAnswer(MODELS[0]);
    srcChips.forEach(function (c) { c.classList.add('on'); });
    receipt.classList.add('on');
    setSov(MODELS[0], false);
    tabs.forEach(function (t, i) {
      t.addEventListener('click', function () {
        selectTab(i); setAvatar(i); fillAnswer(MODELS[i]);
        srcMore.textContent = MODELS[i].srcMore;
        setSov(MODELS[i], false);
      });
    });
    return;
  }

  /* --- interactions --- */
  panel.addEventListener('mouseenter', function () { paused = true; });
  panel.addEventListener('mouseleave', function () { paused = false; });

  tabs.forEach(function (t, i) {
    t.addEventListener('click', function () {
      var g = ++gen;                 // take over from the demo
      paused = false;
      resetComposer();
      uRow.classList.add('on');      // question stays asked
      streamModel(i, g, true).catch(function (e) { if (e !== CANCEL) throw e; });
      pokeIdle();
    });
  });

  /* meter segment ↔ legend hover pairing */
  function wire(els) {
    els.forEach(function (el) {
      var k = el.getAttribute('data-k');
      el.addEventListener('mouseenter', function () {
        document.querySelectorAll('[data-k="' + k + '"]').forEach(function (x) { x.classList.add('hot'); });
      });
      el.addEventListener('mouseleave', function () {
        document.querySelectorAll('[data-k="' + k + '"]').forEach(function (x) { x.classList.remove('hot'); });
      });
    });
  }
  wire(Array.prototype.slice.call(segs));
  wire(Array.prototype.slice.call(document.querySelectorAll('.meta .mk')));

  autoLoop();
})();
</script>
</body>
</html>
