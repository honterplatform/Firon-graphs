<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRO Funnel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0A0A0A; font-family: system-ui, -apple-system, sans-serif; color: #fff; }
  .card {
    background: #0F0F0F;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .title { font-size: 14px; font-weight: 700; color: #ccc; }
  .phase-label {
    font-size: 11px;
    font-weight: 600;
    color: #555;
    transition: color 0.4s ease;
  }
  .phase-label.optimized { color: #FB3B24; }
  .funnel-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 0;
  }
  .steps {
    display: flex;
    align-items: flex-end;
    gap: 0;
    height: 60%;
    min-height: 80px;
  }
  .step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    position: relative;
  }
  .step-bar-wrap {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0 4px;
  }
  .step-bar {
    width: 100%;
    max-width: 120px;
    border-radius: 4px 4px 0 0;
    transition: height 0.25s cubic-bezier(0.4, 0, 0.2, 1), background 0.15s ease;
    height: 0%;
    position: relative;
  }
  .step-pct {
    position: absolute;
    top: -18px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #888;
    transition: color 0.4s ease;
  }
  .step.optimized .step-pct { color: #FB3B24; }
  .step-label {
    font-size: 9px;
    font-weight: 600;
    color: #555;
    text-align: center;
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .arrows {
    display: flex;
    gap: 0;
    margin-top: 6px;
  }
  .arrow-slot {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  .drop-rate {
    font-size: 9px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: #333;
    transition: color 0.4s ease;
    text-align: center;
  }
  .drop-rate.good { color: #FB3B24; }
  .arrow-icon {
    font-size: 10px;
    color: #2A2A2A;
    margin: 0 2px;
    transition: color 0.4s ease;
  }
  .arrow-icon.good { color: rgba(251,59,36,0.4); }
  @media (max-width: 480px) {
    .title { font-size: 13px; }
    .step-pct { font-size: 10px; top: -16px; }
    .step-label { font-size: 7px; letter-spacing: 0; }
    .step-bar { max-width: 80px; }
    .drop-rate { font-size: 7px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="title">Post-Click Journey</div>
    <div class="phase-label" id="phaseLabel">Before Optimization</div>
  </div>
  <div class="funnel-area">
    <div class="steps" id="steps"></div>
    <div class="arrows" id="arrows"></div>
  </div>
</div>
<script>
var stages = [
  { label: 'Landing', before: 100, after: 100 },
  { label: 'Product', before: 38, after: 72 },
  { label: 'Add to Cart', before: 14, after: 41 },
  { label: 'Checkout', before: 7, after: 28 },
  { label: 'Purchase', before: 3.2, after: 18.6 },
];

var stepsEl = document.getElementById('steps');
var arrowsEl = document.getElementById('arrows');
var barEls = [];
var pctEls = [];
var dropEls = [];
var arrowIcons = [];

stages.forEach(function(s, i) {
  var step = document.createElement('div');
  step.className = 'step';
  step.innerHTML =
    '<div class="step-bar-wrap"><div class="step-bar" id="bar' + i + '">' +
      '<div class="step-pct" id="pct' + i + '">0%</div>' +
    '</div></div>' +
    '<div class="step-label">' + s.label + '</div>';
  stepsEl.appendChild(step);
  barEls.push(document.getElementById('bar' + i));
  pctEls.push(document.getElementById('pct' + i));

  if (i < stages.length - 1) {
    var arrow = document.createElement('div');
    arrow.className = 'arrow-slot';
    arrow.innerHTML =
      '<span class="arrow-icon" id="ai' + i + '">→</span>' +
      '<span class="drop-rate" id="dr' + i + '"></span>';
    arrowsEl.appendChild(arrow);
    dropEls.push(document.getElementById('dr' + i));
    arrowIcons.push(document.getElementById('ai' + i));
  } else {
    var spacer = document.createElement('div');
    spacer.className = 'arrow-slot';
    arrowsEl.appendChild(spacer);
  }
});

var isOptimized = false;
var phaseLabel = document.getElementById('phaseLabel');

function applyState(optimized, animate) {
  var key = optimized ? 'after' : 'before';
  var maxVal = 100;

  stages.forEach(function(s, i) {
    var val = s[key];
    var heightPct = (val / maxVal) * 100;
    var color = optimized ? '#FB3B24' : '#333';

    barEls[i].style.height = heightPct + '%';
    barEls[i].style.background = color;
    barEls[i].parentElement.parentElement.className = 'step' + (optimized ? ' optimized' : '');

    var displayVal = val >= 10 ? Math.round(val) + '%' : val.toFixed(1) + '%';
    pctEls[i].textContent = displayVal;

    if (i < stages.length - 1) {
      var nextVal = stages[i + 1][key];
      var dropPct = Math.round((1 - nextVal / val) * 100);
      dropEls[i].textContent = '-' + dropPct + '%';
      dropEls[i].className = 'drop-rate' + (optimized ? ' good' : '');
      arrowIcons[i].className = 'arrow-icon' + (optimized ? ' good' : '');
    }
  });

  phaseLabel.textContent = optimized ? 'After Optimization' : 'Before Optimization';
  phaseLabel.className = 'phase-label' + (optimized ? ' optimized' : '');
}

// Initial reveal: animate bars in
setTimeout(function() {
  applyState(false);
}, 300);

// Cycle between states
function cycle() {
  setTimeout(function() {
    isOptimized = !isOptimized;
    applyState(isOptimized);
    setTimeout(cycle, 1800);
  }, 1800);
}

setTimeout(cycle, 1500);
</script>
</body>
</html>
