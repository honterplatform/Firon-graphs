<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Firon Effect</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0A0A0A; font-family: system-ui, -apple-system, sans-serif; color: #fff; }
  .card { background: #0F0F0F; width: 100%; height: 100%; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="card"><canvas id="c"></canvas></div>
<script>
var c = document.getElementById('c');
var ctx = c.getContext('2d');
var dpr = window.devicePixelRatio || 1;
var time = 0;

function resize() {
  var r = c.parentElement.getBoundingClientRect();
  c.width = r.width * dpr;
  c.height = r.height * dpr;
  c.style.width = r.width + 'px';
  c.style.height = r.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { w: r.width, h: r.height };
}

var pillars = [
  { label: 'Paid Media', sub: 'Capital Deployment', color: '#FB3B24',
    metrics: ['ROAS 4.2x', 'CAC $28', 'CM 38%'] },
  { label: 'GEO', sub: 'AI Visibility', color: '#FC5844',
    metrics: ['SIS 68%', 'LLM 11+', 'Citations 3.2K'] },
  { label: 'Business Intel', sub: 'Data Architecture', color: '#FF7A6B',
    metrics: ['LTV $312', 'Sources 100%', 'Margin 42%'] },
];

var steps = ['Audit', 'Architect', 'Accelerate'];

// Particles flowing from pillars to center
var particles = [];
// Orbital particles around center
var orbitals = [];
// Cross-link particles between pillars
var crossParticles = [];

function spawnParticle(pillarIdx) {
  particles.push({
    p: pillarIdx,
    t: 0,
    speed: 0.006 + Math.random() * 0.006,
    size: 1.5 + Math.random() * 1.5,
  });
}

// Pre-populate flow particles
for (var i = 0; i < 24; i++) {
  particles.push({
    p: i % 3,
    t: Math.random(),
    speed: 0.006 + Math.random() * 0.006,
    size: 1.5 + Math.random() * 1.5,
  });
}

// Pre-populate orbital particles
for (var i = 0; i < 8; i++) {
  orbitals.push({
    angle: (i / 8) * Math.PI * 2,
    speed: 0.6 + Math.random() * 0.4,
    dist: 0.85 + Math.random() * 0.3,
    size: 1 + Math.random() * 1,
  });
}

// Pre-populate cross particles (between pillars)
for (var i = 0; i < 6; i++) {
  crossParticles.push({
    from: i % 3,
    to: (i + 1) % 3,
    t: Math.random(),
    speed: 0.005 + Math.random() * 0.004,
    size: 1 + Math.random(),
  });
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function hexToRgba(hex, a) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}

function draw() {
  var d = resize();
  var w = d.w, h = d.h;
  var mob = w <= 480;
  time += 0.016;

  ctx.clearRect(0, 0, w, h);

  // Subtle grid
  ctx.strokeStyle = '#141414';
  ctx.lineWidth = 0.5;
  var gridSize = mob ? 30 : 40;
  for (var gx = 0; gx < w; gx += gridSize) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, h); ctx.stroke();
  }
  for (var gy = 0; gy < h; gy += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();
  }

  // Center node position
  var centerX = w * 0.5;
  var centerY = mob ? h * 0.44 : h * 0.46;

  // Pillar positions
  var pillarY = mob ? h * 0.14 : h * 0.18;
  var spread = mob ? w * 0.3 : w * 0.38;
  var pillarPositions = [
    { x: centerX - spread, y: pillarY },
    { x: centerX, y: pillarY },
    { x: centerX + spread, y: pillarY },
  ];

  // Draw triangular connections between pillars
  for (var i = 0; i < 3; i++) {
    var j = (i + 1) % 3;
    ctx.beginPath();
    ctx.moveTo(pillarPositions[i].x, pillarPositions[i].y);
    ctx.lineTo(pillarPositions[j].x, pillarPositions[j].y);
    ctx.strokeStyle = '#1A1A1A';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw cross-link particles between pillars
  crossParticles.forEach(function(cp) {
    cp.t += cp.speed;
    if (cp.t > 1) {
      cp.t = 0;
      cp.from = Math.floor(Math.random() * 3);
      cp.to = (cp.from + 1 + Math.floor(Math.random() * 2)) % 3;
    }
    var a = pillarPositions[cp.from];
    var b = pillarPositions[cp.to];
    var px = a.x + (b.x - a.x) * cp.t;
    var py = a.y + (b.y - a.y) * cp.t;
    ctx.beginPath();
    ctx.arc(px, py, cp.size, 0, Math.PI * 2);
    ctx.fillStyle = hexToRgba('#FB3B24', 0.2);
    ctx.fill();
  });

  // Draw flow lines (pillar to center)
  pillarPositions.forEach(function(pp, i) {
    ctx.beginPath();
    ctx.moveTo(pp.x, pp.y + (mob ? 20 : 24));
    ctx.quadraticCurveTo(pp.x, centerY - 20, centerX, centerY - (mob ? 18 : 24));
    ctx.strokeStyle = hexToRgba('#FB3B24', 0.06);
    ctx.lineWidth = 24;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(pp.x, pp.y + (mob ? 20 : 24));
    ctx.quadraticCurveTo(pp.x, centerY - 20, centerX, centerY - (mob ? 18 : 24));
    ctx.strokeStyle = '#1A1A1A';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Flow particles
  particles.forEach(function(part) {
    part.t += part.speed;
    if (part.t > 1) {
      part.t = 0;
      part.p = Math.floor(Math.random() * 3);
    }
    var pp = pillarPositions[part.p];
    var startX = pp.x, startY = pp.y + (mob ? 20 : 24);
    var cpX = pp.x, cpY = centerY - 20;
    var endX = centerX, endY = centerY - (mob ? 18 : 24);
    var t = part.t, mt = 1 - t;
    var px = mt*mt*startX + 2*mt*t*cpX + t*t*endX;
    var py = mt*mt*startY + 2*mt*t*cpY + t*t*endY;

    ctx.beginPath();
    ctx.arc(px, py, part.size, 0, Math.PI * 2);
    ctx.fillStyle = pillars[part.p].color;
    ctx.globalAlpha = 0.7 * (1 - t * 0.4);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  if (Math.random() < 0.1) spawnParticle(Math.floor(Math.random() * 3));

  // Draw pillar nodes
  pillars.forEach(function(p, i) {
    var pp = pillarPositions[i];
    var nw = mob ? 74 : 100;
    var nh = mob ? 32 : 40;

    roundRect(pp.x - nw/2, pp.y - nh/2, nw, nh, 6);
    ctx.fillStyle = '#111';
    ctx.fill();
    ctx.strokeStyle = hexToRgba(p.color, 0.35);
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.font = 'bold ' + (mob ? 9 : 11) + 'px system-ui';
    ctx.textAlign = 'center';
    ctx.fillStyle = p.color;
    ctx.fillText(p.label, pp.x, pp.y - 2);
    ctx.font = (mob ? 6 : 7) + 'px system-ui';
    ctx.fillStyle = '#555';
    ctx.fillText(p.sub, pp.x, pp.y + (mob ? 10 : 13));

    // Floating metric callouts
    var metricIdx = Math.floor(time * 0.4) % p.metrics.length;
    var metric = p.metrics[metricIdx];
    var floatY = pp.y + nh/2 + (mob ? 10 : 14);
    var floatAlpha = 0.5 + Math.sin(time * 2 + i) * 0.3;
    ctx.font = 'bold ' + (mob ? 7 : 8) + 'px system-ui';
    ctx.fillStyle = hexToRgba(p.color, floatAlpha);
    ctx.fillText(metric, pp.x, floatY);
  });

  // Outer orbital ring
  var orbitR = mob ? 30 : 42;
  ctx.beginPath();
  ctx.arc(centerX, centerY, orbitR, 0, Math.PI * 2);
  ctx.strokeStyle = hexToRgba('#FB3B24', 0.1);
  ctx.lineWidth = 1;
  ctx.stroke();

  // Second ring
  ctx.beginPath();
  ctx.arc(centerX, centerY, orbitR + (mob ? 8 : 12), 0, Math.PI * 2);
  ctx.strokeStyle = hexToRgba('#FB3B24', 0.05);
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Orbital particles
  orbitals.forEach(function(o) {
    o.angle += o.speed * 0.016;
    var ox = centerX + Math.cos(o.angle) * orbitR * o.dist;
    var oy = centerY + Math.sin(o.angle) * orbitR * o.dist * 0.6;
    ctx.beginPath();
    ctx.arc(ox, oy, o.size, 0, Math.PI * 2);
    ctx.fillStyle = hexToRgba('#FB3B24', 0.5);
    ctx.fill();
  });

  // Center glow
  var glowR = (mob ? 24 : 34) + Math.sin(time * 2) * 3;
  var grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, glowR + 24);
  grad.addColorStop(0, 'rgba(251,59,36,0.14)');
  grad.addColorStop(0.5, 'rgba(251,59,36,0.04)');
  grad.addColorStop(1, 'rgba(251,59,36,0)');
  ctx.beginPath();
  ctx.arc(centerX, centerY, glowR + 24, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Center node
  roundRect(centerX - (mob ? 44 : 58), centerY - (mob ? 16 : 20), mob ? 88 : 116, mob ? 32 : 40, 6);
  ctx.fillStyle = '#111';
  ctx.fill();
  ctx.strokeStyle = 'rgba(251,59,36,0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.font = 'bold ' + (mob ? 12 : 15) + 'px system-ui';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FB3B24';
  ctx.fillText('Growth', centerX, centerY + (mob ? 1 : 2));
  ctx.font = (mob ? 6 : 7) + 'px system-ui';
  ctx.fillStyle = '#666';
  ctx.fillText('Engineered', centerX, centerY + (mob ? 10 : 14));

  // Connection from center down to process
  var processY = mob ? h * 0.78 : h * 0.8;
  ctx.beginPath();
  ctx.moveTo(centerX, centerY + (mob ? 16 : 20));
  ctx.lineTo(centerX, processY);
  ctx.strokeStyle = '#1A1A1A';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Animated dot flowing down
  var downT = (time * 0.3) % 1;
  var downY = (centerY + (mob ? 16 : 20)) + downT * (processY - centerY - (mob ? 16 : 20));
  ctx.beginPath();
  ctx.arc(centerX, downY, 2, 0, Math.PI * 2);
  ctx.fillStyle = hexToRgba('#FB3B24', 0.5);
  ctx.fill();

  // Bottom process
  var stepSpread = mob ? w * 0.3 : w * 0.36;
  var stepPositions = [
    centerX - stepSpread,
    centerX,
    centerX + stepSpread,
  ];

  // Process line
  ctx.beginPath();
  ctx.moveTo(stepPositions[0], processY);
  ctx.lineTo(stepPositions[2], processY);
  ctx.strokeStyle = '#1A1A1A';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Animated progress
  var progT = (time * 0.15) % 1;
  var progX = stepPositions[0] + progT * (stepPositions[2] - stepPositions[0]);
  ctx.beginPath();
  ctx.moveTo(stepPositions[0], processY);
  ctx.lineTo(progX, processY);
  ctx.strokeStyle = hexToRgba('#FB3B24', 0.4);
  ctx.lineWidth = 2;
  ctx.stroke();

  // Progress dot
  ctx.beginPath();
  ctx.arc(progX, processY, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#FB3B24';
  ctx.globalAlpha = 0.8;
  ctx.fill();
  ctx.globalAlpha = 1;

  steps.forEach(function(step, i) {
    var sx = stepPositions[i];
    var isActive = progX >= sx - 5;

    ctx.beginPath();
    ctx.arc(sx, processY, mob ? 4 : 5, 0, Math.PI * 2);
    ctx.fillStyle = isActive ? '#FB3B24' : '#111';
    ctx.fill();
    ctx.strokeStyle = isActive ? '#FB3B24' : '#333';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.font = 'bold ' + (mob ? 6 : 7) + 'px system-ui';
    ctx.textAlign = 'center';
    ctx.fillStyle = isActive ? '#0F0F0F' : '#555';
    ctx.fillText(i + 1, sx, processY + (mob ? 2.5 : 3));

    ctx.font = 'bold ' + (mob ? 9 : 11) + 'px system-ui';
    ctx.fillStyle = isActive ? '#FB3B24' : '#444';
    ctx.fillText(step, sx, processY + (mob ? 18 : 22));
  });

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
