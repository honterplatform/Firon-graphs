<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Firon Effect</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0A0A0A; font-family: system-ui, -apple-system, sans-serif; color: #fff; }
  .card { background: #0F0F0F; width: 100%; height: 100%; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="card"><canvas id="c"></canvas></div>
<script>
var c = document.getElementById('c');
var ctx = c.getContext('2d');
var dpr = window.devicePixelRatio || 1;
var time = 0;

function resize() {
  var r = c.parentElement.getBoundingClientRect();
  c.width = r.width * dpr;
  c.height = r.height * dpr;
  c.style.width = r.width + 'px';
  c.style.height = r.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { w: r.width, h: r.height };
}

var pillars = [
  { label: 'Paid Media', sub: 'Capital Deployment', color: '#FB3B24' },
  { label: 'GEO', sub: 'AI Visibility', color: '#FC5844' },
  { label: 'Business Intel', sub: 'Data Architecture', color: '#FF7A6B' },
];

var steps = ['Audit', 'Architect', 'Accelerate'];

// Particles flowing from pillars to center
var particles = [];

function spawnParticle(pillarIdx) {
  particles.push({
    p: pillarIdx,
    t: 0,
    speed: 0.008 + Math.random() * 0.006,
    size: 1.5 + Math.random() * 1.5,
  });
}

// Pre-populate
for (var i = 0; i < 18; i++) {
  particles.push({
    p: i % 3,
    t: Math.random(),
    speed: 0.008 + Math.random() * 0.006,
    size: 1.5 + Math.random() * 1.5,
  });
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function draw() {
  var d = resize();
  var w = d.w, h = d.h;
  var mob = w <= 480;
  time += 0.016;

  ctx.clearRect(0, 0, w, h);

  // Center node position
  var centerX = w * 0.5;
  var centerY = mob ? h * 0.42 : h * 0.44;

  // Pillar positions - spread horizontally
  var pillarY = mob ? h * 0.15 : h * 0.2;
  var spread = mob ? w * 0.28 : w * 0.3;
  var pillarPositions = [
    { x: centerX - spread, y: pillarY },
    { x: centerX, y: pillarY },
    { x: centerX + spread, y: pillarY },
  ];

  // Draw connection lines (subtle)
  pillarPositions.forEach(function(pp, i) {
    ctx.beginPath();
    ctx.moveTo(pp.x, pp.y + (mob ? 18 : 22));
    ctx.quadraticCurveTo(pp.x, centerY - 20, centerX, centerY - (mob ? 16 : 20));
    ctx.strokeStyle = 'rgba(251,59,36,0.08)';
    ctx.lineWidth = 20;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(pp.x, pp.y + (mob ? 18 : 22));
    ctx.quadraticCurveTo(pp.x, centerY - 20, centerX, centerY - (mob ? 16 : 20));
    ctx.strokeStyle = '#1A1A1A';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Update and draw particles
  particles.forEach(function(part) {
    part.t += part.speed;
    if (part.t > 1) {
      part.t = 0;
      part.p = Math.floor(Math.random() * 3);
    }

    var pp = pillarPositions[part.p];
    var startX = pp.x;
    var startY = pp.y + (mob ? 18 : 22);
    // Quadratic bezier interpolation
    var t = part.t;
    var cpX = pp.x;
    var cpY = centerY - 20;
    var endX = centerX;
    var endY = centerY - (mob ? 16 : 20);
    var mt = 1 - t;
    var px = mt*mt*startX + 2*mt*t*cpX + t*t*endX;
    var py = mt*mt*startY + 2*mt*t*cpY + t*t*endY;

    ctx.beginPath();
    ctx.arc(px, py, part.size, 0, Math.PI * 2);
    ctx.fillStyle = pillars[part.p].color;
    ctx.globalAlpha = 0.6 * (1 - t * 0.5);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Spawn new particles
  if (Math.random() < 0.08) spawnParticle(Math.floor(Math.random() * 3));

  // Draw pillar nodes
  pillars.forEach(function(p, i) {
    var pp = pillarPositions[i];
    var nw = mob ? 72 : 96;
    var nh = mob ? 30 : 36;

    ctx.fillStyle = '#141414';
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = p.color;
    ctx.globalAlpha = 1;
    roundRect(pp.x - nw/2, pp.y - nh/2, nw, nh, 6);
    ctx.fillStyle = '#141414';
    ctx.fill();
    ctx.strokeStyle = p.color.replace(')', ',0.3)');
    // Hex to rgba
    var r2 = parseInt(p.color.slice(1,3), 16);
    var g2 = parseInt(p.color.slice(3,5), 16);
    var b2 = parseInt(p.color.slice(5,7), 16);
    ctx.strokeStyle = 'rgba(' + r2 + ',' + g2 + ',' + b2 + ',0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.font = 'bold ' + (mob ? 9 : 11) + 'px system-ui';
    ctx.textAlign = 'center';
    ctx.fillStyle = p.color;
    ctx.fillText(p.label, pp.x, pp.y - 1);
    ctx.font = (mob ? 6 : 7) + 'px system-ui';
    ctx.fillStyle = '#555';
    ctx.fillText(p.sub, pp.x, pp.y + (mob ? 10 : 12));
  });

  // Center "Growth" node with glow
  var glowR = (mob ? 22 : 30) + Math.sin(time * 2) * 3;
  var grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, glowR + 20);
  grad.addColorStop(0, 'rgba(251,59,36,0.12)');
  grad.addColorStop(1, 'rgba(251,59,36,0)');
  ctx.beginPath();
  ctx.arc(centerX, centerY, glowR + 20, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  roundRect(centerX - (mob ? 44 : 56), centerY - (mob ? 16 : 20), mob ? 88 : 112, mob ? 32 : 40, 6);
  ctx.fillStyle = '#141414';
  ctx.fill();
  ctx.strokeStyle = 'rgba(251,59,36,0.4)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.font = 'bold ' + (mob ? 11 : 14) + 'px system-ui';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FB3B24';
  ctx.fillText('Growth', centerX, centerY + (mob ? 1 : 2));
  ctx.font = (mob ? 6 : 7) + 'px system-ui';
  ctx.fillStyle = '#666';
  ctx.fillText('Engineered', centerX, centerY + (mob ? 10 : 14));

  // Bottom process: Audit → Architect → Accelerate
  var processY = mob ? h * 0.78 : h * 0.8;
  var stepSpread = mob ? w * 0.26 : w * 0.24;
  var stepPositions = [
    centerX - stepSpread,
    centerX,
    centerX + stepSpread,
  ];

  // Process line
  ctx.beginPath();
  ctx.moveTo(stepPositions[0], processY);
  ctx.lineTo(stepPositions[2], processY);
  ctx.strokeStyle = '#1A1A1A';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Animated progress along line
  var progT = (time * 0.15) % 1;
  var progX = stepPositions[0] + progT * (stepPositions[2] - stepPositions[0]);
  ctx.beginPath();
  ctx.moveTo(stepPositions[0], processY);
  ctx.lineTo(progX, processY);
  ctx.strokeStyle = 'rgba(251,59,36,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Animated dot on line
  ctx.beginPath();
  ctx.arc(progX, processY, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#FB3B24';
  ctx.globalAlpha = 0.8;
  ctx.fill();
  ctx.globalAlpha = 1;

  steps.forEach(function(step, i) {
    var sx = stepPositions[i];
    var isActive = progX >= sx - 5;

    // Step dot
    ctx.beginPath();
    ctx.arc(sx, processY, mob ? 4 : 5, 0, Math.PI * 2);
    ctx.fillStyle = isActive ? '#FB3B24' : '#1A1A1A';
    ctx.fill();
    ctx.strokeStyle = isActive ? '#FB3B24' : '#333';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Step number
    ctx.font = 'bold ' + (mob ? 6 : 7) + 'px system-ui';
    ctx.textAlign = 'center';
    ctx.fillStyle = isActive ? '#0F0F0F' : '#555';
    ctx.fillText(i + 1, sx, processY + (mob ? 2.5 : 3));

    // Step label
    ctx.font = 'bold ' + (mob ? 9 : 11) + 'px system-ui';
    ctx.fillStyle = isActive ? '#FB3B24' : '#444';
    ctx.fillText(step, sx, processY + (mob ? 18 : 22));
  });

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
