<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 1 · Code Surgery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0F0F0F;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
  }

  .card {
    width: 100%;
    height: 100%;
    background: #0F0F0F;
    padding: clamp(20px, 4vh, 36px) clamp(20px, 3.5vw, 40px);
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 1.5vh, 14px);
    position: relative;
    overflow: hidden;
  }

  .card-label {
    font-size: clamp(11px, 1.5vh, 14px);
    font-weight: 700;
    color: #FB3B24;
    text-transform: uppercase;
    letter-spacing: 1.4px;
  }

  .card-title {
    font-size: clamp(26px, 5vh, 44px);
    font-weight: 800;
    color: rgba(255,255,255,0.95);
    line-height: 1.05;
    letter-spacing: -0.5px;
  }

  .gauge-container {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: clamp(10px, 2vh, 20px) 0;
  }
  .gauge-svg {
    width: 100%;
    height: 100%;
    max-width: 420px;
    overflow: visible;
  }
  .gauge-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transform: translateY(8%);
  }
  .gauge-value {
    font-size: clamp(40px, 8vh, 78px);
    font-weight: 800;
    color: #fff;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
  }
  .gauge-value .of {
    font-size: 0.45em;
    color: rgba(255,255,255,0.35);
    font-weight: 700;
    margin-left: 4px;
  }
  .gauge-caption {
    margin-top: clamp(6px, 1vh, 10px);
    font-size: clamp(10px, 1.3vh, 12px);
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
  }

  .card-footer {
    font-size: clamp(11px, 1.5vh, 14px);
    color: rgba(255,255,255,0.55);
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-label">Phase 1 · The Foundation</div>

  <div class="gauge-container">
    <svg class="gauge-svg" viewBox="0 0 200 130" preserveAspectRatio="xMidYMid meet">
      <!-- Background arc -->
      <path d="M 20 110 A 80 80 0 0 1 180 110"
            fill="none"
            stroke="rgba(255,255,255,0.06)"
            stroke-width="14"
            stroke-linecap="round"/>
      <!-- Foreground arc -->
      <path id="gaugeArc" d="M 20 110 A 80 80 0 0 1 180 110"
            fill="none"
            stroke="#FB3B24"
            stroke-width="14"
            stroke-linecap="round"
            style="filter: drop-shadow(0 0 12px rgba(251,59,36,0.5));"/>
    </svg>
    <div class="gauge-overlay">
      <div class="gauge-value"><span id="gaugeVal">0</span><span class="of">/100</span></div>
      <div class="gauge-caption">AI Readiness</div>
    </div>
  </div>

  <div class="card-footer">Store opened to AI agents. Catalog now legible.</div>
</div>

<script>
var arc = document.getElementById('gaugeArc');
var gaugeVal = document.getElementById('gaugeVal');
var arcLen = arc.getTotalLength();
arc.style.strokeDasharray = arcLen;
arc.style.strokeDashoffset = arcLen;

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function tween(from, to, dur, cb) {
  var start = Date.now();
  function step() {
    var t = Math.min(1, (Date.now() - start) / dur);
    var v = from + (to - from) * (1 - Math.pow(1 - t, 3));
    cb(v);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

async function runCycle() {
  // Reset
  arc.style.transition = 'none';
  arc.style.strokeDashoffset = arcLen;
  gaugeVal.textContent = '0';

  await sleep(500);

  // Animate arc to 98%
  var target = 98;
  arc.style.transition = 'stroke-dashoffset 1.6s cubic-bezier(.2,.8,.2,1)';
  arc.style.strokeDashoffset = arcLen * (1 - target / 100);
  tween(0, target, 1600, function(v) {
    gaugeVal.textContent = Math.round(v);
  });

  await sleep(5500);
  runCycle();
}

window.addEventListener('load', function() { setTimeout(runCycle, 200); });
</script>
</body>
</html>
